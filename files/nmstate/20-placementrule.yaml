apiVersion: apps.open-cluster-management.io/v1
kind: PlacementRule
metadata:
  name: nmstate
  namespace: openshift-acm-policies
spec:
  clusterConditions:
    - status: 'True'
      type: ManagedClusterConditionAvailable
  clusterSelector:
    matchExpressions:
    - key: local-cluster
      operator: NotIn
      values:
      - "true"
    matchLabels:
      sovcloud.open-cluster-management.io/vmaas: "true"
