name: Preflight Checks
description: Validates environment variables and system resources before workflow execution

inputs:
  title:
    description: 'Title for the preflight checks section'
    required: false
    default: 'Pre-flight Checks'
  check-pull-secret:
    description: 'Whether to check PULL_SECRET variable'
    required: false
    default: 'false'
  check-system-resources:
    description: 'Whether to check system resources (RAM, disk)'
    required: false
    default: 'false'
  check-libvirt:
    description: 'Whether to check libvirt access'
    required: false
    default: 'false'
  deployment-mode:
    description: 'Deployment mode to display (optional)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Run preflight checks
      shell: bash
      env:
        PREFLIGHT_TITLE: ${{ inputs.title }}
        PREFLIGHT_CHECK_PULL_SECRET: ${{ inputs.check-pull-secret }}
        PREFLIGHT_CHECK_SYSTEM_RESOURCES: ${{ inputs.check-system-resources }}
        PREFLIGHT_CHECK_LIBVIRT: ${{ inputs.check-libvirt }}
        PREFLIGHT_DEPLOYMENT_MODE: ${{ inputs.deployment-mode }}
      run: |
        make -f Makefile.ci preflight-checks
