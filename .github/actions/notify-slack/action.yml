name: Notify Slack
description: Sends workflow status notifications to Slack

inputs:
  status:
    description: 'Workflow status: success or failure'
    required: true
  workflow-name:
    description: 'Workflow display name (e.g., "Nightly E2E - Connected")'
    required: true
  cluster-name:
    description: 'Cluster name'
    required: true
  slack-webhook-urls:
    description: 'Space-separated list of Slack webhook URLs'
    required: true
  workflow-url:
    description: 'GitHub workflow run URL'
    required: true
  branch-name:
    description: 'Git branch name'
    required: true
  failed-step:
    description: 'Name of the failed step (optional, for failure notifications)'
    required: false
    default: ''
  artifact-url:
    description: 'URL to download artifacts (optional)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Send Slack notification
      shell: bash
      run: |
        if [ "${{ inputs.status }}" = "success" ]; then
          ICON=":green_jenkins_circle:"
          STATUS_TEXT="PASSED"
          COLOR="#36a64f"
          MESSAGE_TEXT="${ICON} ${{ inputs.workflow-name }} ${STATUS_TEXT}"
        else
          ICON=":red_jenkins_circle:"
          STATUS_TEXT="FAILED"
          COLOR="#ff0000"
          if [ -n "${{ inputs.failed-step }}" ]; then
            MESSAGE_TEXT="${ICON} ${{ inputs.workflow-name }} ${STATUS_TEXT} at ${{ inputs.failed-step }}"
          else
            MESSAGE_TEXT="${ICON} ${{ inputs.workflow-name }} ${STATUS_TEXT}"
          fi
        fi

        # Build the Slack payload using a heredoc to avoid shell interpretation issues
        if [ "${{ inputs.status }}" = "success" ]; then
          # Success message
          if [ -n "${{ inputs.artifact-url }}" ]; then
            # With artifacts
            PAYLOAD=$(cat <<'EOFPAYLOAD'
        {
          "text": "MESSAGE_TEXT_PLACEHOLDER",
          "attachments": [
            {
              "color": "COLOR_PLACEHOLDER",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "MESSAGE_TEXT_PLACEHOLDER",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Cluster:*\nCLUSTER_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\nBRANCH_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<WORKFLOW_URL_PLACEHOLDER|View Run>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\nSTATUS_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Artifacts:*\n<ARTIFACT_URL_PLACEHOLDER|Download>"
                    }
                  ]
                }
              ]
            }
          ]
        }
        EOFPAYLOAD
            )
          else
            # Without artifacts
            PAYLOAD=$(cat <<'EOFPAYLOAD'
        {
          "text": "MESSAGE_TEXT_PLACEHOLDER",
          "attachments": [
            {
              "color": "COLOR_PLACEHOLDER",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "MESSAGE_TEXT_PLACEHOLDER",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Cluster:*\nCLUSTER_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\nBRANCH_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<WORKFLOW_URL_PLACEHOLDER|View Run>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\nSTATUS_PLACEHOLDER"
                    }
                  ]
                }
              ]
            }
          ]
        }
        EOFPAYLOAD
            )
          fi
        else
          # Failure message
          if [ -n "${{ inputs.failed-step }}" ]; then
            # With failed step info
            if [ -n "${{ inputs.artifact-url }}" ]; then
              # With artifacts
              PAYLOAD=$(cat <<'EOFPAYLOAD'
        {
          "text": "MESSAGE_TEXT_PLACEHOLDER",
          "attachments": [
            {
              "color": "COLOR_PLACEHOLDER",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "MESSAGE_TEXT_PLACEHOLDER",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Cluster:*\nCLUSTER_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\nBRANCH_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<WORKFLOW_URL_PLACEHOLDER|View Run>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Failed at:*\nFAILED_STEP_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Artifacts:*\n<ARTIFACT_URL_PLACEHOLDER|Download>"
                    }
                  ]
                }
              ]
            }
          ]
        }
        EOFPAYLOAD
              )
            else
              # Without artifacts
              PAYLOAD=$(cat <<'EOFPAYLOAD'
        {
          "text": "MESSAGE_TEXT_PLACEHOLDER",
          "attachments": [
            {
              "color": "COLOR_PLACEHOLDER",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "MESSAGE_TEXT_PLACEHOLDER",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Cluster:*\nCLUSTER_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\nBRANCH_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<WORKFLOW_URL_PLACEHOLDER|View Run>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Failed at:*\nFAILED_STEP_PLACEHOLDER"
                    }
                  ]
                }
              ]
            }
          ]
        }
        EOFPAYLOAD
              )
            fi
          else
            # Without failed step info
            if [ -n "${{ inputs.artifact-url }}" ]; then
              # With artifacts
              PAYLOAD=$(cat <<'EOFPAYLOAD'
        {
          "text": "MESSAGE_TEXT_PLACEHOLDER",
          "attachments": [
            {
              "color": "COLOR_PLACEHOLDER",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "MESSAGE_TEXT_PLACEHOLDER",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Cluster:*\nCLUSTER_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\nBRANCH_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<WORKFLOW_URL_PLACEHOLDER|View Run>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\nSTATUS_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Artifacts:*\n<ARTIFACT_URL_PLACEHOLDER|Download>"
                    }
                  ]
                }
              ]
            }
          ]
        }
        EOFPAYLOAD
              )
            else
              # Without artifacts
              PAYLOAD=$(cat <<'EOFPAYLOAD'
        {
          "text": "MESSAGE_TEXT_PLACEHOLDER",
          "attachments": [
            {
              "color": "COLOR_PLACEHOLDER",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "MESSAGE_TEXT_PLACEHOLDER",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Cluster:*\nCLUSTER_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\nBRANCH_PLACEHOLDER"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<WORKFLOW_URL_PLACEHOLDER|View Run>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\nSTATUS_PLACEHOLDER"
                    }
                  ]
                }
              ]
            }
          ]
        }
        EOFPAYLOAD
              )
            fi
          fi
        fi

        # Replace placeholders with actual values using sed
        PAYLOAD=$(echo "$PAYLOAD" | sed \
          -e "s|MESSAGE_TEXT_PLACEHOLDER|${MESSAGE_TEXT}|g" \
          -e "s|COLOR_PLACEHOLDER|${COLOR}|g" \
          -e "s|CLUSTER_PLACEHOLDER|${{ inputs.cluster-name }}|g" \
          -e "s|BRANCH_PLACEHOLDER|${{ inputs.branch-name }}|g" \
          -e "s|WORKFLOW_URL_PLACEHOLDER|${{ inputs.workflow-url }}|g" \
          -e "s|STATUS_PLACEHOLDER|${STATUS_TEXT}|g" \
          -e "s|FAILED_STEP_PLACEHOLDER|${{ inputs.failed-step }}|g" \
          -e "s|ARTIFACT_URL_PLACEHOLDER|${{ inputs.artifact-url }}|g")

        # Send to all webhook URLs
        for WEBHOOK_URL in ${{ inputs.slack-webhook-urls }}; do
          echo "Sending notification to Slack..."
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$WEBHOOK_URL"
        done
