name: Notify Slack
description: Sends workflow status notifications to Slack

inputs:
  status:
    description: 'Workflow status: success or failure'
    required: true
  workflow-name:
    description: 'Workflow display name (e.g., "Nightly E2E - Connected")'
    required: true
  cluster-name:
    description: 'Cluster name'
    required: true
  slack-webhook-urls:
    description: 'Space-separated list of Slack webhook URLs'
    required: true
  workflow-url:
    description: 'GitHub workflow run URL'
    required: true
  branch-name:
    description: 'Git branch name'
    required: true
  commit-sha:
    description: 'Git commit sha'
    required: true
  failed-step:
    description: 'Name of the failed step (optional, for failure notifications)'
    required: false
    default: ''
  artifact-url:
    description: 'URL to download artifacts (optional)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Send Slack notification
      shell: bash
      env:
        INPUT_STATUS: ${{ inputs.status }}
        INPUT_WORKFLOW_NAME: ${{ inputs.workflow-name }}
        INPUT_CLUSTER_NAME: ${{ inputs.cluster-name }}
        INPUT_BRANCH_NAME: ${{ inputs.branch-name }}
        INPUT_COMMIT_SHA: ${{ inputs.commit-sha }}
        INPUT_WORKFLOW_URL: ${{ inputs.workflow-url }}
        INPUT_FAILED_STEP: ${{ inputs.failed-step }}
        INPUT_ARTIFACT_URL: ${{ inputs.artifact-url }}
        INPUT_SLACK_WEBHOOKS: ${{ inputs.slack-webhook-urls }}
      run: |
        # Set status-specific values
        if [ "$INPUT_STATUS" = "success" ]; then
          ICON=":green_jenkins_circle:"
          STATUS_TEXT="PASSED"
          COLOR="#36a64f"
        else
          ICON=":red_jenkins_circle:"
          STATUS_TEXT="FAILED"
          COLOR="#ff0000"
        fi

        # Build message text
        if [ "$INPUT_STATUS" = "success" ]; then
          MESSAGE_TEXT="${ICON} ${INPUT_WORKFLOW_NAME} ${STATUS_TEXT}"
        else
          if [ -n "$INPUT_FAILED_STEP" ]; then
            MESSAGE_TEXT="${ICON} ${INPUT_WORKFLOW_NAME} ${STATUS_TEXT} at ${INPUT_FAILED_STEP}"
          else
            MESSAGE_TEXT="${ICON} ${INPUT_WORKFLOW_NAME} ${STATUS_TEXT}"
          fi
        fi

        # Build compact 2-column fields
        FIELDS=$(jq -n \
          --arg cluster "$INPUT_CLUSTER_NAME" \
          --arg branch "$INPUT_BRANCH_NAME" \
          --arg commit "${INPUT_COMMIT_SHA:0:7}" \
          '[
            {"type": "mrkdwn", "text": ("*Cluster:* " + $cluster)},
            {"type": "mrkdwn", "text": ("*Branch:* " + $branch + " (" + $commit + ")")}
          ]')

        # Build action buttons
        if [ -n "$INPUT_ARTIFACT_URL" ]; then
          ACTIONS=$(jq -n \
            --arg workflow_url "$INPUT_WORKFLOW_URL" \
            --arg artifact_url "$INPUT_ARTIFACT_URL" \
            '{
              "type": "actions",
              "elements": [
                {"type": "button", "text": {"type": "plain_text", "text": "View Run"}, "url": $workflow_url},
                {"type": "button", "text": {"type": "plain_text", "text": "Artifacts"}, "url": $artifact_url}
              ]
            }')
        else
          ACTIONS=$(jq -n \
            --arg workflow_url "$INPUT_WORKFLOW_URL" \
            '{
              "type": "actions",
              "elements": [
                {"type": "button", "text": {"type": "plain_text", "text": "View Run"}, "url": $workflow_url}
              ]
            }')
        fi

        # Build compact Slack payload
        # Blocks must be at the top level (not inside attachments).
        # The attachment provides the color bar on the left.
        PAYLOAD=$(jq -n \
          --arg text "$MESSAGE_TEXT" \
          --arg color "$COLOR" \
          --argjson fields "$FIELDS" \
          --argjson actions "$ACTIONS" \
          '{
            "text": $text,
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": $text,
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": $fields
              },
              $actions
            ],
            "attachments": [
              {
                "color": $color,
                "fallback": $text
              }
            ]
          }')

        # Send to all webhook URLs
        for WEBHOOK_URL in $INPUT_SLACK_WEBHOOKS; do
          echo "Sending notification to Slack..."
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$WEBHOOK_URL"
        done
