# Area labels - no prefix, based on file paths

deployment:
  - changed-files:
    - any-glob-to-any-file:
      - 'playbooks/0[1-7]-*.yaml'
      - 'playbooks/main.yaml'
      - 'scripts/deployment/**/*'
      - 'scripts/infrastructure/generate_*.sh'
      - 'Makefile'
      - 'defaults/**/*'
      - 'config/**/*'

ci-cd:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**/*'
      - 'scripts/runners/**/*'

infrastructure:
  - changed-files:
    - any-glob-to-any-file:
      - 'scripts/infrastructure/**/*'
      - 'scripts/setup/**/*'
      - 'scripts/cleanup/**/*'
      - 'playbooks/tasks/create_*.yaml'
      - 'playbooks/tasks/configure_*.yaml'
      - 'playbooks/tasks/provision_*.yaml'

validation:
  - changed-files:
    - any-glob-to-any-file:
      - 'schemas/**/*'
      - 'scripts/verification/**/*'
      - 'validations.sh'
      - 'playbooks/tasks/validate_*.yaml'

operators:
  - changed-files:
    - any-glob-to-any-file:
      - 'operators/**/*'
      - 'playbooks/05-operators.yaml'
      - 'playbooks/tasks/*operator*.yaml'
      - 'playbooks/tasks/deploy_operator*.yaml'

utilities:
  - changed-files:
    - any-glob-to-any-file:
      - 'scripts/lib/**/*'
      - 'scripts/utils/**/*'

diagnostics:
  - changed-files:
    - any-glob-to-any-file:
      - 'scripts/diagnostics/**/*'
