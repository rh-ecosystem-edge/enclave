name: E2E - NVIDIA GPU Module

# Test NVIDIA GPU operator module deployment (Tier 3)
# Runs monthly to validate NVIDIA extraction and deployment
# Requires OpenShift AI (Tier 2) to be deployed first

on:
  schedule:
    # Run monthly on first Sunday at 8:00 AM EST (13:00 UTC)
    - cron: '0 13 1 * *'
  push:
    branches:
      - main
    paths:
      - 'operators/nvidia-gpu-operator/**'
      - 'playbooks/09-nvidia.yaml'
      - 'config/nvidia.yaml.example'
      - 'templates/imagesetconfiguration-nvidia.yaml.j2'
      - '.github/workflows/e2e-nvidia.yml'
  pull_request:
    paths:
      - 'operators/nvidia-gpu-operator/**'
      - 'playbooks/09-nvidia.yaml'
      - 'config/nvidia.yaml.example'
      - 'templates/imagesetconfiguration-nvidia.yaml.j2'
      - '.github/workflows/e2e-nvidia.yml'
  workflow_dispatch:
    # Allow manual triggering with mode selection
    inputs:
      deployment-mode:
        description: 'Deployment mode'
        required: true
        type: choice
        options:
          - connected
          - disconnected
        default: disconnected
      skip-disclaimer:
        description: 'Skip NVIDIA disclaimer prompt (automated mode)'
        required: false
        type: boolean
        default: true
      send-slack-notification:
        description: 'Send Slack notification on completion'
        required: false
        type: boolean
        default: false
      skip-cleanup:
        description: 'Skip cleanup after deployment (leave infrastructure running)'
        required: false
        type: boolean
        default: false

# Prevent concurrent runs
concurrency:
  group: e2e-nvidia-${{ github.event.inputs.deployment-mode || 'disconnected' }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  nvidia-deployment:
    name: NVIDIA GPU Deployment (${{ github.event.inputs.deployment-mode || 'disconnected' }})
    runs-on: [self-hosted, enclave-large]
    timeout-minutes: 360  # 6 hours (includes base + AI + NVIDIA)

    env:
      DEV_SCRIPTS_PATH: ${{ vars.DEV_SCRIPTS_PATH }}
      BASE_WORKING_DIR: ${{ vars.BASE_WORKING_DIR }}
      PULL_SECRET: ${{ secrets.PULL_SECRET }}
      ENCLAVE_DEPLOYMENT_MODE: ${{ github.event.inputs.deployment-mode || 'disconnected' }}
      CLEANUP_AFTER: 'true'
      OPENSHIFT_CI: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cluster name
        uses: ./.github/actions/setup-cluster-name
        with:
          naming-strategy: hash
          prefix: nv
          run-id: ${{ github.run_id }}

      - name: Setup cluster-specific working directory
        run: |
          make setup-working-dir
          echo "WORKING_DIR=$(cat /tmp/working_dir)" >> $GITHUB_ENV

      - name: Workflow information
        run: |
          echo "## E2E NVIDIA GPU Module Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Started at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster name**: $ENCLAVE_CLUSTER_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Mode**: ${{ github.event.inputs.deployment-mode || 'disconnected' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Three-Tier Deployment:" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 1: Base cluster" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 2: OpenShift AI" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 3: NVIDIA GPU operator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Pre-flight checks
        uses: ./.github/actions/preflight-checks
        with:
          title: E2E NVIDIA GPU Module Test
          check-pull-secret: 'true'

      - name: Allocate unique subnet for cluster
        uses: ./.github/actions/allocate-subnet

      - name: Create infrastructure
        env:
          WORKING_DIR: ${{ env.WORKING_DIR }}
        run: |
          echo "## Creating Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make environment
          echo "✅ Infrastructure created" >> $GITHUB_STEP_SUMMARY

      - name: Provision Landing Zone
        run: |
          echo "## Provisioning Landing Zone" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make provision-landing-zone
          echo "✅ Landing Zone provisioned" >> $GITHUB_STEP_SUMMARY

      - name: Install Enclave Lab
        run: |
          echo "## Installing Enclave Lab" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make install-enclave
          echo "✅ Enclave Lab installed" >> $GITHUB_STEP_SUMMARY

      - name: Phase 1 - Prepare binaries and content
        id: deploy_prepare
        run: |
          echo "## Phase 1: Prepare" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make deploy-cluster-prepare
          echo "✅ Phase 1 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 2 - Mirror registry (disconnected only)
        id: deploy_mirror
        if: github.event.inputs.deployment-mode == 'disconnected' || github.event_name == 'schedule'
        run: |
          echo "## Phase 2: Mirror Registry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make deploy-cluster-mirror
          echo "✅ Phase 2 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 3 - Deploy OpenShift cluster
        id: deploy_install
        run: |
          echo "## Phase 3: Deploy Cluster" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make deploy-cluster-install
          echo "✅ Phase 3 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 4 - Post-install configuration
        id: deploy_post_install
        run: |
          echo "## Phase 4: Post-Install Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make deploy-cluster-post-install
          echo "✅ Phase 4 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 5 - Install operators
        id: deploy_operators
        run: |
          echo "## Phase 5: Operators" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make deploy-cluster-operators
          echo "✅ Phase 5 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 6 - Day-2 operations (base)
        id: deploy_day2
        run: |
          echo "## Phase 6: Day-2 Operations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make deploy-cluster-day2
          echo "✅ Phase 6 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 7 - Configure hardware discovery
        id: deploy_discovery
        run: |
          echo "## Phase 7: Hardware Discovery" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make deploy-cluster-discovery
          echo "✅ Phase 7 complete - Base deployment complete" >> $GITHUB_STEP_SUMMARY

      - name: Verify base cluster deployment
        if: success()
        id: verify_base_cluster
        run: |
          echo "## Verifying Base Cluster" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make verify-cluster
          echo "✅ Base cluster verified" >> $GITHUB_STEP_SUMMARY

      - name: Phase 8 - Deploy OpenShift AI (Tier 2 - Prerequisite)
        id: deploy_openshift_ai
        run: |
          echo "## Phase 8: OpenShift AI Module (Tier 2)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploying OpenShift AI (required for NVIDIA)..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Create OpenShift AI configuration
          LZ_IP=$(./scripts/utils/get_landing_zone_ip.sh)
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"

          ssh $SSH_OPTS cloud-user@$LZ_IP "cd /home/cloud-user/enclave && cp config/openshift-ai.yaml.example ${WORKING_DIR}/config/openshift-ai.yaml"

          # Deploy OpenShift AI based on mode
          if [ "${{ github.event.inputs.deployment-mode || 'disconnected' }}" = "disconnected" ]; then
            make deploy-openshift-ai-disconnected
          else
            make deploy-openshift-ai
          fi

          echo "✅ Phase 8 complete - OpenShift AI deployed" >> $GITHUB_STEP_SUMMARY

      - name: Verify OpenShift AI deployment
        if: success()
        id: verify_openshift_ai
        run: |
          echo "## Verifying OpenShift AI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          LZ_IP=$(./scripts/utils/get_landing_zone_ip.sh)
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"

          # Verify DataScienceCluster
          DSC_STATUS=$(ssh $SSH_OPTS cloud-user@$LZ_IP \
            "export KUBECONFIG=${WORKING_DIR}/ocp-cluster/auth/kubeconfig && \
             oc get datasciencecluster default-dsc -o jsonpath='{.status.phase}'" 2>&1 || echo "Unknown")

          if [ "$DSC_STATUS" = "Ready" ]; then
            echo "✅ OpenShift AI verified - DataScienceCluster Ready" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ DataScienceCluster status: $DSC_STATUS" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Phase 9 - Deploy NVIDIA GPU Operator (Tier 3)
        id: deploy_nvidia
        run: |
          echo "## Phase 9: NVIDIA GPU Module (Tier 3)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploying NVIDIA GPU operator..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Create NVIDIA configuration
          LZ_IP=$(./scripts/utils/get_landing_zone_ip.sh)
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"

          # Create config and disable disclaimer for automated testing
          ssh $SSH_OPTS cloud-user@$LZ_IP "cd /home/cloud-user/enclave && \
            cp config/nvidia.yaml.example ${WORKING_DIR}/config/nvidia.yaml && \
            echo 'nvidia_show_disclaimer: ${{ github.event.inputs.skip-disclaimer || 'true' }}' >> ${WORKING_DIR}/config/nvidia.yaml"

          # Deploy NVIDIA based on mode
          if [ "${{ github.event.inputs.deployment-mode || 'disconnected' }}" = "disconnected" ]; then
            make deploy-nvidia-disconnected
          else
            make deploy-nvidia
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Phase 9 complete - NVIDIA GPU operator deployed" >> $GITHUB_STEP_SUMMARY

      - name: Verify NVIDIA GPU deployment
        if: success()
        id: verify_nvidia
        run: |
          echo "## Verifying NVIDIA GPU Operator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          LZ_IP=$(./scripts/utils/get_landing_zone_ip.sh)
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"

          # Verify NVIDIA components
          VERIFY_OUTPUT=$(ssh $SSH_OPTS cloud-user@$LZ_IP "cd /home/cloud-user/enclave && \
            export KUBECONFIG=${WORKING_DIR}/ocp-cluster/auth/kubeconfig && \
            echo '=== NVIDIA Namespace ===' && \
            oc get namespace nvidia-gpu-operator && \
            echo '' && \
            echo '=== GPU Operator Subscription ===' && \
            oc get subscription gpu-operator-certified -n nvidia-gpu-operator && \
            echo '' && \
            echo '=== ClusterPolicy ===' && \
            oc get clusterpolicy gpu-cluster-policy && \
            echo '' && \
            echo '=== ClusterPolicy State ===' && \
            oc get clusterpolicy gpu-cluster-policy -o jsonpath='{.status.state}'" 2>&1)

          echo "$VERIFY_OUTPUT"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### NVIDIA Components:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$VERIFY_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check ClusterPolicy state
          POLICY_STATE=$(ssh $SSH_OPTS cloud-user@$LZ_IP \
            "export KUBECONFIG=${WORKING_DIR}/ocp-cluster/auth/kubeconfig && \
             oc get clusterpolicy gpu-cluster-policy -o jsonpath='{.status.state}'" 2>&1 || echo "Unknown")

          if [ "$POLICY_STATE" = "ready" ] || [ "$POLICY_STATE" = "Ready" ]; then
            echo "✅ NVIDIA verification passed - ClusterPolicy is Ready" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ ClusterPolicy state: $POLICY_STATE (expected: ready)" >> $GITHUB_STEP_SUMMARY
            # Don't fail - ClusterPolicy might take time to become ready without GPU hardware
            echo "Note: ClusterPolicy may require GPU hardware to reach 'ready' state" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verify NVIDIA prerequisite check worked
        if: success()
        id: verify_prerequisite
        run: |
          echo "## Verifying Prerequisite Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Confirmed: NVIDIA deployment succeeded only after OpenShift AI was deployed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tier 2 → Tier 3 dependency validated" >> $GITHUB_STEP_SUMMARY

      - name: Collect artifacts
        if: always()
        uses: ./.github/actions/collect-artifacts
        with:
          artifact-type: deployment
          output-directory: artifacts

      - name: Collect full diagnostics on failure
        if: failure()
        run: |
          echo "## Collecting Full Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if ! ./scripts/verification/collect_ci_artifacts.sh full artifacts 2>&1 | tee artifact-collection-full.log; then
            echo "⚠️ Artifact collection failed" >> $GITHUB_STEP_SUMMARY
          fi

          # Run must-gather
          LZ_IP=$(./scripts/utils/get_landing_zone_ip.sh)
          if [ -n "$LZ_IP" ]; then
            SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"

            if ssh $SSH_OPTS cloud-user@$LZ_IP "test -f /home/cloud-user/enclave/scripts/diagnostics/gather.sh" 2>/dev/null; then
              mkdir -p artifacts/must-gather
              ssh $SSH_OPTS cloud-user@$LZ_IP \
                "cd /home/cloud-user/enclave/scripts/diagnostics && \
                 export KUBECONFIG=${WORKING_DIR}/ocp-cluster/auth/kubeconfig && \
                 GITHUB_RUN_ID='${{ github.run_id }}' ./gather.sh --must-gather=full ${WORKING_DIR}/config/global.yaml" || true

              scp $SSH_OPTS "cloud-user@${LZ_IP}:${WORKING_DIR}/scripts/diagnostics/*-logs-*.tar.gz" artifacts/must-gather/ 2>/dev/null || true
            fi
          fi

      - name: Upload artifacts
        if: always()
        id: upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-nvidia-${{ github.event.inputs.deployment-mode || 'disconnected' }}-${{ env.ENCLAVE_CLUSTER_NAME }}
          path: artifacts/
          retention-days: 14
          if-no-files-found: warn

      - name: Get artifact download URL
        if: always()
        id: artifact_url
        run: |
          sleep 2
          ARTIFACT_ID=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[] | select(.name | startswith("e2e-nvidia")) | .id')

          if [ -n "$ARTIFACT_ID" ]; then
            ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${ARTIFACT_ID}"
            echo "ARTIFACT_URL=${ARTIFACT_URL}" >> $GITHUB_OUTPUT
          else
            echo "ARTIFACT_URL=" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cleanup infrastructure
        if: always() && (github.event_name == 'schedule' || inputs.skip-cleanup != true)
        run: |
          echo "## Cleanup Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          make clean
          echo "✅ Infrastructure cleaned up" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup skipped notice
        if: always() && github.event_name == 'workflow_dispatch' && inputs.skip-cleanup == true
        run: |
          echo "## ⚠️ Cleanup Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure cleanup was skipped as requested." >> $GITHUB_STEP_SUMMARY
          echo "Remember to manually clean up: make clean" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## NVIDIA GPU Module Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: ${{ github.event.inputs.deployment-mode || 'disconnected' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: $ENCLAVE_CLUSTER_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Tiers:" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 1 (Base Cluster): ✅ Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 2 (OpenShift AI): ${{ steps.deploy_openshift_ai.outcome == 'success' && '✅ Completed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 3 (NVIDIA GPU): ${{ steps.deploy_nvidia.outcome == 'success' && '✅ Completed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification Results:" >> $GITHUB_STEP_SUMMARY
          echo "- AI Verification: ${{ steps.verify_openshift_ai.outcome == 'success' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- NVIDIA Verification: ${{ steps.verify_nvidia.outcome == 'success' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Prerequisite Check: ${{ steps.verify_prerequisite.outcome == 'success' && '✅ Validated' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY

      - name: Determine failed step
        if: failure()
        id: failed_step
        run: |
          declare -A step_names=(
            ["deploy_prepare"]="Phase 1: Prepare binaries"
            ["deploy_mirror"]="Phase 2: Mirror registry"
            ["deploy_install"]="Phase 3: Deploy cluster"
            ["deploy_post_install"]="Phase 4: Post-install"
            ["deploy_operators"]="Phase 5: Operators"
            ["deploy_day2"]="Phase 6: Day-2 operations"
            ["deploy_discovery"]="Phase 7: Hardware discovery"
            ["verify_base_cluster"]="Verify base cluster"
            ["deploy_openshift_ai"]="Phase 8: Deploy OpenShift AI"
            ["verify_openshift_ai"]="Verify OpenShift AI"
            ["deploy_nvidia"]="Phase 9: Deploy NVIDIA GPU"
            ["verify_nvidia"]="Verify NVIDIA GPU"
          )

          step_order=(
            deploy_prepare deploy_mirror deploy_install deploy_post_install
            deploy_operators deploy_day2 deploy_discovery verify_base_cluster
            deploy_openshift_ai verify_openshift_ai deploy_nvidia verify_nvidia
          )

          FAILED_STEP=""
          for step_id in "${step_order[@]}"; do
            outcome=$(echo '${{ toJSON(steps) }}' | jq -r --arg id "$step_id" '.[$id].outcome // "skipped"')
            if [ "$outcome" == "failure" ]; then
              FAILED_STEP="${step_names[$step_id]}"
              break
            fi
          done

          if [ -n "$FAILED_STEP" ]; then
            echo "FAILED_STEP=$FAILED_STEP" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        if: always() && (github.event_name == 'schedule' || inputs.send-slack-notification == true)
        uses: ./.github/actions/notify-slack
        with:
          status: ${{ job.status }}
          workflow-name: E2E NVIDIA GPU Module
          cluster-name: ${{ env.ENCLAVE_CLUSTER_NAME }}
          slack-webhook-urls: ${{ secrets.SLACK_WEBHOOK_URLS }}
          workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch-name: ${{ github.ref_name }}
          failed-step: ${{ steps.failed_step.outputs.FAILED_STEP }}
          artifact-url: ${{ steps.artifact_url.outputs.ARTIFACT_URL }}
