name: E2E OSAC

# OSAC plugin stack E2E deployment (connected mode).
# Triggers on changes to OSAC-related plugins or manual dispatch.
# Calls the reusable e2e-deployment workflow with the OSAC plugin chain.

on:
  workflow_dispatch:
    inputs:
      skip-cleanup:
        description: 'Skip cleanup after deployment (leave infrastructure running)'
        required: false
        type: boolean
        default: false
      send-slack-notification:
        description: 'Send Slack notification on completion'
        required: false
        type: boolean
        default: false
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'plugins/lvms/**'
      - 'plugins/trust-manager/**'
      - 'plugins/rhbk/**'
      - 'plugins/aap/**'
      - 'plugins/osac/**'
      - '.github/workflows/e2e-osac.yml'

concurrency:
  group: e2e-osac-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  get-latest-chart-version:
    name: Get latest OSAC nightly chart version
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, pr-validation]
    timeout-minutes: 5
    permissions: {}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Query latest nightly OSAC chart version from OCI registry
        id: version
        run: |
          VERSION=$(skopeo list-tags --no-creds docker://ghcr.io/osac-project/charts/osac \
            | jq -r '.Tags[]' | { grep 'nightly' || test $? = 1; } | sort -V | tail -1)
          if [ -z "$VERSION" ]; then
            echo "::error::No nightly chart version found"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest OSAC nightly chart version: $VERSION"

  e2e-osac:
    needs: get-latest-chart-version
    if: always() && needs.get-latest-chart-version.result != 'failure'
    permissions:
      contents: read
      checks: write  # required by e2e-deployment.yml for check-run updates
    uses: ./.github/workflows/e2e-deployment.yml
    with:
      run-connected: true
      run-disconnected: false
      enabled-plugins: 'lvms,trust-manager,rhbk,aap,osac'
      aap-license-file: '/etc/enclave-ci/aap-license.zip'
      skip-cleanup: ${{ inputs.skip-cleanup || false }}
      send-slack-notification: ${{ inputs.send-slack-notification || false }}
      workflow-display-name: 'E2E OSAC'
      osac-chart-version: ${{ needs.get-latest-chart-version.outputs.version || '' }}
    secrets: inherit
