name: E2E Deployment - RC

# Nightly E2E disconnected deployment trigger for the 0-rc branch.
#
# GitHub scheduled workflows only run on the default branch, so this workflow
# lives on main and explicitly trigger the workflow for the 0-rc branch.

on:
  schedule:
    # Run daily at 10:00 PM EST (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  trigger-branch-workflow:
    runs-on: [self-hosted, pr-validation]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger Workflow
        run: |
          gh workflow run e2e-deployment.yml --ref 0-rc -f send-slack-notification=true
