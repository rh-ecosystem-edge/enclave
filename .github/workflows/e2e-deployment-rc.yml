name: E2E Deployment - RC

# Nightly E2E deployment trigger for the 0-rc branch.
#
# GitHub scheduled workflows only run on the default branch, so this workflow
# lives on main and explicitly triggers the workflow for the 0-rc branch.

on:
  schedule:
    # Run daily at 10:00 PM EST (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  trigger-branch-workflow:
    runs-on: [self-hosted, pr-validation]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger E2E (LVMS)
        run: |
          gh workflow run e2e-deployment.yml --ref 0-rc -f send-slack-notification=true

  trigger-odf-workflow:
    runs-on: [self-hosted, pr-validation]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger E2E (ODF)
        run: |
          gh workflow run e2e-deployment.yml --ref 0-rc \
            -f run-connected=false \
            -f run-disconnected=true \
            -f storage-plugin=odf \
            -f send-slack-notification=true
