name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# Only one labeler run per PR
concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: 🏷️ Label PR
    runs-on: [self-hosted, pr-validation]
    permissions:
      contents: read
      pull-requests: write
    # Never fail or block PRs
    continue-on-error: true

    steps:
      # Area labels based on file paths
      - name: Area labels
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.2
        continue-on-error: true
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
          sync-labels: true

      # Size labels based on lines changed
      # Using pascalgn/size-label-action (JavaScript) instead of codelytv/pr-size-labeler (Docker)
      # because Docker container actions don't work well with podman on self-hosted runners
      - name: Size labels
        uses: pascalgn/size-label-action@637b50d9ea6c2f84fc28ef5a9adbfac142f36670 # v0.5.4
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          sizes: >
            {
              "0": "size/XS",
              "10": "size/S",
              "100": "size/M",
              "500": "size/L",
              "1000": "size/XL"
            }
