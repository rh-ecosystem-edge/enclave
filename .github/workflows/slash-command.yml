name: Slash Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write

jobs:
  handle-command:
    if: >-
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/test') ||
       startsWith(github.event.comment.body, '/retest') ||
       startsWith(github.event.comment.body, '/cancel'))
    runs-on: [self-hosted, pr-validation]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}
      COMMENT_ID: ${{ github.event.comment.id }}
    steps:
      - name: Check permissions
        env:
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          PERM=$(gh api "repos/${REPO}/collaborators/${COMMENTER}/permission" \
            --jq '.permission' 2>/dev/null) || true
          if [ -z "${PERM}" ]; then
            gh pr comment "${PR_NUMBER}" -R "${REPO}" \
              --body "@${COMMENTER} you don't have permission to trigger CI jobs. Required: write access or above."
            exit 1
          fi
          case "${PERM}" in
            admin|maintain|write) echo "User ${COMMENTER} has ${PERM} permission" ;;
            *)
              gh pr comment "${PR_NUMBER}" -R "${REPO}" \
                --body "@${COMMENTER} you don't have permission to trigger CI jobs. Required: write access or above."
              exit 1
              ;;
          esac

      - name: Get PR details
        id: pr
        run: |
          PR_JSON=$(gh pr view "${PR_NUMBER}" -R "${REPO}" \
            --json headRefName,headRefOid,headRepositoryOwner)

          HEAD_BRANCH=$(echo "${PR_JSON}" | jq -r '.headRefName')
          HEAD_SHA=$(echo "${PR_JSON}" | jq -r '.headRefOid')
          HEAD_REPO_OWNER=$(echo "${PR_JSON}" | jq -r '.headRepositoryOwner.login')

          echo "head_branch=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

          if [ "${HEAD_REPO_OWNER}" != "${{ github.repository_owner }}" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - name: React with eyes
        run: |
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='eyes'

      - name: Parse command
        id: cmd
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          FIRST_LINE=$(echo "${COMMENT_BODY}" | head -n1 | xargs)

          if [[ "${FIRST_LINE}" =~ ^/retest ]]; then
            echo "command=retest" >> "$GITHUB_OUTPUT"
          elif [[ "${FIRST_LINE}" =~ ^/cancel[[:space:]]+(.*) ]]; then
            echo "command=cancel:${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          elif [[ "${FIRST_LINE}" =~ ^/cancel ]]; then
            echo "command=cancel:all" >> "$GITHUB_OUTPUT"
          elif [[ "${FIRST_LINE}" =~ ^/test[[:space:]]+(.*) ]]; then
            echo "command=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "command=help" >> "$GITHUB_OUTPUT"
          fi

      - name: Handle help
        if: steps.cmd.outputs.command == '?' || steps.cmd.outputs.command == 'help'
        run: |
          gh pr comment "${PR_NUMBER}" -R "${REPO}" \
            --body "$(cat <<'EOF'
          ### Available `/test` commands

          | Command | Description | Runner |
          |---------|-------------|--------|
          | `/test validation` | Lint and validate (shell, YAML, Ansible, Makefile) | pr-validation |
          | `/test tarball` | Build and push tarball | pr-validation |
          | `/test infra` | Infrastructure verification | enclave-small |
          | `/test e2e-connected` | E2E deployment (connected mode) | enclave-large |
          | `/test e2e-disconnected` | E2E deployment (disconnected mode) | enclave-large |
          | `/test cleanup` | Run cleanup workflow | enclave-small |
          | `/test all` | Run validation + tarball + infra + e2e-connected | multiple |
          | `/test ?` or `/test help` | Show this help message | — |
          | `/retest` | Re-run all failed checks on this PR | — |
          | `/cancel <name>` | Cancel a running check (e.g. `/cancel e2e-connected`) | — |
          | `/cancel` | Cancel all running checks on this PR | — |
          EOF
          )"

          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='rocket'

      - name: Create temp branch for fork PRs
        id: ref
        if: >-
          steps.cmd.outputs.command != '?' &&
          steps.cmd.outputs.command != 'help' &&
          !startsWith(steps.cmd.outputs.command, 'cancel:')
        env:
          IS_FORK: ${{ steps.pr.outputs.is_fork }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          if [ "${IS_FORK}" = "true" ]; then
            TEMP_BRANCH="test/pr-${PR_NUMBER}"
            if gh api "repos/${REPO}/git/refs/heads/${TEMP_BRANCH}" \
                 -X PATCH -f sha="${HEAD_SHA}" 2>/dev/null; then
              echo "Updated existing temp branch ${TEMP_BRANCH}"
            else
              gh api "repos/${REPO}/git/refs" \
                -f ref="refs/heads/${TEMP_BRANCH}" \
                -f sha="${HEAD_SHA}"
              echo "Created temp branch ${TEMP_BRANCH}"
            fi
            echo "dispatch_ref=${TEMP_BRANCH}" >> "$GITHUB_OUTPUT"
          else
            echo "dispatch_ref=" >> "$GITHUB_OUTPUT"
          fi

      - name: Execute command
        if: >-
          steps.cmd.outputs.command != '?' &&
          steps.cmd.outputs.command != 'help' &&
          steps.cmd.outputs.command != 'retest' &&
          !startsWith(steps.cmd.outputs.command, 'cancel:')
        env:
          COMMAND: ${{ steps.cmd.outputs.command }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
          DISPATCH_REF: ${{ steps.ref.outputs.dispatch_ref }}
        run: |
          # Re-run a workflow's latest PR run for this commit.
          # The re-run stays associated with the PR in the Checks tab.
          rerun_pr_workflow() {
            local workflow="$1"
            local run_id
            run_id=$(gh run list \
              -R "${REPO}" \
              --workflow "${workflow}" \
              --limit 200 \
              --json databaseId,headSha,event \
              --jq "[.[] | select(.headSha == \"${HEAD_SHA}\" and .event == \"pull_request\")] | first | .databaseId")

            if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
              echo "::error::No PR run found for ${workflow} at ${HEAD_SHA:0:7}"
              return 1
            fi

            echo "Re-running ${workflow} run #${run_id}"
            gh run rerun "${run_id}" -R "${REPO}"
          }

          # Dispatch a workflow via workflow_dispatch (for workflows without PR triggers).
          dispatch_workflow() {
            local workflow="$1"
            shift
            local ref="${DISPATCH_REF:-${HEAD_BRANCH}}"
            echo "Dispatching ${workflow} on ref ${ref}"
            gh workflow run "${workflow}" --ref "${ref}" "$@" -R "${REPO}"
          }

          SUCCEEDED=""
          FAILED=""

          track_result() {
            local name="$1"
            if [ "$2" -eq 0 ]; then
              SUCCEEDED="${SUCCEEDED:+${SUCCEEDED}, }${name}"
            else
              FAILED="${FAILED:+${FAILED}, }${name}"
            fi
          }

          case "${COMMAND}" in
            validation)
              rerun_pr_workflow pr-validation.yml; track_result "PR Validation" $?
              ;;
            tarball)
              rerun_pr_workflow build-push-tarball.yml; track_result "Build Tarball" $?
              ;;
            infra)
              rerun_pr_workflow infra-verify.yml; track_result "Infra Verify" $?
              ;;
            e2e-connected)
              rerun_pr_workflow e2e-deployment.yml; track_result "E2E Connected" $?
              ;;
            e2e-disconnected)
              # Create a check run on the PR commit so it appears in Checks tab
              CHECK_RUN_ID=$(gh api "repos/${REPO}/check-runs" \
                -f name="E2E Disconnected" \
                -f head_sha="${HEAD_SHA}" \
                -f status="in_progress" \
                -f "output[title]=E2E Deployment (disconnected)" \
                -f "output[summary]=Triggered by \`/test e2e-disconnected\` — waiting for workflow to start..." \
                --jq '.id')
              if ! dispatch_workflow e2e-deployment.yml \
                -f deployment_mode=disconnected \
                -f cleanup_after=true \
                -f check_run_id="${CHECK_RUN_ID}"; then
                # Mark the check run as failed so it doesn't stay in_progress forever
                if [ -n "${CHECK_RUN_ID}" ]; then
                  gh api "repos/${REPO}/check-runs/${CHECK_RUN_ID}" \
                    -X PATCH \
                    -f status="completed" \
                    -f conclusion="failure" \
                    -f "output[title]=E2E Deployment (disconnected) — dispatch failed" \
                    -f "output[summary]=Failed to dispatch the workflow." || true
                fi
                track_result "E2E Disconnected" 1
              else
                track_result "E2E Disconnected" 0
              fi
              ;;
            cleanup)
              dispatch_workflow cleanup.yml; track_result "Cleanup" $?
              ;;
            all)
              rerun_pr_workflow pr-validation.yml; track_result "PR Validation" $?
              rerun_pr_workflow build-push-tarball.yml; track_result "Build Tarball" $?
              rerun_pr_workflow infra-verify.yml; track_result "Infra Verify" $?
              rerun_pr_workflow e2e-deployment.yml; track_result "E2E Connected" $?
              ;;
            *)
              gh pr comment "${PR_NUMBER}" -R "${REPO}" \
                --body "Unknown command: \`/test ${COMMAND}\`. Use \`/test ?\` to see available commands."
              gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
                -f content='confused'
              exit 1
              ;;
          esac

          # Post result
          if [ -n "${FAILED}" ]; then
            BODY="Failed: ${FAILED}"
            [ -n "${SUCCEEDED}" ] && BODY="${BODY}
          Succeeded: ${SUCCEEDED}"
            gh pr comment "${PR_NUMBER}" -R "${REPO}" --body "${BODY}"
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='-1'
            exit 1
          fi

          gh pr comment "${PR_NUMBER}" -R "${REPO}" \
            --body "Triggered: ${SUCCEEDED}"
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='rocket'

      - name: Handle retest
        if: steps.cmd.outputs.command == 'retest'
        env:
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
        run: |
          # Find failed workflow runs for this PR's head commit
          FAILED_RUNS=$(gh run list \
            -R "${REPO}" \
            --branch "${HEAD_BRANCH}" \
            --status failure \
            --limit 200 \
            --json databaseId,name,headSha \
            --jq ".[] | select(.headSha == \"${HEAD_SHA}\") | \"\(.databaseId)\t\(.name)\"")

          if [ -z "${FAILED_RUNS}" ]; then
            gh pr comment "${PR_NUMBER}" -R "${REPO}" \
              --body "No failed workflow runs found for this PR at commit \`${HEAD_SHA:0:7}\`."
            exit 0
          fi

          RERUN_LIST=""
          RERUN_ERRORS=""

          while IFS=$'\t' read -r RUN_ID RUN_NAME; do
            if gh run rerun "${RUN_ID}" -R "${REPO}"; then
              RERUN_LIST="${RERUN_LIST:+${RERUN_LIST}
          }- ${RUN_NAME} (#${RUN_ID})"
            else
              RERUN_ERRORS="${RERUN_ERRORS:+${RERUN_ERRORS}
          }- ${RUN_NAME} (#${RUN_ID})"
            fi
          done <<< "${FAILED_RUNS}"

          BODY="Re-triggered failed runs:"
          if [ -n "${RERUN_LIST}" ]; then
            BODY="${BODY}
          ${RERUN_LIST}"
          fi
          if [ -n "${RERUN_ERRORS}" ]; then
            BODY="${BODY}

          Failed to re-trigger:
          ${RERUN_ERRORS}"
          fi

          gh pr comment "${PR_NUMBER}" -R "${REPO}" --body "${BODY}"

          if [ -n "${RERUN_ERRORS}" ]; then
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='confused'
            exit 1
          fi

          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='rocket'

      - name: Handle cancel
        if: startsWith(steps.cmd.outputs.command, 'cancel:')
        env:
          COMMAND: ${{ steps.cmd.outputs.command }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
        run: |
          # Map command name to workflow file
          workflow_for_name() {
            case "$1" in
              validation)           echo "pr-validation.yml" ;;
              tarball)              echo "build-push-tarball.yml" ;;
              infra)                echo "infra-verify.yml" ;;
              e2e-connected)        echo "e2e-deployment.yml" ;;
              e2e-disconnected)     echo "e2e-deployment.yml" ;;
              cleanup)              echo "cleanup.yml" ;;
              *) return 1 ;;
            esac
          }

          CANCEL_TARGET="${COMMAND#cancel:}"
          CANCELLED=""
          CANCEL_ERRORS=""

          cancel_runs_for_workflow() {
            local workflow="$1"
            local display_name="$2"
            local run_ids
            run_ids=$(gh run list \
              -R "${REPO}" \
              --workflow "${workflow}" \
              --branch "${HEAD_BRANCH}" \
              --status in_progress \
              --limit 200 \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha == \"${HEAD_SHA}\") | .databaseId")

            if [ -z "${run_ids}" ]; then
              return 0
            fi

            while read -r run_id; do
              if gh run cancel "${run_id}" -R "${REPO}"; then
                CANCELLED="${CANCELLED:+${CANCELLED}
          }- ${display_name} (#${run_id})"
              else
                CANCEL_ERRORS="${CANCEL_ERRORS:+${CANCEL_ERRORS}
          }- ${display_name} (#${run_id})"
              fi
            done <<< "${run_ids}"
          }

          if [ "${CANCEL_TARGET}" = "all" ]; then
            # Cancel all in-progress runs for this PR's head commit
            ALL_RUNS=$(gh run list \
              -R "${REPO}" \
              --branch "${HEAD_BRANCH}" \
              --status in_progress \
              --limit 200 \
              --json databaseId,name,headSha \
              --jq ".[] | select(.headSha == \"${HEAD_SHA}\") | \"\(.databaseId)\t\(.name)\"")

            if [ -z "${ALL_RUNS}" ]; then
              gh pr comment "${PR_NUMBER}" -R "${REPO}" \
                --body "No in-progress workflow runs found for this PR at commit \`${HEAD_SHA:0:7}\`."
              exit 0
            fi

            while IFS=$'\t' read -r RUN_ID RUN_NAME; do
              if gh run cancel "${RUN_ID}" -R "${REPO}"; then
                CANCELLED="${CANCELLED:+${CANCELLED}
          }- ${RUN_NAME} (#${RUN_ID})"
              else
                CANCEL_ERRORS="${CANCEL_ERRORS:+${CANCEL_ERRORS}
          }- ${RUN_NAME} (#${RUN_ID})"
              fi
            done <<< "${ALL_RUNS}"
          else
            WORKFLOW=$(workflow_for_name "${CANCEL_TARGET}")
            if [ -z "${WORKFLOW}" ]; then
              gh pr comment "${PR_NUMBER}" -R "${REPO}" \
                --body "Unknown test name: \`${CANCEL_TARGET}\`. Use \`/test ?\` to see available names."
              gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
                -f content='confused'
              exit 1
            fi
            cancel_runs_for_workflow "${WORKFLOW}" "${CANCEL_TARGET}"
          fi

          if [ -z "${CANCELLED}" ] && [ -z "${CANCEL_ERRORS}" ]; then
            gh pr comment "${PR_NUMBER}" -R "${REPO}" \
              --body "No in-progress runs found for \`${CANCEL_TARGET}\` at commit \`${HEAD_SHA:0:7}\`."
            exit 0
          fi

          BODY="Cancelled:"
          if [ -n "${CANCELLED}" ]; then
            BODY="${BODY}
          ${CANCELLED}"
          fi
          if [ -n "${CANCEL_ERRORS}" ]; then
            BODY="${BODY}

          Failed to cancel:
          ${CANCEL_ERRORS}"
          fi

          gh pr comment "${PR_NUMBER}" -R "${REPO}" --body "${BODY}"

          if [ -n "${CANCEL_ERRORS}" ]; then
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='confused'
            exit 1
          fi

          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='rocket'
