name: Nightly E2E - Connected Mode

# Daily scheduled test in connected mode (fast deployment)
# Runs every night at 10:00 PM EST (03:00 UTC) to validate basic deployment functionality

on:
  schedule:
    # Run daily at 10:00 PM EST (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual triggering for testing

# Prevent concurrent nightly runs
concurrency:
  group: nightly-connected
  cancel-in-progress: false

jobs:
  nightly-connected-deployment:
    name: Nightly Connected Deployment
    runs-on: [self-hosted, enclave-large]
    environment: enclave-ci
    timeout-minutes: 180

    env:
      DEV_SCRIPTS_PATH: ${{ secrets.DEV_SCRIPTS_PATH }}
      WORKING_DIR: ${{ secrets.WORKING_DIR }}
      PULL_SECRET: ${{ secrets.PULL_SECRET }}
      ENCLAVE_DEPLOYMENT_MODE: connected
      CLEANUP_AFTER: 'true'
      OPENSHIFT_CI: "true"

    steps:
      - name: Generate cluster name with date
        id: cluster_name
        run: |
          # Use date-based cluster name for easy identification
          # Keep it short to fit bridge name limit (15 chars): nc-YYYYMMDD = 11 chars, nc-YYYYMMDD-c = 13 chars
          DATE_STAMP=$(date +%Y%m%d)
          CLUSTER_NAME="nc-${DATE_STAMP}"
          echo "ENCLAVE_CLUSTER_NAME=${CLUSTER_NAME}" >> $GITHUB_ENV
          echo "Generated cluster name: ${CLUSTER_NAME} (nightly connected)"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pre-flight checks
        id: preflight
        shell: bash {0}
        run: |
          set +e  # Don't exit on first error, collect all failures
          FAILED=0

          echo "## Nightly E2E Deployment - Connected Mode" | tee -a $GITHUB_STEP_SUMMARY
          echo "" | tee -a $GITHUB_STEP_SUMMARY
          echo "**Started at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" | tee -a $GITHUB_STEP_SUMMARY
          echo "**Cluster name**: $ENCLAVE_CLUSTER_NAME" | tee -a $GITHUB_STEP_SUMMARY
          echo "" | tee -a $GITHUB_STEP_SUMMARY

          # Check required environment variables
          echo "### Environment Variables" | tee -a $GITHUB_STEP_SUMMARY
          if [ -z "$DEV_SCRIPTS_PATH" ]; then
            echo "❌ DEV_SCRIPTS_PATH not set" | tee -a $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "✅ DEV_SCRIPTS_PATH: $DEV_SCRIPTS_PATH" | tee -a $GITHUB_STEP_SUMMARY
          fi

          if [ -z "$WORKING_DIR" ]; then
            echo "❌ WORKING_DIR not set" | tee -a $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "✅ WORKING_DIR: $WORKING_DIR" | tee -a $GITHUB_STEP_SUMMARY
          fi

          if [ -z "$PULL_SECRET" ]; then
            echo "❌ PULL_SECRET not set" | tee -a $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "✅ PULL_SECRET configured" | tee -a $GITHUB_STEP_SUMMARY
          fi

          if [ $FAILED -eq 0 ]; then
            echo "" | tee -a $GITHUB_STEP_SUMMARY
            echo "✅ All pre-flight checks passed" | tee -a $GITHUB_STEP_SUMMARY
          else
            echo "" | tee -a $GITHUB_STEP_SUMMARY
            echo "❌ Pre-flight checks failed" | tee -a $GITHUB_STEP_SUMMARY
            echo "" | tee -a $GITHUB_STEP_SUMMARY
            echo "**Action Required**: Configure repository variables and secrets in Settings → Secrets and variables → Actions" | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Clean infrastructure
        id: clean
        run: |
          echo "## Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Cleaning up any leftover infrastructure..." >> $GITHUB_STEP_SUMMARY

          make clean

          echo "✅ Cleanup complete" >> $GITHUB_STEP_SUMMARY

      - name: Create infrastructure
        id: create_infra
        run: |
          echo "## Creating Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Creating VMs and networks..." >> $GITHUB_STEP_SUMMARY

          make environment

          echo "✅ Infrastructure created" >> $GITHUB_STEP_SUMMARY

      - name: Provision Landing Zone
        id: provision_lz
        run: |
          echo "## Provisioning Landing Zone" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Installing CentOS Stream and configuring Landing Zone VM..." >> $GITHUB_STEP_SUMMARY

          make provision-landing-zone

          echo "✅ Landing Zone provisioned" >> $GITHUB_STEP_SUMMARY

      - name: Install Enclave Lab
        id: install_enclave
        run: |
          echo "## Installing Enclave Lab" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Copying code and installing dependencies on Landing Zone..." >> $GITHUB_STEP_SUMMARY

          make install-enclave

          echo "✅ Enclave Lab installed" >> $GITHUB_STEP_SUMMARY

      - name: Deploy OpenShift cluster
        id: deploy_cluster
        run: |
          echo "## Deploying OpenShift Cluster (Connected Mode)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Starting deployment in connected mode..." >> $GITHUB_STEP_SUMMARY
          echo "Expected duration: ~60 minutes" >> $GITHUB_STEP_SUMMARY

          make deploy-cluster

          echo "✅ Cluster deployment complete" >> $GITHUB_STEP_SUMMARY

      - name: Verify cluster deployment
        if: success()
        id: verify_cluster
        run: |
          set +e

          echo "## Verifying Cluster Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get Landing Zone IP using helper script
          LZ_IP=$(./scripts/get_landing_zone_ip.sh)

          if [ -z "$LZ_IP" ]; then
            echo "❌ Cannot find Landing Zone IP" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Landing Zone IP: $LZ_IP" >> $GITHUB_STEP_SUMMARY

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"

          # Get cluster operators status
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cluster Operators" >> $GITHUB_STEP_SUMMARY
          ssh $SSH_OPTS cloud-user@$LZ_IP "export KUBECONFIG=/home/cloud-user/ocp-cluster/auth/kubeconfig && oc get co" >> $GITHUB_STEP_SUMMARY || true

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Cluster verification complete" >> $GITHUB_STEP_SUMMARY

      - name: Collect artifacts
        if: always()
        run: |
          echo "## Collecting Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Use centralized artifact collection script
          ./scripts/collect_ci_artifacts.sh deployment artifacts 2>&1 | tee artifact-collection.log

          # Append summary to GitHub Step Summary
          if [ -f artifacts/collection-summary.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            cat artifacts/collection-summary.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-connected-${{ env.ENCLAVE_CLUSTER_NAME }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup infrastructure
        if: always()
        run: |
          echo "## Cleanup Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          make clean

          echo "✅ Infrastructure cleaned up" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Nightly Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: Connected" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: $ENCLAVE_CLUSTER_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack on success
        if: success()
        run: |
          PAYLOAD=$(cat <<'EOF'
          {
            "text": ":green_jenkins_circle: Nightly E2E Test - Connected Mode PASSED",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": ":green_jenkins_circle: Nightly E2E - Connected Mode Success",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Cluster:*\n${{ env.ENCLAVE_CLUSTER_NAME }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Duration:*\n${{ github.event.workflow_run.conclusion == 'success' && 'See run for details' || 'N/A' }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  }
                ]
              }
            ]
          }
          EOF
          )

          # Send to all webhook URLs (space-separated in secret)
          for WEBHOOK_URL in ${{ secrets.SLACK_WEBHOOK_URLS }}; do
            curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$WEBHOOK_URL"
          done

      - name: Notify Slack on failure
        if: failure()
        run: |
          PAYLOAD=$(cat <<'EOF'
          {
            "text": ":red_jenkins_circle: Nightly E2E Test - Connected Mode FAILED",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": ":red_jenkins_circle: Nightly E2E - Connected Mode Failed",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Cluster:*\n${{ env.ENCLAVE_CLUSTER_NAME }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Status:*\nFailed"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "⚠️ *Action Required:* Check the workflow logs for details"
                }
              }
            ]
          }
          EOF
          )

          # Send to all webhook URLs (space-separated in secret)
          for WEBHOOK_URL in ${{ secrets.SLACK_WEBHOOK_URLS }}; do
            curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$WEBHOOK_URL"
          done
