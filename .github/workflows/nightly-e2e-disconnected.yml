name: Nightly E2E - Disconnected Mode

# Daily scheduled test in disconnected mode (full air-gapped deployment)
# Runs at 10:00 PM EST (03:00 UTC) in parallel with connected mode

on:
  schedule:
    # Run daily at 10:00 PM EST (03:00 UTC) - parallel with connected mode
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual triggering for testing
    inputs:
      send-slack-notification:
        description: 'Send Slack notification on completion'
        required: false
        type: boolean
        default: false

# Prevent concurrent nightly runs
concurrency:
  group: nightly-disconnected
  cancel-in-progress: false

jobs:
  nightly-disconnected-deployment:
    name: Nightly Disconnected Deployment
    runs-on: [self-hosted, enclave-large]
    timeout-minutes: 270  # 4.5 hours

    env:
      DEV_SCRIPTS_PATH: ${{ vars.DEV_SCRIPTS_PATH }}
      BASE_WORKING_DIR: ${{ vars.BASE_WORKING_DIR }}
      PULL_SECRET: ${{ secrets.PULL_SECRET }}
      ENCLAVE_DEPLOYMENT_MODE: disconnected
      CLEANUP_AFTER: 'true'
      OPENSHIFT_CI: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cluster name with date
        uses: ./.github/actions/setup-cluster-name
        with:
          naming-strategy: date
          prefix: nd

      - name: Setup cluster-specific working directory
        run: |
          CLUSTER_WORKING_DIR="${BASE_WORKING_DIR}/clusters/${ENCLAVE_CLUSTER_NAME}"
          echo "Creating cluster-specific working directory: $CLUSTER_WORKING_DIR"
          mkdir -p "$CLUSTER_WORKING_DIR"
          echo "WORKING_DIR=$CLUSTER_WORKING_DIR" >> $GITHUB_ENV
          echo "Cluster working directory: $CLUSTER_WORKING_DIR"

      - name: Workflow information
        run: |
          echo "## Nightly E2E Deployment - Disconnected Mode" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Started at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster name**: $ENCLAVE_CLUSTER_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Pre-flight checks
        uses: ./.github/actions/preflight-checks
        with:
          title: Nightly E2E Deployment - Disconnected Mode
          check-pull-secret: 'true'

      - name: Allocate unique subnet for cluster
        uses: ./.github/actions/allocate-subnet

      - name: Clean infrastructure
        id: clean
        run: |
          echo "## Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Cleaning up any leftover infrastructure..." >> $GITHUB_STEP_SUMMARY

          make clean

          echo "✅ Cleanup complete" >> $GITHUB_STEP_SUMMARY

      - name: Setup infrastructure
        uses: ./.github/actions/setup-infrastructure

      - name: Deploy OpenShift cluster
        id: deploy_cluster
        run: |
          echo "## Deploying OpenShift Cluster (Disconnected Mode)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Starting full air-gapped deployment with mirror registry..." >> $GITHUB_STEP_SUMMARY
          echo "Expected duration: ~120 minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Phases:" >> $GITHUB_STEP_SUMMARY
          echo "1. Prepare - Download binaries (~5 min)" >> $GITHUB_STEP_SUMMARY
          echo "2. Mirror - Set up Quay and mirror images (~20 min, ~130GB)" >> $GITHUB_STEP_SUMMARY
          echo "3. Deploy - Install OpenShift cluster (~50 min)" >> $GITHUB_STEP_SUMMARY
          echo "4. Post-install - Configure cluster (~5 min)" >> $GITHUB_STEP_SUMMARY
          echo "5. Operators - Install operators (~20 min)" >> $GITHUB_STEP_SUMMARY
          echo "6. Day-2 - Advanced features (~10 min)" >> $GITHUB_STEP_SUMMARY
          echo "7. Discovery - Hardware discovery setup (~10 min)" >> $GITHUB_STEP_SUMMARY

          make deploy-cluster

          echo "✅ Cluster deployment complete" >> $GITHUB_STEP_SUMMARY

      - name: Verify cluster deployment
        if: success()
        id: verify_cluster
        run: |
          # Run standard cluster verification
          make verify-cluster

          # Additional verification for disconnected mode - check mirror registry
          LZ_IP=$(./scripts/get_landing_zone_ip.sh)
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Mirror Registry Status" >> $GITHUB_STEP_SUMMARY
          ssh $SSH_OPTS cloud-user@$LZ_IP "podman ps --filter name=quay --format 'table {{.Names}}\t{{.Status}}'" >> $GITHUB_STEP_SUMMARY || true

      - name: Collect artifacts
        if: always()
        uses: ./.github/actions/collect-artifacts
        with:
          artifact-type: deployment
          output-directory: artifacts

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-disconnected-${{ env.ENCLAVE_CLUSTER_NAME }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup infrastructure
        if: always()
        run: |
          echo "## Cleanup Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          make clean

          echo "✅ Infrastructure cleaned up" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Nightly Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: Disconnected (Air-gapped)" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: $ENCLAVE_CLUSTER_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: always() && (github.event_name == 'schedule' || inputs.send-slack-notification == true)
        uses: ./.github/actions/notify-slack
        with:
          status: ${{ job.status }}
          workflow-name: Nightly E2E - Disconnected
          cluster-name: ${{ env.ENCLAVE_CLUSTER_NAME }}
          slack-webhook-urls: ${{ secrets.SLACK_WEBHOOK_URLS }}
          workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch-name: ${{ github.ref_name }}
