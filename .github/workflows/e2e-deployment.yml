name: E2E Deployment

# This workflow performs end-to-end deployment testing from scratch:
# make clean && make environment && make provision-landing-zone && make install-enclave && make deploy-cluster
#
# Trigger methods:
# 1. Automatic: Runs on every pull request (opened, updated, reopened)
# 2. Manual: Go to Actions tab -> "E2E Deployment" -> Run workflow
#
# All deployments:
# - Always start with clean infrastructure (no reuse)
# - Deploy complete stack from scratch for full validation
#
# Automatic PR runs:
# - Deployment mode: connected (faster feedback)
# - Cleanup after: always (keep CI clean)
#
# Manual trigger options:
# - Choose deployment mode: connected (fast) or disconnected (full mirror)
# - Choose whether to cleanup after deployment

on:
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: 'Deployment mode (connected or disconnected)'
        required: true
        default: 'connected'
        type: choice
        options:
          - connected
          - disconnected
      cleanup_after:
        description: 'Cleanup infrastructure after deployment'
        required: true
        default: true
        type: boolean
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
    types: [checks_requested]

# Allow parallel execution with unique cluster names per run
# Each job gets isolated VMs, networks, and resources
concurrency:
  group: enclave-ci-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  check-e2e-needed:
    name: Check if E2E should run
    runs-on: [self-hosted, pr-validation]
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.decision.outputs.should_run }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if E2E-relevant files changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'playbooks/**'
              - 'scripts/**'
              - 'Makefile'
              - 'config/**'
              - 'defaults/**'
              - 'schemas/**'
              - 'templates/**'
              - 'operators/**'
              - 'files/**'
              - 'hack/**'
              - '.github/workflows/e2e-deployment.yml'
              - 'ansible.cfg'
              - 'requirements.yml'
              - 'ansible_collections.txt'
              - 'ansible_pip_requirements.txt'
              - 'bootstrap.sh'
              - 'validations.sh'
              - 'setup_*.sh'

      - name: Make decision
        id: decision
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "▶️  Manual trigger - E2E will run" | tee -a $GITHUB_STEP_SUMMARY
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "▶️  Merge queue - E2E will run" | tee -a $GITHUB_STEP_SUMMARY
          elif [[ "${{ steps.filter.outputs.e2e }}" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✓ E2E-relevant files changed - E2E will run" | tee -a $GITHUB_STEP_SUMMARY
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Only documentation/config files changed - E2E will be skipped" | tee -a $GITHUB_STEP_SUMMARY
            echo "To run E2E anyway, use manual workflow_dispatch" | tee -a $GITHUB_STEP_SUMMARY
          fi

  e2e-deployment:
    name: E2E Deployment Test
    runs-on: [self-hosted, enclave-large]
    timeout-minutes: 210  # 3.5 hours
    needs: check-e2e-needed
    if: needs.check-e2e-needed.outputs.should_run == 'true'

    env:
      DEV_SCRIPTS_PATH: ${{ vars.DEV_SCRIPTS_PATH }}
      BASE_WORKING_DIR: ${{ vars.BASE_WORKING_DIR }}
      PULL_SECRET: ${{ secrets.PULL_SECRET }}
      # Use manual input if available, otherwise default to 'connected' for PR runs
      ENCLAVE_DEPLOYMENT_MODE: ${{ github.event.inputs.deployment_mode || 'connected' }}
      # Use manual input if available, otherwise default to 'true' for PR runs
      CLEANUP_AFTER: ${{ github.event.inputs.cleanup_after || 'true' }}
      # Bypass CI_TOKEN requirement (we only use dev-scripts for infra, not cluster install)
      OPENSHIFT_CI: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate unique cluster name
        uses: ./.github/actions/setup-cluster-name
        with:
          naming-strategy: hash
          prefix: eci
          run-id: ${{ github.run_id }}

      - name: Setup cluster-specific working directory
        run: |
          make setup-working-dir
          echo "WORKING_DIR=$(cat /tmp/working_dir)" >> $GITHUB_ENV

      - name: Pre-flight checks
        uses: ./.github/actions/preflight-checks
        with:
          title: E2E Deployment Pre-flight Checks
          check-pull-secret: 'true'
          check-system-resources: 'true'
          check-libvirt: 'true'

      - name: Allocate unique subnet for cluster
        uses: ./.github/actions/allocate-subnet

      - name: Create infrastructure
        env:
          WORKING_DIR: ${{ env.WORKING_DIR }}
        run: |
          echo "## Creating Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Creating VMs, networks, and BMC emulation..." >> $GITHUB_STEP_SUMMARY
          echo "Using subnet: ${ENCLAVE_SUBNET_ID:-not-set}" >> $GITHUB_STEP_SUMMARY
          echo "BMC Network: ${ENCLAVE_BMC_NETWORK:-not-set}" >> $GITHUB_STEP_SUMMARY
          echo "Cluster Network: ${ENCLAVE_CLUSTER_NETWORK:-not-set}" >> $GITHUB_STEP_SUMMARY
          echo "Working Directory: ${WORKING_DIR:-not-set}" >> $GITHUB_STEP_SUMMARY

          make environment
          echo "✅ Infrastructure created" >> $GITHUB_STEP_SUMMARY

      - name: Provision Landing Zone
        run: |
          echo "## Provisioning Landing Zone" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Installing CentOS Stream and configuring Landing Zone VM..." >> $GITHUB_STEP_SUMMARY
          make provision-landing-zone
          echo "✅ Landing Zone provisioned" >> $GITHUB_STEP_SUMMARY

      - name: Install Enclave Lab
        run: |
          echo "## Installing Enclave Lab" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Installing dev-scripts and required packages on Landing Zone..." >> $GITHUB_STEP_SUMMARY
          make install-enclave
          echo "✅ Enclave Lab installed" >> $GITHUB_STEP_SUMMARY

      - name: Phase 1 - Prepare binaries and content
        id: deploy_prepare
        run: |
          echo "## Phase 1: Prepare" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Downloading OpenShift binaries and content..." >> $GITHUB_STEP_SUMMARY

          make deploy-cluster-prepare

          echo "✅ Phase 1 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 2 - Mirror registry setup
        if: env.ENCLAVE_DEPLOYMENT_MODE != 'connected'
        id: deploy_mirror
        run: |
          echo "## Phase 2: Mirror Registry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Setting up local mirror registry (disconnected mode)..." >> $GITHUB_STEP_SUMMARY

          make deploy-cluster-mirror

          echo "✅ Phase 2 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 3 - Deploy OpenShift cluster
        id: deploy_install
        run: |
          echo "## Phase 3: Deploy Cluster" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploying OpenShift cluster (mode: $ENCLAVE_DEPLOYMENT_MODE)..." >> $GITHUB_STEP_SUMMARY

          make deploy-cluster-install

          echo "✅ Phase 3 complete - Cluster deployed" >> $GITHUB_STEP_SUMMARY

      - name: Phase 4 - Post-install configuration
        id: deploy_post_install
        run: |
          echo "## Phase 4: Post-Install Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Configuring cluster (secrets, certificates, API health)..." >> $GITHUB_STEP_SUMMARY

          make deploy-cluster-post-install

          echo "✅ Phase 4 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 5 - Install operators
        id: deploy_operators
        run: |
          echo "## Phase 5: Operators" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Installing and configuring operators..." >> $GITHUB_STEP_SUMMARY

          make deploy-cluster-operators

          echo "✅ Phase 5 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 6 - Day-2 operations
        id: deploy_day2
        run: |
          echo "## Phase 6: Day-2 Operations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Configuring advanced features and policies..." >> $GITHUB_STEP_SUMMARY

          make deploy-cluster-day2

          echo "✅ Phase 6 complete" >> $GITHUB_STEP_SUMMARY

      - name: Phase 7 - Configure hardware discovery
        id: deploy_discovery
        run: |
          echo "## Phase 7: Hardware Discovery" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Configuring hardware discovery infrastructure..." >> $GITHUB_STEP_SUMMARY

          make deploy-cluster-discovery

          echo "✅ Phase 7 complete - Full deployment complete" >> $GITHUB_STEP_SUMMARY

      - name: Verify cluster deployment
        id: verify_cluster
        run: make verify-cluster

      - name: Collect artifacts
        if: always()
        uses: ./.github/actions/collect-artifacts
        with:
          artifact-type: deployment
          output-directory: artifacts

      - name: Collect full diagnostics on failure
        if: failure()
        run: |
          echo "## Collecting Full Diagnostics (failure)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Use centralized artifact collection script with full level
          ./scripts/verification/collect_ci_artifacts.sh full artifacts 2>&1 | tee artifact-collection-full.log

          # Also run must-gather if cluster is accessible
          LZ_IP=$(./scripts/utils/get_landing_zone_ip.sh)
          if [ -n "$LZ_IP" ]; then
            SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"

            if ssh $SSH_OPTS cloud-user@$LZ_IP "test -f /home/cloud-user/enclave/scripts/diagnostics/gather.sh" 2>/dev/null; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Running must-gather..." >> $GITHUB_STEP_SUMMARY

              mkdir -p artifacts/must-gather
              GATHER_OUT=$(ssh $SSH_OPTS cloud-user@$LZ_IP \
                "cd /home/cloud-user/enclave/scripts/diagnostics && \
                 export KUBECONFIG=/home/cloud-user/ocp-cluster/auth/kubeconfig && \
                 GITHUB_RUN_ID='${{ github.run_id }}' ./gather.sh --must-gather=full ../../config/global.yaml 2>&1" || true)
              echo "$GATHER_OUT" >> artifacts/must-gather/gather-output.txt

              # Copy must-gather archives
              scp $SSH_OPTS "cloud-user@${LZ_IP}:/home/cloud-user/enclave/scripts/diagnostics/lz-logs-*.tar.gz" artifacts/must-gather/ 2>/dev/null || true
              scp $SSH_OPTS "cloud-user@${LZ_IP}:/home/cloud-user/enclave/scripts/diagnostics/cluster-logs-*.tar.gz" artifacts/must-gather/ 2>/dev/null || true

              if ls artifacts/must-gather/*-logs-*.tar.gz 1>/dev/null 2>&1; then
                echo "✅ Collected must-gather archives" >> $GITHUB_STEP_SUMMARY
              else
                echo "⚠️ Must-gather failed (see must-gather/gather-output.txt)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts-${{ github.run_id }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup infrastructure
        if: always() && (github.event.inputs.cleanup_after == 'true' || github.event.inputs.cleanup_after == true || github.event_name == 'pull_request' || github.event_name == 'merge_group')
        run: |
          echo "## Cleanup Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Removing infrastructure for cluster: $ENCLAVE_CLUSTER_NAME" >> $GITHUB_STEP_SUMMARY

          # Create cleanup logs directory
          mkdir -p cleanup-logs

          # Run cleanup and capture output
          set +e
          make clean 2>&1 | tee cleanup-logs/cleanup.log
          CLEANUP_EXIT_CODE=$?
          set -e

          # Check for any warnings in cleanup output
          if grep -q "WARNING:" cleanup-logs/cleanup.log; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Cleanup completed with warnings:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep "WARNING:" cleanup-logs/cleanup.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          elif [ $CLEANUP_EXIT_CODE -eq 0 ]; then
            echo "✅ Infrastructure cleaned up successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Cleanup completed with errors (exit code: $CLEANUP_EXIT_CODE)" >> $GITHUB_STEP_SUMMARY
            echo "Check cleanup-logs/cleanup.log for details" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Collect post-cleanup state
        if: always()
        run: |
          mkdir -p cleanup-state/libvirt cleanup-state/system

          # Capture post-cleanup system state
          sudo virsh pool-list --all --details > cleanup-state/libvirt/storage-pools.txt 2>&1 || true
          sudo virsh net-list --all > cleanup-state/libvirt/networks.txt 2>&1 || true
          sudo virsh list --all > cleanup-state/libvirt/vms.txt 2>&1 || true
          df -h > cleanup-state/system/disk-usage.txt 2>&1 || true

      - name: Verify cleanup
        if: always()
        run: |
          echo "## Cleanup Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for leftover resources
          LEFTOVER_POOLS=$(sudo virsh pool-list --all --name | grep "^eci-" || true)
          LEFTOVER_NETWORKS=$(sudo virsh net-list --all --name | grep "^eci-.*-[pe]$" || true)
          LEFTOVER_VMS=$(sudo virsh list --all --name | grep "^eci-" || true)

          # Save verification results to file (for artifacts)
          {
            echo "=== Cleanup Verification Results ==="
            echo "Timestamp: $(date -u +"%Y%m%d-%H%M%S")"
            echo ""
            if [ -z "$LEFTOVER_POOLS" ] && [ -z "$LEFTOVER_NETWORKS" ] && [ -z "$LEFTOVER_VMS" ]; then
              echo "✅ No leftover resources detected"
            else
              echo "⚠️ Leftover resources detected:"
              [ -n "$LEFTOVER_POOLS" ] && echo "- Pools: $LEFTOVER_POOLS"
              [ -n "$LEFTOVER_NETWORKS" ] && echo "- Networks: $LEFTOVER_NETWORKS"
              [ -n "$LEFTOVER_VMS" ] && echo "- VMs: $LEFTOVER_VMS"
            fi
          } | tee cleanup-logs/verification.txt

          # Also report to step summary
          if [ -z "$LEFTOVER_POOLS" ] && [ -z "$LEFTOVER_NETWORKS" ] && [ -z "$LEFTOVER_VMS" ]; then
            echo "✅ No leftover resources detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Leftover resources detected:**" >> $GITHUB_STEP_SUMMARY
            [ -n "$LEFTOVER_POOLS" ] && echo "- **Pools**: $(echo $LEFTOVER_POOLS | tr '\n' ' ')" >> $GITHUB_STEP_SUMMARY
            [ -n "$LEFTOVER_NETWORKS" ] && echo "- **Networks**: $(echo $LEFTOVER_NETWORKS | tr '\n' ' ')" >> $GITHUB_STEP_SUMMARY
            [ -n "$LEFTOVER_VMS" ] && echo "- **VMs**: $(echo $LEFTOVER_VMS | tr '\n' ' ')" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "These resources should be cleaned up manually or via the cleanup workflow." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload post-cleanup artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-cleanup-state-${{ github.run_id }}
          path: |
            cleanup-logs/
            cleanup-state/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: $ENCLAVE_DEPLOYMENT_MODE" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
