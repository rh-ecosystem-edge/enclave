---
# Default deployment mode. Override in config/global.yaml to deploy in connected mode.
disconnected: true

# Fresh install mode. Override in config/global.yaml to mirror multiple OpenShift versions.
fresh: true

# Configure High Density Pod Limits for ABI. Override in config/global.yaml.
masterMaxPods: 500

# Default disk encryption setting. Override in config/global.yaml to enable TPM v2 encryption.
diskEncryption: false

# Default oc-mirror log level. Override in config/global.yaml for more verbosity.
ocMirrorLogLevel: info

# Default storage plugin. Override in config/global.yaml to use odf.
storage_plugin: lvms

# Plugins to deploy during the pipeline. Override in config/global.yaml to add or remove plugins.
# By default only the selected storage plugin is enabled.
enabled_plugins:
  - "{{ storage_plugin }}"

# Default pull secret path. Override in config/global.yaml if stored elsewhere.
pullSecretPath: "{{ workingDir }}/config/pull-secret.json"

# ConfigMap name for Quay registry CA certificates used by image.config and UpdateService.
# Partner overlays that replace image.config.spec.additionalTrustedCA must include the
# 'updateservice-registry' key from this ConfigMap to prevent UpdateService reconciliation failures.
# See: https://github.com/gori-project/GoRI/issues/924
quayRegistryCAConfigmapName: quay-registry-ca
