---
# Quay features
quayFeatureProxyStorage: true
quayFeatureQuotaManagement: false
quayMaximumLayerSize: "100G"

# Default storage configuration for all Quay backends
quayBackendDefaults:
  storage_path: /datastorage/registry

# Additional defaults applied only when quayBackend is RadosGWStorage
quayBackendRGWDefaults:
  is_secure: true
  port: 443
  minimum_chunk_size_mb: 100
  maximum_chunk_size_mb: 500
  server_side_assembly: true

# OAuth application configuration
# Enable automatic OAuth application creation during initial setup
quayOAuthApp:
  enabled: true
  name: "default-application"
  organization: "default-org"
  redirect_uri: "http://localhost:8080/callback"
  scopes: "repo:read repo:write repo:admin repo:create user:read user:admin org:admin"
