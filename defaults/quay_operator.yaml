---
# Quay features
quayFeatureProxyStorage: true
quayFeatureQuotaManagement: true

# Default storage configuration for all Quay backends
quayBackendDefaults:
  storage_path: /datastorage/registry

# Additional defaults applied only when quayBackend is RadosGWStorage
quayBackendRGWDefaults:
  is_secure: true
  port: 443
  minimum_chunk_size_mb: 100
  maximum_chunk_size_mb: 500
  server_side_assembly: true
