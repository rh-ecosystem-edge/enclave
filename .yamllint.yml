---
# Enclave Lab YAML Linting Configuration
# This configuration is optimized for Ansible playbooks and Kubernetes manifests
extends: default

rules:
  # Line length - warn only for now
  line-length:
    max: 200
    level: warning

  # Indentation - allow both styles
  indentation:
    spaces: consistent
    indent-sequences: whatever

  # Comments - allow flexibility
  comments:
    min-spaces-from-content: 1

  # Document start (---) - disable, not required
  document-start: disable

  # Empty lines
  empty-lines:
    max: 3

  # Key duplicates - error (this is a real problem)
  key-duplicates:
    level: error

  # Brackets
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

  # Braces
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1

  # Truthy values - allow Ansible boolean syntax (yes/no, on/off)
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false

  # Comments indentation - required by ansible-lint
  comments-indentation: disable

  # Octal values - required by ansible-lint
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true

ignore: |
  .github/
  .git/
  .idea/
  node_modules/
  venv/
  .venv/
  **/*.j2
  **/*.jinja2
