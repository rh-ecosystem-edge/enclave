---
- name: Validate dc_cache mandatory variables
  ansible.builtin.fail:
    msg: "Variables dc_cache_address, dc_cache_user and dc_cache_password are mandatory"
  when: >
    dc_cache_address | default('') | length == 0 or
    dc_cache_user | default('') | length == 0 or
    dc_cache_password | default('') | length == 0

- name: Generate pull secret for datacenter cache
  ansible.builtin.set_fact:
    __pull_secret_dc:
      auths: "{{ {dc_cache_address: {'auth': (dc_cache_user + ':' + dc_cache_password) | ansible.builtin.b64encode}} }}"
  no_log: true

- name: Combine pull secrets
  ansible.builtin.set_fact:
    __pull_secret_cache: "{{ pullSecret | ansible.builtin.combine(__pull_secret_dc, recursive=true) }}"
  no_log: true

- name: Create pull-secret-cache file with the combination
  ansible.builtin.copy:
    content: "{{ __pull_secret_cache | to_json }}"
    dest: "{{ workingDir }}/config/pull-secret-cache.json"
  no_log: true

- name: Create imagesetconfiguration-cache.yaml for datacenter cache
  ansible.builtin.template:
    src: ../../templates/imagesetconfiguration.yaml.j2
    dest: "{{ workingDir }}/config/imagesetconfiguration-cache.yaml"

- name: Change oc-mirror permissions
  ansible.builtin.file:
    path: "{{ workingDir }}/bin/oc-mirror"
    mode: "0755"

- name: Reset list of normalized extra ImageSetConfiguration paths
  ansible.builtin.set_fact:
    __mirror_cache_extra_imageset_normalized: []

- name: Normalize each extra ImageSetConfiguration path for datacenter cache
  ansible.builtin.set_fact:
    __mirror_cache_extra_imageset_normalized: "{{ __mirror_cache_extra_imageset_normalized + [_normalized] }}"
  vars:
    _trimmed: "{{ item | string | trim }}"
    _normalized: "{{ _trimmed if (_trimmed[0:1] == '/') else (workingDir + '/config/' + _trimmed) }}"
  loop: "{{ dc_cache_extra_imageset_configs | default([]) }}"
  when: _trimmed | length > 0
  loop_control:
    label: "{{ _normalized }}"

- name: Build ImageSetConfiguration path list for datacenter cache oc-mirror
  ansible.builtin.set_fact:
    __oc_mirror_imageset_configs: "{{ [workingDir + '/config/imagesetconfiguration-cache.yaml'] + __mirror_cache_extra_imageset_normalized }}"

- name: Run oc-mirror for each ImageSetConfiguration (datacenter cache)
  ansible.builtin.include_tasks:
    file: tasks/mirror_cache_oc_mirror_item.yaml
  loop: "{{ __oc_mirror_imageset_configs }}"
  loop_control:
    loop_var: __mirror_cache_imageset_path
    label: "{{ __mirror_cache_imageset_path | basename }}"
