---
# Auto-discover and deploy all plugins by type
# sorted by order field.
#
# Only plugins listed in enabled_plugins are deployed.
#
# Called from 05-operators.yaml.

- name: Find all plugin descriptors
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../plugins"
    patterns: "plugin.yaml"
    recurse: true
    depth: 2
  register: r_plugin_find

- name: Read plugin descriptors
  ansible.builtin.slurp:
    src: "{{ plugin_path }}"
  loop: "{{ r_plugin_find.files | map(attribute='path') | list }}"
  register: r_plugin_slurp
  loop_control:
    loop_var: plugin_path

- name: Parse plugin descriptors
  ansible.builtin.set_fact:
    _plugin_all_parsed: >-
      {{ r_plugin_slurp.results
         | map(attribute='content')
         | map('b64decode')
         | map('from_yaml')
         | selectattr('type', 'equalto', plugin_type)
         | selectattr('name', 'in', enabled_plugins)
         | selectattr('order', 'defined')
         | sort(attribute='order')
         | list }}

- name: Build plugin deploy list
  ansible.builtin.set_fact:
    _plugin_deploy_list: >-
      {{ _plugin_all_parsed | map(attribute='name') | list }}

- name: Display plugins to deploy
  ansible.builtin.debug:
    msg: "Plugins to deploy (sorted by order): {{ _plugin_deploy_list }}"

- name: Deploy plugin
  ansible.builtin.include_tasks:
    file: tasks/deploy_plugin.yaml
  vars:
    plugin_name: "{{ _plugin_name }}"
  loop: "{{ _plugin_deploy_list }}"
  loop_control:
    loop_var: _plugin_name
  when: _plugin_deploy_list | length > 0
