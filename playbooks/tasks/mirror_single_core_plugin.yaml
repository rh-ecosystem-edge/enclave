---
- name: Load plugin descriptor for {{ _core_plugin_dir | basename }}
  ansible.builtin.include_vars:
    file: "{{ _core_plugin_dir }}/plugin.yaml"
    name: _core_plugin

- name: Normalize mirror value for {{ _core_plugin_dir | basename }}
  ansible.builtin.set_fact:
    _core_plugin_mirror: >-
      {% if _core_plugin.mirror is sameas true %}plugin
      {%- elif _core_plugin.mirror is sameas false %}none
      {%- else %}{{ _core_plugin.mirror | default('none') | string | lower }}
      {%- endif %}

- name: Load plugin defaults for {{ _core_plugin_dir | basename }}
  ansible.builtin.include_vars:
    file: "{{ _core_plugin_dir }}/config/defaults.yaml"
  when: lookup('ansible.builtin.fileglob', _core_plugin_dir ~ '/config/defaults.yaml') | length > 0

- name: Reset plugin_operators_file for {{ _core_plugin_dir | basename }}
  ansible.builtin.set_fact:
    plugin_operators_file: {}

- name: Load plugin operators for {{ _core_plugin_dir | basename }}
  ansible.builtin.include_vars:
    file: "{{ _core_plugin_dir }}/operators/operators.yaml"
    name: plugin_operators_file
  when:
    - _core_plugin_mirror == 'core'
    - lookup('ansible.builtin.fileglob', _core_plugin_dir ~ '/operators/operators.yaml') | length > 0

- name: Template imageset for {{ _core_plugin_dir | basename }}
  ansible.builtin.template:
    src: "{{ _core_plugin_dir }}/mirror/imageset.yaml.j2"
    dest: "{{ workingDir }}/plugin-{{ _core_plugin_dir | basename }}-imageset.yaml"
  when:
    - _core_plugin_mirror == 'core'
    - lookup('ansible.builtin.fileglob', _core_plugin_dir ~ '/mirror/imageset.yaml.j2') | length > 0

- name: Run oc-mirror for core plugin {{ _core_plugin_dir | basename }}
  ansible.builtin.shell: |
    {{ workingDir }}/bin/oc-mirror --v2 \
      --log-level {{ ocMirrorLogLevel }} \
      --authfile "{{ pullSecretPath }}" \
      -c {{ workingDir }}/plugin-{{ _core_plugin_dir | basename }}-imageset.yaml \
      --workspace file://{{ workingDir }}/config/oc-mirror-workspace \
      docker://{{ quayHostname }}:8443 \
      --dest-tls-verify=false \
      --parallel-images 10 \
      --parallel-layers 10 \
      --retry-times 10 \
      --retry-delay 0 \
      > {{ workingDir }}/logs/oc-mirror-core-plugin-{{ _core_plugin_dir | basename }}.progress.$(date +%s).log 2>&1
  retries: 10
  delay: 10
  register: r_core_plugin_mirror
  until: r_core_plugin_mirror is success
  when:
    - _core_plugin_mirror == 'core'
    - lookup('ansible.builtin.fileglob', _core_plugin_dir ~ '/mirror/imageset.yaml.j2') | length > 0
