---
- name: Load plugin descriptor for {{ _core_plugin_dir | basename }}
  ansible.builtin.include_vars:
    file: "{{ _core_plugin_dir }}/plugin.yaml"
    name: _core_plugin

- name: Set mirror mode for {{ _core_plugin_dir | basename }}
  ansible.builtin.set_fact:
    _core_plugin_mirror: "{{ _core_plugin.mirror | default('none') | string | lower }}"

- name: Load plugin defaults for {{ _core_plugin_dir | basename }}
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ _core_plugin.defaults | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: _core_plugin.defaults is defined

- name: Template imageset for {{ _core_plugin_dir | basename }}
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/plugin-imageset.yaml.j2"
    dest: "{{ workingDir }}/plugin-{{ _core_plugin_dir | basename }}-imageset.yaml"
  vars:
    plugin: "{{ _core_plugin }}"
  when:
    - _core_plugin_mirror == 'core'
    - _core_plugin.operators is defined

- name: Run oc-mirror for core plugin {{ _core_plugin_dir | basename }}
  ansible.builtin.shell: |
    {{ workingDir }}/bin/oc-mirror --v2 \
      --log-level {{ ocMirrorLogLevel }} \
      --authfile "{{ pullSecretPath }}" \
      -c {{ workingDir }}/plugin-{{ _core_plugin_dir | basename }}-imageset.yaml \
      --workspace file://{{ workingDir }}/config/oc-mirror-workspace \
      docker://{{ quayHostname }}:8443 \
      --dest-tls-verify=false \
      --parallel-images 10 \
      --parallel-layers 10 \
      --retry-times 10 \
      --retry-delay 0 \
      > {{ workingDir }}/logs/oc-mirror-core-plugin-{{ _core_plugin_dir | basename }}.progress.$(date +%s).log 2>&1
  retries: 10
  delay: 10
  register: r_core_plugin_mirror
  until: r_core_plugin_mirror is success
  when:
    - _core_plugin_mirror == 'core'
    - _core_plugin.operators is defined
