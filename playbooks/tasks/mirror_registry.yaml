---
- name: Gather facts on a specific container
  containers.podman.podman_container_info:
    name: quay-app
  register: r_container_quay_app

- name: Install mirror-registry
  when:
    - r_container_quay_app.containers | default([]) | length == 0
  block:
    - name: Deploy mirror-registry
      no_log: true
      ansible.builtin.command: |
        {{ workingDir }}/bin/mirror-registry  install --quayHostname "{{ quayHostname }}" --quayRoot {{ workingDir }}/data --initPassword "{{ quayPassword }}" --initUser "{{ quayUser }}"
      register: r_mirror_registry

- name: Generate pull secret for internal mirror
  no_log: true
  ansible.builtin.set_fact:
    pullSecretInternal: '{"auths":{"{{ quayHostname }}:8443":{"auth":"{{ (quayUser + ":" + quayPassword) | ansible.builtin.b64encode }}"}}}'

- name: Combine pull secrets
  no_log: true
  ansible.builtin.set_fact:
    pullSecretNew: "{{ pullSecret | ansible.builtin.combine(pullSecretInternal, recursive=true) }}"

- name: Create pull-secret file with the combination
  no_log: true
  ansible.builtin.copy:
    content: "{{ pullSecretNew }}"
    dest: "{{ pullSecretPath }}"

- name: Create pull-secret internal file with the combination
  no_log: true
  ansible.builtin.copy:
    content: "{{ pullSecretInternal }}"
    dest: "{{ workingDir }}/config/pull-secret.internal.json"

- name: Copy imagesetconfiguration.yaml
  ansible.builtin.template:
    src: ../../templates/imagesetconfiguration.yaml.j2
    dest: "{{ workingDir }}/config/imagesetconfiguration.yaml"

- name: Ensure oc-mirror log directory exists
  ansible.builtin.file:
    path: "{{ workingDir }}/logs/"
    state: directory

- name: Set oc-mirror log path
  ansible.builtin.set_fact:
    _oc_mirror_log: "{{ workingDir }}/logs/oc-mirror.progress.{{ lookup('pipe', 'date +%s') }}.log"

- name: Show oc-mirror log path
  ansible.builtin.debug:
    msg: "oc-mirror log file: {{ _oc_mirror_log }}"

- name: Start oc-mirror process
  block:
    - name: Run oc-mirror to mirror registry
      ansible.builtin.shell: |
        {{ workingDir }}/bin/oc-mirror --v2 \
          {{ '--dry-run' if (mirror_dry_run | default(false) | bool) else '' }} \
          --log-level {{ ocMirrorLogLevel }} \
          --authfile {{ pullSecretPath }} \
          --dest-tls-verify=false \
          -c {{ workingDir }}/config/imagesetconfiguration.yaml \
          --workspace file://{{ workingDir }}/config/oc-mirror-workspace \
          --parallel-images {{ ocMirrorParallelImages }} \
          --parallel-layers {{ ocMirrorParallelLayers }} \
          --retry-times {{ ocMirrorRetryTimes }} \
          --retry-delay {{ ocMirrorRetryDelay }} \
          docker://{{ quayHostname }}:8443 \
          > {{ _oc_mirror_log }} 2>&1
      retries: "{{ 1 if (mirror_dry_run | default(false) | bool) else ocMirrorAnsibleRetries }}"
      delay: "{{ 0 if (mirror_dry_run | default(false) | bool) else ocMirrorAnsibleDelay }}"
      register: r_oc_mirror
      until: r_oc_mirror is success

  rescue:
    - name: Read oc-mirror log tail
      ansible.builtin.command:
        argv:
          - tail
          - -n
          - "10"
          - "{{ _oc_mirror_log }}"
      register: _oc_mirror_tail
      changed_when: false
      failed_when: false

    - name: oc-mirror failed
      ansible.builtin.fail:
        msg: |-
          oc-mirror to mirror registry failed after {{ r_oc_mirror.attempts }} attempts.

          {{ _oc_mirror_tail.stdout | default('Unable to read oc-mirror log tail.') }}

          Full log: {{ _oc_mirror_log }}
