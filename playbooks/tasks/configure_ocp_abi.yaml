---
- name: Ensure {{ workingDir }}/.ssh/ exists
  ansible.builtin.file:
    path: "{{ workingDir }}/.ssh/"
    state: directory
    mode: "0700"

- name: Generate SSH keypair if doesn't exist
  community.crypto.openssh_keypair:
    path: "{{ sshPubPath | replace('.pub','') }}"
    type: ed25519
    regenerate: never
    backend: cryptography
    private_key_format: ssh

- name: Extract openshift-install binary
  ansible.builtin.command: |
    {{ workingDir }}/bin/oc adm release extract --registry-config={{ pullSecretPath }} --command=openshift-install --to {{ workingDir }}/bin/
    quay.io/openshift-release-dev/ocp-release:{{ mgmt_openshift_version }}-x86_64

- name: Ensure {{ workingDir }}/ocp-cluster/ exists
  ansible.builtin.file:
    path: "{{ workingDir }}/ocp-cluster/"
    state: directory

- name: Ensure {{ workingDir }}/ocp-cluster/openshift/ exists
  ansible.builtin.file:
    path: "{{ workingDir }}/ocp-cluster/openshift/"
    state: directory

- name: Set install-config template based on deployment mode
  ansible.builtin.set_fact:
    install_config_template: "install-config-{{ 'disconnected' if (disconnected | default(true)) else 'connected' }}.yaml.j2"

- name: Display selected template
  ansible.builtin.debug:
    msg: "Using template: {{ install_config_template }} for {{ 'disconnected' if (disconnected | default(true)) else 'connected' }} mode"

- name: Generate the install-config.yaml from mode-specific template
  ansible.builtin.template:
    src: "../../templates/{{ install_config_template }}"
    dest: "{{ workingDir }}/ocp-cluster/install-config.yaml"

- name: Generate the agent-config.yaml from template
  ansible.builtin.template:
    src: "../../templates/agent-config.yaml.j2"
    dest: "{{ workingDir }}/ocp-cluster/agent-config.yaml"

- name: Create KubeletConfig manifest for master max pods
  ansible.builtin.copy:
    dest: "{{ workingDir }}/ocp-cluster/openshift/99-worker-max-pods.yaml"
    content: |
      apiVersion: machineconfiguration.openshift.io/v1
      kind: KubeletConfig
      metadata:
        name: set-master-max-pods
      spec:
        machineConfigPoolSelector:
          matchLabels:
            pools.operator.machineconfiguration.openshift.io/master: ""
        kubeletConfig:
          maxPods: {{ masterMaxPods }}
    mode: '0644'

- name: Copy custom manifests from mirror registry to the ABI directory
  when: disconnected | default(true)
  ansible.builtin.copy:
    src: "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources/{{ item }}"
    dest: "{{ workingDir }}/ocp-cluster/openshift/{{ item }}"
  loop:
    - idms-oc-mirror.yaml
    - itms-oc-mirror.yaml
    - signature-configmap.yaml
    - cs-redhat-operator-index-v4-20.yaml

- name: Enable diskEncryption if set
  when: diskEncryption | default(false) == true
  block:
    - name: Generate cluster manifests
      ansible.builtin.command: |
        {{ workingDir }}/bin/openshift-install agent create cluster-manifests --dir {{ workingDir }}/ocp-cluster/

    - name: Set diskEncryption config var
      ansible.builtin.set_fact:
        disk_encryption_def: |
          diskEncryption:
            enableOn: all
            mode: tpmv2

    - name: Add diskEncryption
      ansible.builtin.blockinfile:
        path: "{{ workingDir }}/ocp-cluster/cluster-manifests/agent-cluster-install.yaml"
        append_newline: true
        prepend_newline: true
        insertafter: "spec:"
        block: "{{ disk_encryption_def | indent(2, true) }}"

- name: Generate the ISO image
  ansible.builtin.command:
    cmd: "{{ workingDir }}/bin/openshift-install agent create image --dir {{ workingDir }}/ocp-cluster/"

- name: Ensure {{ workingDir }}/ocp-cluster/abi-iso/ exists
  ansible.builtin.file:
    path: "{{ workingDir }}/ocp-cluster/abi-iso/"
    state: directory

- name: Inject installation gate into agent ISO
  when: installation_gate | default(true) | bool
  block:
    - name: Write gate script content
      ansible.builtin.copy:
        dest: "{{ workingDir }}/ocp-cluster/installation-gate.sh"
        mode: "0755"
        content: |
          #!/bin/bash
          echo "=========================================="
          echo "  Installation gate is ACTIVE"
          echo "  Waiting for release signal..."
          echo "  To proceed, run:"
          echo "    touch /var/tmp/proceed-with-installation"
          echo "=========================================="
          while [ ! -f /var/tmp/proceed-with-installation ]; do
            sleep 5
          done
          echo "Gate released. Proceeding with installation..."

    - name: Extract ignition and inject gate service
      ansible.builtin.shell: |
        set -euo pipefail

        GATE_SCRIPT_B64=$(base64 -w0 {{ workingDir }}/ocp-cluster/installation-gate.sh)

        podman run --privileged --rm \
          -v {{ workingDir }}/ocp-cluster:/data:z -w /data \
          quay.io/coreos/coreos-installer:release \
          iso ignition show agent.x86_64.iso \
        | jq --compact-output \
            --arg script_b64 "$GATE_SCRIPT_B64" \
            '
            # Add gate script file
            .storage.files += [{
              "path": "/usr/local/bin/installation-gate.sh",
              "mode": 493,
              "contents": { "source": ("data:text/plain;charset=utf-8;base64," + $script_b64) },
              "overwrite": true
            }]
            # Add gate service unit
            | .systemd.units += [{
              "name": "installation-gate.service",
              "enabled": true,
              "contents": "[Unit]\nDescription=Installation gate - blocks start-cluster-installation\nBefore=start-cluster-installation.service\n\n[Service]\nType=oneshot\nExecStart=/usr/local/bin/installation-gate.sh\nRemainAfterExit=yes\nStandardOutput=journal+console\n\n[Install]\nRequiredBy=start-cluster-installation.service\n"
            }]
            # Add drop-in to make start-cluster-installation depend on gate
            | (.systemd.units[] |
                select(.name == "start-cluster-installation.service")) |=
                . + { "dropins": ((.dropins // []) + [{
                  "name": "10-wait-for-gate.conf",
                  "contents": "[Unit]\nRequires=installation-gate.service\nAfter=installation-gate.service\n"
                }]) }
            ' \
        > {{ workingDir }}/ocp-cluster/gated.ign

    - name: Embed gated ignition back into agent ISO
      ansible.builtin.command:
        cmd: >-
          podman run --privileged --rm
          -v {{ workingDir }}/ocp-cluster:/data:z
          -w /data
          quay.io/coreos/coreos-installer:release
          iso ignition embed -f -i gated.ign agent.x86_64.iso

    - name: Remove temporary gate files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ workingDir }}/ocp-cluster/gated.ign"
        - "{{ workingDir }}/ocp-cluster/installation-gate.sh"

- name: Move to {{ workingDir }}/ocp-cluster/abi-iso/
  ansible.builtin.command:
    cmd: mv "{{ workingDir }}/ocp-cluster/agent.x86_64.iso" "{{ workingDir }}/ocp-cluster/abi-iso/agent.x86_64.iso"
