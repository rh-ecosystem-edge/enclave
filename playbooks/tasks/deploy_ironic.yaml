---
# Ironic deployment tasks - deploys Ironic and HTTP server in a pod

- name: Get ironic image from OpenShift release
  ansible.builtin.command: >
    {{ workingDir }}/bin/oc adm release info --registry-config={{ pullSecretPath }} --image-for ironic
    quay.io/openshift-release-dev/ocp-release:{{ mgmt_openshift_version }}-x86_64
  register: r_ironic_image
  changed_when: false

- name: Set ironic image fact
  ansible.builtin.set_fact:
    metal3_ironic_image: "{{ r_ironic_image.stdout }}"

- name: Generate htpasswd hash for Ironic credentials
  ansible.builtin.command:
    argv:
      - /usr/bin/htpasswd
      - -nbB
      - "{{ metal3_ironic_username }}"
      - "{{ metal3_ironic_password }}"
  register: r_htpasswd
  changed_when: false
  no_log: true

- name: Set htpasswd variable
  ansible.builtin.set_fact:
    metal3_ironic_htpasswd: "{{ r_htpasswd.stdout }}"
  no_log: true

- name: Create podman secret for ironic htpasswd
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_secret:
    name: metal3-ironic-htpasswd
    data: "{{ metal3_ironic_htpasswd }}"
    state: present
    force: false
  no_log: true

- name: Check if SSL certificates are configured
  ansible.builtin.set_fact:
    ssl_certs_configured: "{{ (sslIngressCertificateFullChain is defined and sslIngressCertificateFullChain | length > 0) }}"

- name: Create podman secret for CA bundle
  when: ssl_certs_configured | bool
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_secret:
    name: metal3-ca-bundle
    data: "{{ sslIngressCertificateFullChain + sslCACertificate | default('') }}"
    state: present
    force: false
  no_log: true

- name: Create ironic-conf volume
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_volume:
    name: metal3-ironic-conf
    state: present

- name: Create ironic-data volume
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_volume:
    name: metal3-ironic-data
    state: present

- name: Create ironic-shared volume
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_volume:
    name: metal3-ironic-shared
    state: present

- name: Pre-pull ironic image
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_image:
    name: "{{ metal3_ironic_image }}"
    auth_file: "{{ pullSecretPath }}"
    state: present

- name: Deploy Ironic containers (ephemeral)
  when: not (metal3_persistent | default(false) | bool)
  ansible.builtin.include_tasks: deploy_ironic_containers.yaml

- name: Deploy Ironic via quadlet (persistent)
  when: metal3_persistent | default(false) | bool
  ansible.builtin.include_tasks: deploy_ironic_quadlet_units.yaml

- name: Verify HTTP server accessibility
  ansible.builtin.uri:
    url: "http://{{ lzBmcIP }}:6180/"
    method: HEAD
    status_code: [200, 301, 302, 404]
  register: r_http
  retries: 30
  delay: 10
  until: r_http is succeeded

- name: Verify Ironic API accessibility
  ansible.builtin.uri:
    url: "http://localhost:6385/v1/"
    method: GET
    status_code: [200, 401]
    user: "{{ metal3_ironic_username }}"
    password: "{{ metal3_ironic_password }}"
    force_basic_auth: true
  register: r_ironic_api
  retries: 30
  delay: 10
  until: r_ironic_api is succeeded

- name: Display metal3-ironic pod status
  containers.podman.podman_pod_info:
    name: metal3-ironic
  register: r_pod_status

- name: Show pod status
  ansible.builtin.debug:
    msg: "Pod: {{ r_pod_status.pods[0].Name }} | State: {{ r_pod_status.pods[0].State }} | Containers: {{ r_pod_status.pods[0].Containers | length }}"
  when: r_pod_status.pods | length > 0
