---
# Ironic deployment tasks - deploys Ironic and HTTP server in a pod

- name: Get ironic image from OpenShift release
  ansible.builtin.command: >
    {{ workingDir }}/bin/oc adm release info --registry-config={{ pullSecretPath }} --image-for ironic
    quay.io/openshift-release-dev/ocp-release:{{ mgmt_openshift_version }}-x86_64
  register: r_ironic_image
  changed_when: false

- name: Set ironic image fact
  ansible.builtin.set_fact:
    metal3_ironic_image: "{{ r_ironic_image.stdout }}"

- name: Generate htpasswd hash for Ironic credentials
  ansible.builtin.command:
    argv:
      - /usr/bin/htpasswd
      - -nbB
      - "{{ metal3_ironic_username }}"
      - "{{ metal3_ironic_password }}"
  register: r_htpasswd
  changed_when: false
  no_log: true

- name: Set htpasswd variable
  ansible.builtin.set_fact:
    metal3_ironic_htpasswd: "{{ r_htpasswd.stdout }}"
  no_log: true

- name: Create podman secret for ironic htpasswd
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_secret:
    name: metal3-ironic-htpasswd
    data: "{{ metal3_ironic_htpasswd }}"
    state: present
    force: false
  no_log: true

- name: Check if SSL certificates are configured
  ansible.builtin.set_fact:
    ssl_certs_configured: "{{ (sslIngressCertificateFullChain is defined and sslIngressCertificateFullChain | length > 0) }}"

- name: Check if Ironic HTTPS is configured
  ansible.builtin.set_fact:
    ironic_https_configured: >-
      {{
        ironicHTTPSCertificate is defined and ironicHTTPSCertificate | length > 0
        and ironicHTTPSKey is defined and ironicHTTPSKey | length > 0
      }}

- name: Check if Ironic HTTPS CA is configured
  ansible.builtin.set_fact:
    ironic_https_ca_configured: >-
      {{
        ironicHTTPSCACertificate is defined and ironicHTTPSCACertificate | length > 0
      }}

- name: Assert Ironic HTTPS inputs are complete
  when: >-
    (ironicHTTPSCertificate is defined and ironicHTTPSCertificate | length > 0)
    or (ironicHTTPSKey is defined and ironicHTTPSKey | length > 0)
  ansible.builtin.assert:
    that:
      - ironic_https_configured | bool
    fail_msg: "Set both ironicHTTPSCertificate and ironicHTTPSKey to enable Ironic HTTPS."

- name: Create podman secret for CA bundle
  when: ssl_certs_configured | bool
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_secret:
    name: metal3-ca-bundle
    data: "{{ sslIngressCertificateFullChain + sslCACertificate | default('') }}"
    state: present
    force: false
  no_log: true

- name: Set Ironic HTTPS CA certificate file path
  become: "{{ metal3_persistent | default(false) | bool }}"
  when:
    - ironic_https_configured | bool
    - ironic_https_ca_configured | bool
  ansible.builtin.set_fact:
    ironic_ca_certfile: "{{ ironic_ca_certfile | default(workingDir + '/logs/ironic-iso-ca.crt') }}"

- name: Write Ironic HTTPS CA certificate to temp file
  become: "{{ metal3_persistent | default(false) | bool }}"
  when:
    - ironic_https_configured | bool
    - ironic_https_ca_configured | bool
  ansible.builtin.copy:
    content: "{{ ironicHTTPSCACertificate }}\n"
    dest: "{{ ironic_ca_certfile }}"
    mode: "0644"

- name: Check if httpd container is already running
  when: ironic_https_configured | bool
  containers.podman.podman_container_info:
    name: httpd
  register: httpd_precheck
  failed_when: false

- name: Create podman secret for Ironic vmedia TLS certificate
  when: ironic_https_configured | bool
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_secret:
    name: ironic-vmedia-cert
    data: "{{ ironicHTTPSCertificate }}\n"
    state: present
    force: false
  no_log: true
  register: vmedia_cert_secret

- name: Create podman secret for Ironic vmedia TLS key
  when: ironic_https_configured | bool
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_secret:
    name: ironic-vmedia-key
    data: "{{ ironicHTTPSKey }}\n"
    state: present
    force: false
  no_log: true
  register: vmedia_key_secret

- name: Create ironic-conf volume
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_volume:
    name: metal3-ironic-conf
    state: present

- name: Create ironic-data volume
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_volume:
    name: metal3-ironic-data
    state: present

- name: Create ironic-shared volume
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_volume:
    name: metal3-ironic-shared
    state: present

- name: Pre-pull ironic image
  become: "{{ metal3_persistent | default(false) | bool }}"
  containers.podman.podman_image:
    name: "{{ metal3_ironic_image }}"
    auth_file: "{{ pullSecretPath }}"
    state: present

- name: Deploy Ironic containers (ephemeral)
  when: not (metal3_persistent | default(false) | bool)
  ansible.builtin.include_tasks: deploy_ironic_containers.yaml

- name: Deploy Ironic via quadlet (persistent)
  when: metal3_persistent | default(false) | bool
  ansible.builtin.include_tasks: deploy_ironic_quadlet_units.yaml

- name: Verify HTTP server accessibility
  ansible.builtin.uri:
    url: "http://{{ lzBmcIP }}:6180/"
    method: HEAD
    status_code: [200, 301, 302, 404]
  register: r_http
  retries: 30
  delay: 10
  until: r_http is succeeded

- name: Verify HTTPS vmedia server accessibility
  when: ironic_https_configured | bool
  block:
    - name: Wait for HTTPS vmedia port
      ansible.builtin.wait_for:
        host: "{{ lzBmcIP }}"
        port: 6183
        timeout: 300
  rescue:
    - name: Capture httpd logs on HTTPS check failure
      ansible.builtin.command: podman logs httpd
      register: r_httpd_failure_logs
      changed_when: false
      failed_when: false

    - name: Show httpd logs
      ansible.builtin.debug:
        msg: "{{ (r_httpd_failure_logs.stdout_lines | default([])) + (r_httpd_failure_logs.stderr_lines | default([])) }}"

    - name: Fail after printing httpd logs
      ansible.builtin.fail:
        msg: >-
          HTTPS vmedia port 6183
          on {{ lzBmcIP }} did not become reachable within 300 s.
          Check httpd logs above for TLS or configuration errors.

- name: Verify Ironic API accessibility
  ansible.builtin.uri:
    url: "http://localhost:6385/v1/"
    method: GET
    status_code: [200, 401]
    user: "{{ metal3_ironic_username }}"
    password: "{{ metal3_ironic_password }}"
    force_basic_auth: true
  register: r_ironic_api
  retries: 30
  delay: 10
  until: r_ironic_api is succeeded

- name: Display metal3-ironic pod status
  containers.podman.podman_pod_info:
    name: metal3-ironic
  register: r_pod_status

- name: Show pod status
  ansible.builtin.debug:
    msg: "Pod: {{ r_pod_status.pods[0].Name }} | State: {{ r_pod_status.pods[0].State }} | Containers: {{ r_pod_status.pods[0].Containers | length }}"
  when: r_pod_status.pods | length > 0
