---
# Red Hat Sovereign Enclave - Migration Runner
#
# Runs pending versioned migrations against the LZ host. Migrations are files
# named YYYYMMDDHHMMSS_description.yaml under playbooks/tasks/migrations/.
#
# A control file (path from migrationTasksFilePath, default workingDir/migrations/tasks.txt)
# on the LZ host records one applied migration filename per line (append-only).
# Migrations not listed in the control file are considered pending and are run
# in lexicographic order.
#
# If the control file is absent (first upgrade on a pre-migration-system install)
# all migrations are run. bootstrap.sh seeds the control file on fresh installs
# so that migrations already baked into the installer are not re-applied.
#
# Called from upgrade.yaml via include_tasks.

- name: Read LZ migration control file
  ansible.builtin.slurp:
    src: "{{ migrationTasksFilePath }}"
  register: r_control_file
  ignore_errors: true

- name: Set applied migrations fact
  ansible.builtin.set_fact:
    _applied_migrations: >-
      {{ (r_control_file.content | b64decode).splitlines()
         if not r_control_file.failed else [] }}

- name: Find migration files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/tasks/migrations"
    patterns: "[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]_*.yaml"
  register: r_migrations

- name: Set pending migrations fact
  ansible.builtin.set_fact:
    _pending_migrations: >-
      {{ r_migrations.files
         | map(attribute='path')
         | map('basename')
         | reject('in', _applied_migrations)
         | sort
         | list }}

- name: Run pending migrations
  ansible.builtin.include_tasks:
    file: run_single_migration.yaml
  loop: "{{ _pending_migrations }}"
  loop_control:
    loop_var: migration_file
