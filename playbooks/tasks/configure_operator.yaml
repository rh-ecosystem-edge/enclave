---
- name: "Ensure Namespace exists"
  kubernetes.core.k8s:
    state: present
    api_version: v1
    kind: Namespace
    name: "{{ operator.namespace }}"
  register: r_namespace_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_namespace_exists is success

- name: "Check if OperatorGroup already exists in namespace"
  when: operator.namespace != "openshift-operators"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1
    kind: OperatorGroup
    namespace: "{{ operator.namespace }}"
  register: r_og_check

- name: "Fail if multiple OperatorGroups exist in namespace"
  when:
    - operator.namespace != "openshift-operators"
    - r_og_check.resources | default([]) | length > 1
  ansible.builtin.fail:
    msg: >-
      Found {{ r_og_check.resources | length }} OperatorGroups in namespace {{ operator.namespace }},
      but only one is allowed. Remove the extra OperatorGroups before proceeding.

- name: "Ensure OperatorGroup exists (with target namespace)"
  when:
    - operator.namespace != "openshift-operators"
    - r_og_check.resources | default([]) | length == 0
    - not (operator.global | default(false))
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: "{{ operator.namespace }}-og"
        namespace: "{{ operator.namespace }}"
      spec:
        targetNamespaces:
          - "{{ operator.namespace }}"
  register: r_operatorgroup_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_operatorgroup_exists is success

- name: "Ensure OperatorGroup exists (global - without target namespace)"
  when:
    - operator.namespace != "openshift-operators"
    - r_og_check.resources | default([]) | length == 0
    - operator.global | default(false)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: "{{ operator.namespace }}-og"
        namespace: "{{ operator.namespace }}"
      spec: {}
  register: r_operatorgroup_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_operatorgroup_exists is success

- name: "Check if Subscription already exists"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ operator.name }}"
    namespace: "{{ operator.namespace }}"
  register: r_sub_check

- name: "Determine if operator should use automatic approval"
  ansible.builtin.set_fact:
    _use_automatic_approval: >-
      {{ operator.namespace == "openshift-operators" or
         (operator.connected_auto | default(false) | bool and not (disconnected | default(true) | bool)) }}

- name: "Ensure Subscription exists (Automatic)"
  when:
    - r_sub_check.resources | length == 0
    - _use_automatic_approval | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: "{{ operator.name }}"
        namespace: "{{ operator.namespace }}"
      spec:
        installPlanApproval: Automatic
        channel: "{{ operator.channel }}"
        name: "{{ operator.name }}"
        source: "{{ operator.source | default(default_operator_source) if (disconnected | default(true) | bool) else 'redhat-operators' }}"
        sourceNamespace: openshift-marketplace
  register: r_sub_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_sub_exists is success

- name: "Ensure Subscription exists (Manual)"
  when:
    - r_sub_check.resources | length == 0
    - not (_use_automatic_approval | bool)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: "{{ operator.name }}"
        namespace: "{{ operator.namespace }}"
      spec:
        installPlanApproval: Manual
        channel: "{{ operator.channel }}"
        name: "{{ operator.name }}"
        source: "{{ operator.source | default(default_operator_source) if (disconnected | default(true) | bool) else 'redhat-operators' }}"
        sourceNamespace: openshift-marketplace
        startingCSV: "{{ operator.csvNames | default([]) | first | default(operator.name) }}.v{{ operator.version | replace('+', '-') }}"
  register: r_sub_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_sub_exists is success

- name: "Wait for Install Plan ({{ operator.name }})"
  when:
    - r_sub_check.resources | length == 0
    - not (_use_automatic_approval | bool)
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ operator.name }}"
    namespace: "{{ operator.namespace }}"
  register: r_subscription
  retries: 30
  delay: 10
  until:
    - r_subscription.resources[0].status.installplan is defined
    - r_subscription.resources[0].status.installplan | length > 0

- name: "Approve Install Plan ({{ operator.name }})"
  when:
    - r_sub_check.resources | length == 0
    - not (_use_automatic_approval | bool)
  ansible.builtin.shell: |
    enclave reconcile operator-versions \
      --name "{{ operator.name }}" \
      --version "{{ operator.version }}" \
      --namespace "{{ operator.namespace }}" \
      {% for csv in (operator.csvNames | default([operator.name])) %}--csv-name "{{ csv }}" {% endfor %}\
      --no-dry-run
  register: operator_update_result

- name: Print Install Plan approval output ({{ operator.name }})
  when:
    - r_sub_check.resources | length == 0
    - not (_use_automatic_approval | bool)
  ansible.builtin.debug:
    var: operator_update_result.stderr_lines

- name: "Get Installed CSV ({{ operator.name }})"
  when:
    - r_sub_check.resources | length == 0
    - _use_automatic_approval | bool
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ operator.name }}"
    namespace: "{{ operator.namespace }}"
  register: r_subscription
  retries: 30
  delay: 10
  until:
    - r_subscription.resources[0].status.currentCSV is defined
    - r_subscription.resources[0].status.currentCSV | length > 0

- name: "Wait until CSV is installed"
  when:
    - r_sub_check.resources | length == 0
    - _use_automatic_approval | bool
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ r_subscription.resources[0].status.currentCSV }}"
    namespace: "{{ operator.namespace }}"
  register: r_csv
  retries: 30
  delay: 30
  until:
    - r_csv.resources[0].status.phase is defined
    - r_csv.resources[0].status.phase | length > 0
    - r_csv.resources[0].status.phase == "Succeeded"


- name: Include specific tasks for the operator
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "../../operators/{{ operator.name }}/tasks.yaml"
      skip: true
