---
- name: "Ensure Namespace exists"
  kubernetes.core.k8s:
    state: present
    api_version: v1
    kind: Namespace
    name: "{{ operator.namespace }}"
  register: r_namespace_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_namespace_exists is success

- name: "Ensure OperatorGroup exists (with target namespace)"
  when:
    - operator.namespace != "openshift-operators"
    - not (operator.global | default(false))
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: "{{ operator.name }}-og"
        namespace: "{{ operator.namespace }}"
      spec:
        targetNamespaces:
          - "{{ operator.namespace }}"
  register: r_operatorgroup_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_operatorgroup_exists is success

- name: "Ensure OperatorGroup exists (global - without target namespace)"
  when:
    - operator.namespace != "openshift-operators"
    - operator.global | default(false)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: "{{ operator.name }}-og"
        namespace: "{{ operator.namespace }}"
      spec: {}
  register: r_operatorgroup_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_operatorgroup_exists is success

- name: "Check if Subscription already exists"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ operator.name }}"
    namespace: "{{ operator.namespace }}"
  register: r_sub_check

# Handle pre-existing subscriptions that reference a non-existent CatalogSource.
# For example, the ingress-operator creates a servicemeshoperator3 Subscription
# with source: redhat-operators, which doesn't exist in disconnected mode.
# The ingress-operator actively manages the subscription spec and overwrites any
# changes, so instead of fighting it we create a CatalogSource alias that makes
# the existing subscription resolve to the mirrored catalog.
- name: "Handle pre-existing Subscription with wrong source (disconnected mode)"
  when:
    - r_sub_check.resources | length > 0
    - disconnected | default(true) | bool
    - r_sub_check.resources[0].spec.source != operator.source
  block:
    - name: "Check if CatalogSource '{{ r_sub_check.resources[0].spec.source }}' exists"
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: CatalogSource
        name: "{{ r_sub_check.resources[0].spec.source }}"
        namespace: openshift-marketplace
      register: r_sub_source_cs

    - name: "Get image from CatalogSource '{{ operator.source }}'"
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: CatalogSource
        name: "{{ operator.source }}"
        namespace: openshift-marketplace
      register: r_correct_cs
      when: r_sub_source_cs.resources | length == 0

    - name: "Create CatalogSource alias '{{ r_sub_check.resources[0].spec.source }}' pointing to mirror"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: operators.coreos.com/v1alpha1
          kind: CatalogSource
          metadata:
            name: "{{ r_sub_check.resources[0].spec.source }}"
            namespace: openshift-marketplace
          spec:
            sourceType: grpc
            image: "{{ r_correct_cs.resources[0].spec.image }}"
            updateStrategy:
              registryPoll:
                interval: 10m
      when:
        - r_sub_source_cs.resources | length == 0
        - r_correct_cs.resources | length > 0

    - name: "Wait for CatalogSource '{{ r_sub_check.resources[0].spec.source }}' to be READY"
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: CatalogSource
        name: "{{ r_sub_check.resources[0].spec.source }}"
        namespace: openshift-marketplace
      register: r_alias_cs_ready
      retries: 30
      delay: 10
      until:
        - r_alias_cs_ready.resources | length > 0
        - r_alias_cs_ready.resources[0].status.connectionState.lastObservedState | default('') == 'READY'
      when:
        - r_sub_source_cs.resources | length == 0
        - r_correct_cs.resources | length > 0

    - name: "Wait for InstallPlan ({{ operator.name }})"
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: "{{ operator.name }}"
        namespace: "{{ operator.namespace }}"
      register: r_sub_installplan
      retries: 30
      delay: 10
      until:
        - r_sub_installplan.resources[0].status.installplan is defined
        - r_sub_installplan.resources[0].status.installplan.name | default('') | length > 0

    - name: "Approve InstallPlan for {{ operator.name }}"
      kubernetes.core.k8s:
        state: present
        merge_type: merge
        definition:
          apiVersion: operators.coreos.com/v1alpha1
          kind: InstallPlan
          metadata:
            name: "{{ r_sub_installplan.resources[0].status.installplan.name }}"
            namespace: "{{ operator.namespace }}"
          spec:
            approved: true

    - name: "Wait for CSV ({{ operator.name }})"
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: "{{ operator.name }}"
        namespace: "{{ operator.namespace }}"
      register: r_subscription
      retries: 30
      delay: 10
      until:
        - r_subscription.resources[0].status.currentCSV is defined
        - r_subscription.resources[0].status.currentCSV | length > 0

    - name: "Wait until CSV is Succeeded ({{ operator.name }})"
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        name: "{{ r_subscription.resources[0].status.currentCSV }}"
        namespace: "{{ operator.namespace }}"
      register: r_csv
      retries: 30
      delay: 30
      until:
        - r_csv.resources[0].status.phase is defined
        - r_csv.resources[0].status.phase == "Succeeded"

- name: "Ensure Subscription exists (Automatic)"
  when:
    - r_sub_check.resources | length == 0
    - operator.namespace == "openshift-operators"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: "{{ operator.name }}"
        namespace: "{{ operator.namespace }}"
      spec:
        installPlanApproval: Automatic
        channel: "{{ operator.channel }}"
        name: "{{ operator.name }}"
        source: "{{ operator.source if (disconnected | default(true)) else 'redhat-operators' }}"
        sourceNamespace: openshift-marketplace
  register: r_sub_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_sub_exists is success

- name: "Ensure Subscription exists (Manual)"
  when:
    - r_sub_check.resources | length == 0
    - operator.namespace != "openshift-operators"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: "{{ operator.name }}"
        namespace: "{{ operator.namespace }}"
      spec:
        installPlanApproval: Manual
        channel: "{{ operator.channel }}"
        name: "{{ operator.name }}"
        source: "{{ operator.source if (disconnected | default(true)) else 'redhat-operators' }}"
        sourceNamespace: openshift-marketplace
        startingCSV: "{{ operator.csvName | default(operator.name) }}.v{{ operator.version | replace('+', '-') }}"
  register: r_sub_exists
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_sub_exists is success

- name: "Wait for Install Plan ({{ operator.name }})"
  when:
    - r_sub_check.resources | length == 0
    - operator.namespace != "openshift-operators"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ operator.name }}"
    namespace: "{{ operator.namespace }}"
  register: r_subscription
  retries: 30
  delay: 10
  until:
  - r_subscription.resources[0].status.installplan is defined
  - r_subscription.resources[0].status.installplan | length > 0

- name: "Approve Install Plan ({{ operator.name }})"
  when:
    - r_sub_check.resources | length == 0
    - operator.namespace != "openshift-operators"
  ansible.builtin.shell: |
    python ../helpers/operator-update/approve_installplans.py "{{ [operator] }}" "False"
  register: operator_update_result

- name: Print the output
  when:
    - r_sub_check.resources | length == 0
    - operator.namespace != "openshift-operators"
  ansible.builtin.debug:
    var: operator_update_result.stdout_lines

- name: "Get Installed CSV ({{ operator.name }})"
  when:
    - r_sub_check.resources | length == 0
    - operator.namespace == "openshift-operators"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ operator.name }}"
    namespace: "{{ operator.namespace }}"
  register: r_subscription
  retries: 30
  delay: 10
  until:
  - r_subscription.resources[0].status.currentCSV is defined
  - r_subscription.resources[0].status.currentCSV | length > 0

- name: "Wait until CSV is installed"
  when:
    - r_sub_check.resources | length == 0
    - operator.namespace == "openshift-operators"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ r_subscription.resources[0].status.currentCSV }}"
    namespace: "{{ operator.namespace }}"
  register: r_csv
  retries: 30
  delay: 30
  until:
  - r_csv.resources[0].status.phase is defined
  - r_csv.resources[0].status.phase | length > 0
  - r_csv.resources[0].status.phase == "Succeeded"


- name: Include specific tasks for the operator
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "../../operators/{{ operator.name }}/tasks.yaml"
      skip: true
