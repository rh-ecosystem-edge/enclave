---
# Reusable tasks for deploying a plugin
#
# Required variables:
#   plugin_name: Name of the plugin directory under plugins/
#   workingDir: Working directory on the Landing Zone
#
# This file is included from both deploy-plugin.yaml (standalone) and
# 05-operators.yaml (core pipeline integration).

- name: Validate plugin_name is provided
  ansible.builtin.assert:
    that:
      - plugin_name is defined
      - plugin_name | length > 0
      - plugin_name is regex('^[A-Za-z0-9][A-Za-z0-9._-]*$')
    fail_msg: "plugin_name must be a valid name (alphanumeric, dots, hyphens, underscores; no path separators)"
  tags: always

- name: Set plugin directory
  ansible.builtin.set_fact:
    plugin_dir: "{{ playbook_dir }}/../plugins/{{ plugin_name }}"
  tags: always

- name: Verify plugin.yaml exists
  ansible.builtin.stat:
    path: "{{ plugin_dir }}/plugin.yaml"
  register: r_plugin_yaml
  tags: always

- name: Fail if plugin.yaml is missing
  ansible.builtin.assert:
    that: r_plugin_yaml.stat.exists
    fail_msg: "Plugin descriptor not found: {{ plugin_dir }}/plugin.yaml"
  tags: always

- name: Load plugin descriptor
  ansible.builtin.include_vars:
    file: "{{ plugin_dir }}/plugin.yaml"
    name: plugin
  tags: always

- name: Display plugin info
  ansible.builtin.debug:
    msg: "Deploying plugin '{{ plugin.name }}' (type={{ plugin.type }}, order={{ plugin.order | default('unset') }}, mirror={{ plugin.mirror | default('none') }})"
  tags: always

# Dynamically set each key in plugin.defaults as an Ansible fact.
# The dict2items loop is required because set_fact needs explicit key: value
# pairs — the free-form `set_fact: "{{ dict }}"` renders to a string and
# does not expand into individual facts.
# noqa: var-naming[no-jinja] is needed because Jinja2 in the variable name
# is the only way to set dynamic fact names from a dict.
- name: Load plugin defaults  # noqa: var-naming[no-jinja]
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ plugin.defaults | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: plugin.defaults is defined
  tags: always

- name: Validate plugin requirements (vars)
  ansible.builtin.assert:
    that: "item.name in vars"
    fail_msg: >-
      Plugin '{{ plugin.name }}' requires variable '{{ item.name }}' but it is not defined.
      {{ item.description | default('') }}
  loop: "{{ plugin.requires.vars | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - plugin.requires is defined
    - plugin.requires.vars is defined
    - item.when | default(true) | bool
  tags: always

- name: Stat plugin required files
  ansible.builtin.stat:
    path: "{{ plugin_dir }}/{{ item.path }}"
  loop: "{{ plugin.requires.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: r_required_files
  when:
    - plugin.requires is defined
    - plugin.requires.files is defined
  tags: always

- name: Validate plugin requirements (files)
  ansible.builtin.assert:
    that: r_required_files.results[ansible_loop.index0].stat.exists
    fail_msg: >-
      Plugin '{{ plugin.name }}' requires file '{{ item.path }}' but it was not found at
      {{ plugin_dir }}/{{ item.path }}.
      {{ item.description | default('') }}
  loop: "{{ plugin.requires.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
    extended: true
  when:
    - plugin.requires is defined
    - plugin.requires.files is defined
    - item.when | default(true) | bool
  tags: always

- name: Run pre-validate
  ansible.builtin.include_tasks:
    file: "{{ plugin_dir }}/tasks/pre-validate.yaml"
    apply:
      tags: pre-validate
      environment:
        KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  when: lookup('ansible.builtin.fileglob', plugin_dir ~ '/tasks/pre-validate.yaml') | length > 0
  tags: pre-validate

- name: Template plugin imageset configuration
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/plugin-imageset.yaml.j2"
    dest: "{{ workingDir }}/plugin-{{ plugin_name }}-imageset.yaml"
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - plugin.operators is defined
  tags: mirror

- name: Run oc-mirror for plugin
  ansible.builtin.shell: |
    {{ workingDir }}/bin/oc-mirror --v2 \
      --log-level {{ ocMirrorLogLevel }} \
      --authfile "{{ pullSecretPath }}" \
      -c {{ workingDir }}/plugin-{{ plugin_name }}-imageset.yaml \
      --workspace file://{{ workingDir }}/config/oc-mirror-workspace \
      docker://{{ quayHostname }}:8443 \
      --dest-tls-verify=false \
      --parallel-images 10 \
      --parallel-layers 10 \
      --retry-times 10 \
      --retry-delay 0 \
      > {{ workingDir }}/logs/oc-mirror-plugin-{{ plugin_name }}.progress.$(date +%s).log 2>&1
  retries: 10
  delay: 10
  register: r_plugin_mirror
  until: r_plugin_mirror is success
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
  tags: mirror

# ---------- Phase A: Apply non-disruptive manifests (CatalogSources + signature-configmap) ----------
- name: Find CatalogSource manifests in cluster-resources
  ansible.builtin.find:
    paths: "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources"
    patterns: "cs-*.yaml"
  register: r_cs_plugin_files
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
  tags: mirror

- name: Apply CatalogSource manifests
  ansible.builtin.command:
    argv:
      - "{{ workingDir }}/bin/oc"
      - apply
      - --server-side
      - --force-conflicts
      - -f
      - "{{ item.path }}"
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  loop: "{{ r_cs_plugin_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - r_cs_plugin_files.files | default([]) | length > 0
  tags: mirror

- name: Check signature-configmap exists
  ansible.builtin.stat:
    path: "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources/signature-configmap.yaml"
  register: r_sig_configmap_stat
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
  tags: mirror

- name: Apply signature-configmap
  ansible.builtin.command:
    argv:
      - "{{ workingDir }}/bin/oc"
      - apply
      - --server-side
      - --force-conflicts
      - -f
      - "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources/signature-configmap.yaml"
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - r_sig_configmap_stat.stat.exists | default(false)
  tags: mirror

# ---------- Phase B: Conditional IDMS/ITMS apply (only when plugin.applyMirrors is true) ----------
# Most plugins don't need IDMS/ITMS on the hub: operators are installed on spoke clusters,
# and the CatalogSource already points directly to the Quay mirror URL.
# Plugins that pull images on the management cluster (e.g. IBM) must set applyMirrors: true.
- name: Skip IDMS/ITMS apply (applyMirrors not set)
  ansible.builtin.debug:
    msg: >-
      Skipping IDMS/ITMS apply for plugin '{{ plugin.name }}' (applyMirrors={{ plugin.applyMirrors | default(false) }}).
      Set applyMirrors: true in plugin.yaml if the plugin requires pulling images on the management cluster.
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - not (plugin.applyMirrors | default(false) | bool)
  tags: mirror

- name: Check generated IDMS manifest exists
  ansible.builtin.stat:
    path: "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources/idms-oc-mirror.yaml"
  register: r_gen_idms_stat
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
  tags: mirror

- name: Read generated IDMS manifest
  ansible.builtin.slurp:
    src: "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources/idms-oc-mirror.yaml"
  register: r_gen_idms_content
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_idms_stat.stat.exists | default(false)
  tags: mirror

- name: Parse generated IDMS manifest
  ansible.builtin.set_fact:
    gen_idms: "{{ r_gen_idms_content.content | b64decode | from_yaml }}"
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_idms_stat.stat.exists | default(false)
  tags: mirror

- name: Read current IDMS from cluster
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ImageDigestMirrorSet
    name: "{{ gen_idms.metadata.name }}"
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  register: r_cluster_idms
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_idms_stat.stat.exists | default(false)
  tags: mirror

- name: Compare IDMS entries
  ansible.builtin.set_fact:
    idms_changed: >-
      {{
        (r_cluster_idms.resources | default([]) | length == 0)
        or
        (
          (r_cluster_idms.resources[0].spec.imageDigestMirrors | default([]) | sort(attribute='source'))
          !=
          (gen_idms.spec.imageDigestMirrors | default([]) | sort(attribute='source'))
        )
      }}
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_idms_stat.stat.exists | default(false)
  tags: mirror

- name: Check generated ITMS manifest exists
  ansible.builtin.stat:
    path: "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources/itms-oc-mirror.yaml"
  register: r_gen_itms_stat
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
  tags: mirror

- name: Read generated ITMS manifest
  ansible.builtin.slurp:
    src: "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources/itms-oc-mirror.yaml"
  register: r_gen_itms_content
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_itms_stat.stat.exists | default(false)
  tags: mirror

- name: Parse generated ITMS manifest
  ansible.builtin.set_fact:
    gen_itms: "{{ r_gen_itms_content.content | b64decode | from_yaml }}"
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_itms_stat.stat.exists | default(false)
  tags: mirror

- name: Read current ITMS from cluster
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ImageTagMirrorSet
    name: "{{ gen_itms.metadata.name }}"
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  register: r_cluster_itms
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_itms_stat.stat.exists | default(false)
  tags: mirror

- name: Compare ITMS entries
  ansible.builtin.set_fact:
    itms_changed: >-
      {{
        (r_cluster_itms.resources | default([]) | length == 0)
        or
        (
          (r_cluster_itms.resources[0].spec.imageTagMirrors | default([]) | sort(attribute='source'))
          !=
          (gen_itms.spec.imageTagMirrors | default([]) | sort(attribute='source'))
        )
      }}
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_itms_stat.stat.exists | default(false)
  tags: mirror

- name: Set mirrors_changed fact
  ansible.builtin.set_fact:
    mirrors_changed: "{{ (idms_changed | default(false) | bool) or (itms_changed | default(false) | bool) }}"
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
  tags: mirror

- name: Log IDMS/ITMS comparison result
  ansible.builtin.debug:
    msg: >-
      IDMS changed: {{ idms_changed | default(false) }},
      ITMS changed: {{ itms_changed | default(false) }},
      mirrors_changed: {{ mirrors_changed | default(false) }}
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
  tags: mirror

- name: Apply IDMS to cluster
  ansible.builtin.command:
    argv:
      - "{{ workingDir }}/bin/oc"
      - apply
      - --server-side
      - --force-conflicts
      - -f
      - "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources/idms-oc-mirror.yaml"
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_idms_stat.stat.exists | default(false)
    - idms_changed | default(false) | bool
  tags: mirror

- name: Apply ITMS to cluster
  ansible.builtin.command:
    argv:
      - "{{ workingDir }}/bin/oc"
      - apply
      - --server-side
      - --force-conflicts
      - -f
      - "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources/itms-oc-mirror.yaml"
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_gen_itms_stat.stat.exists | default(false)
    - itms_changed | default(false) | bool
  tags: mirror

# ---------- Phase C: MCP stability gate (only when plugin.applyMirrors is true) ----------
# Part 1: Post-apply wait -- only if IDMS/ITMS were changed
- name: Pause 30s for MCO to detect IDMS/ITMS change
  ansible.builtin.pause:
    seconds: 30
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - mirrors_changed | default(false) | bool
  tags: mirror

- name: Wait for all MachineConfigPools to finish rollout after IDMS/ITMS change
  kubernetes.core.k8s_info:
    api_version: machineconfiguration.openshift.io/v1
    kind: MachineConfigPool
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  register: r_mcp_post_apply
  retries: 80
  delay: 30
  until: >-
    r_mcp_post_apply.resources | default([])
    | rejectattr('status.conditions', 'undefined')
    | selectattr('status.conditions', 'defined')
    | list
    | map(attribute='status.conditions')
    | map('selectattr', 'type', 'equalto', 'Updated')
    | map('map', attribute='status')
    | map('first')
    | reject('equalto', 'True')
    | list | length == 0
    and
    r_mcp_post_apply.resources | default([])
    | rejectattr('status.conditions', 'undefined')
    | selectattr('status.conditions', 'defined')
    | list
    | map(attribute='status.conditions')
    | map('selectattr', 'type', 'equalto', 'Updating')
    | map('map', attribute='status')
    | map('first')
    | reject('equalto', 'False')
    | list | length == 0
    and
    r_mcp_post_apply.resources | default([])
    | rejectattr('status.conditions', 'undefined')
    | selectattr('status.conditions', 'defined')
    | list
    | map(attribute='status.conditions')
    | map('selectattr', 'type', 'equalto', 'Degraded')
    | map('map', attribute='status')
    | map('first')
    | reject('equalto', 'False')
    | list | length == 0
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - mirrors_changed | default(false) | bool
  tags: mirror

# Part 2: Pre-operator MCP health check -- always runs when applyMirrors is true
# Handles retry scenario: previous run applied IDMS/ITMS but failed mid-rollout;
# on retry IDMS/ITMS match cluster state, but MCP may still be rolling out.
- name: Quick MCP health check before operator install
  kubernetes.core.k8s_info:
    api_version: machineconfiguration.openshift.io/v1
    kind: MachineConfigPool
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  register: r_mcp_precheck
  retries: 3
  delay: 10
  until: >-
    r_mcp_precheck.resources | default([])
    | rejectattr('status.conditions', 'undefined')
    | selectattr('status.conditions', 'defined')
    | list
    | map(attribute='status.conditions')
    | map('selectattr', 'type', 'equalto', 'Updated')
    | map('map', attribute='status')
    | map('first')
    | reject('equalto', 'True')
    | list | length == 0
    and
    r_mcp_precheck.resources | default([])
    | rejectattr('status.conditions', 'undefined')
    | selectattr('status.conditions', 'defined')
    | list
    | map(attribute='status.conditions')
    | map('selectattr', 'type', 'equalto', 'Updating')
    | map('map', attribute='status')
    | map('first')
    | reject('equalto', 'False')
    | list | length == 0
    and
    r_mcp_precheck.resources | default([])
    | rejectattr('status.conditions', 'undefined')
    | selectattr('status.conditions', 'defined')
    | list
    | map(attribute='status.conditions')
    | map('selectattr', 'type', 'equalto', 'Degraded')
    | map('map', attribute='status')
    | map('first')
    | reject('equalto', 'False')
    | list | length == 0
  ignore_errors: true
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
  tags: mirror

- name: Wait for MachineConfigPools to stabilize (rollout in progress from previous run)
  kubernetes.core.k8s_info:
    api_version: machineconfiguration.openshift.io/v1
    kind: MachineConfigPool
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  register: r_mcp_full_wait
  retries: 80
  delay: 30
  until: >-
    r_mcp_full_wait.resources | default([])
    | rejectattr('status.conditions', 'undefined')
    | selectattr('status.conditions', 'defined')
    | list
    | map(attribute='status.conditions')
    | map('selectattr', 'type', 'equalto', 'Updated')
    | map('map', attribute='status')
    | map('first')
    | reject('equalto', 'True')
    | list | length == 0
    and
    r_mcp_full_wait.resources | default([])
    | rejectattr('status.conditions', 'undefined')
    | selectattr('status.conditions', 'defined')
    | list
    | map(attribute='status.conditions')
    | map('selectattr', 'type', 'equalto', 'Updating')
    | map('map', attribute='status')
    | map('first')
    | reject('equalto', 'False')
    | list | length == 0
    and
    r_mcp_full_wait.resources | default([])
    | rejectattr('status.conditions', 'undefined')
    | selectattr('status.conditions', 'defined')
    | list
    | map(attribute='status.conditions')
    | map('selectattr', 'type', 'equalto', 'Degraded')
    | map('map', attribute='status')
    | map('first')
    | reject('equalto', 'False')
    | list | length == 0
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
    - plugin.applyMirrors | default(false) | bool
    - r_mcp_precheck is failed
  tags: mirror

- name: Wait for updated CatalogSource to be ready
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: CatalogSource
    namespace: openshift-marketplace
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  register: r_catalog_sources
  retries: 24
  delay: 10
  until: >-
    r_catalog_sources.resources | default([])
    | selectattr('status', 'defined')
    | selectattr('status.connectionState', 'defined')
    | selectattr('status.connectionState.lastObservedState', 'equalto', 'READY')
    | list | length >= (r_catalog_sources.resources | length)
  when:
    - plugin.mirror | default('none') == 'plugin'
    - disconnected | default(true) | bool
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
  tags: mirror

- name: Patch MCE custom-registries with plugin entries
  ansible.builtin.include_tasks:
    file: tasks/patch_mce_registries.yaml
    apply:
      tags: mirror
      environment:
        KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  vars:
    plugin_registries_entries: "{{ plugin.registries }}"
  when:
    - plugin.registries is defined
    - plugin.mirror | default('none') in ['core', 'plugin']
    - disconnected | default(true) | bool
  tags: mirror

- name: Install plugin operators
  ansible.builtin.include_tasks:
    file: tasks/configure_operator.yaml
    apply:
      tags: operators
      environment:
        KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  loop: "{{ plugin.operators }}"
  loop_control:
    loop_var: operator
  when:
    - plugin.operators is defined
    - plugin.installOperators | default(true)
  tags: operators

- name: Run deploy
  ansible.builtin.include_tasks:
    file: "{{ plugin_dir }}/tasks/deploy.yaml"
    apply:
      tags: deploy
      environment:
        KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  when: lookup('ansible.builtin.fileglob', plugin_dir ~ '/tasks/deploy.yaml') | length > 0
  tags: deploy

- name: Run post-validate
  ansible.builtin.include_tasks:
    file: "{{ plugin_dir }}/tasks/post-validate.yaml"
    apply:
      tags: post-validate
      environment:
        KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  when: lookup('ansible.builtin.fileglob', plugin_dir ~ '/tasks/post-validate.yaml') | length > 0
  tags: post-validate
