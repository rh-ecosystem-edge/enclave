---
# Configure DNS resolution for OpenShift cluster
# Adds entries to /etc/hosts for cluster API and ingress endpoints
#
# This ensures the Landing Zone can resolve cluster FQDNs during and after installation

- name: Ensure /etc/hosts has cluster DNS entries
  become: true
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED BLOCK - OpenShift cluster {{ clusterName }}"
    block: |
      # OpenShift cluster API endpoints
      {{ apiVIP }} api.{{ clusterName }}.{{ baseDomain }}
      {{ apiVIP }} api-int.{{ clusterName }}.{{ baseDomain }}

      # OpenShift cluster ingress endpoints (common routes)
      {{ ingressVIP }} console-openshift-console.apps.{{ clusterName }}.{{ baseDomain }}
      {{ ingressVIP }} oauth-openshift.apps.{{ clusterName }}.{{ baseDomain }}
      {{ ingressVIP }} downloads-openshift-console.apps.{{ clusterName }}.{{ baseDomain }}
      {{ ingressVIP }} alertmanager-main-openshift-monitoring.apps.{{ clusterName }}.{{ baseDomain }}
      {{ ingressVIP }} grafana-openshift-monitoring.apps.{{ clusterName }}.{{ baseDomain }}
      {{ ingressVIP }} prometheus-k8s-openshift-monitoring.apps.{{ clusterName }}.{{ baseDomain }}
      {{ ingressVIP }} thanos-querier-openshift-monitoring.apps.{{ clusterName }}.{{ baseDomain }}
      {{ ingressVIP }} registry-quay-quay-enterprise.apps.{{ clusterName }}.{{ baseDomain }}
    create: false
    state: present

- name: Display DNS configuration
  ansible.builtin.debug:
    msg:
      - "DNS entries added to /etc/hosts:"
      - "  API VIP: {{ apiVIP }} -> api.{{ clusterName }}.{{ baseDomain }}"
      - "  Ingress VIP: {{ ingressVIP }} -> *.apps.{{ clusterName }}.{{ baseDomain }}"
