---
# Metal3 teardown tasks - decommission persistent Metal3 deployment
# Optional flags:
#   metal3_cleanup_volumes: false (default) - remove ironic volumes when true
#   metal3_cleanup_secrets: false (default) - remove podman secrets when true

- name: Disable and stop metal3-ironic-api service
  become: true
  ansible.builtin.systemd:
    name: metal3-ironic-api.service
    state: stopped
    enabled: false
  failed_when: false

- name: Disable and stop metal3-httpd service
  become: true
  ansible.builtin.systemd:
    name: metal3-httpd.service
    state: stopped
    enabled: false
  failed_when: false

- name: Disable and stop metal3-ironic-pod service
  become: true
  ansible.builtin.systemd:
    name: metal3-ironic-pod.service
    state: stopped
    enabled: false
  failed_when: false

- name: Disable and stop metal3-bmo service
  become: true
  ansible.builtin.systemd:
    name: metal3-bmo.service
    state: stopped
    enabled: false
  failed_when: false

- name: Remove metal3-ironic-api quadlet file
  become: true
  ansible.builtin.file:
    path: /etc/containers/systemd/metal3-ironic-api.container
    state: absent

- name: Remove metal3-httpd quadlet file
  become: true
  ansible.builtin.file:
    path: /etc/containers/systemd/metal3-httpd.container
    state: absent

- name: Remove metal3-ironic pod quadlet file
  become: true
  ansible.builtin.file:
    path: /etc/containers/systemd/metal3-ironic.pod
    state: absent

- name: Remove metal3-bmo quadlet file
  become: true
  ansible.builtin.file:
    path: /etc/containers/systemd/metal3-bmo.container
    state: absent

- name: Reload systemd daemon
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Remove ironic container
  containers.podman.podman_container:
    name: ironic
    state: absent

- name: Remove httpd container
  containers.podman.podman_container:
    name: httpd
    state: absent

- name: Remove baremetal-operator container
  containers.podman.podman_container:
    name: baremetal-operator
    state: absent

- name: Remove metal3-ironic pod
  containers.podman.podman_pod:
    name: metal3-ironic
    state: absent

- name: Remove ironic volumes
  become: true
  when: metal3_cleanup_volumes | default(false) | bool
  containers.podman.podman_volume:
    name: "{{ item }}"
    state: absent
  loop:
    - metal3-ironic-conf
    - metal3-ironic-data
    - metal3-ironic-shared

- name: Remove podman secrets
  become: true
  when: metal3_cleanup_secrets | default(false) | bool
  containers.podman.podman_secret:
    name: "{{ item }}"
    state: absent
  loop:
    - metal3-ironic-htpasswd
    - metal3-ca-bundle
    - metal3-kubeconfig
    - metal3-ironic-username
    - metal3-ironic-password
