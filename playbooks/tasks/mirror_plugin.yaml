---
- name: Validate mirror plugin conditions
  ansible.builtin.assert:
    that:
      - plugin is defined
      - plugin.mirror | default('none') == 'plugin'
      - plugin.operators | default([]) | length > 0 or plugin.additionalImages | default([]) | length > 0
      - disconnected | default(true) | bool
    fail_msg: >-
      Validation Error: Ensure 'plugin' is defined, 'plugin.mirror' is set to 'plugin',
      'plugin.operators' or 'plugin.additionalImages' are not empty, and 'disconnected' is true.

- name: Template plugin imageset configuration
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/plugin-imageset.yaml.j2"
    dest: "{{ workingDir }}/plugin-{{ plugin_name }}-imageset.yaml"

- name: Ensure oc-mirror log directory exists
  ansible.builtin.file:
    path: "{{ workingDir }}/logs/"
    state: directory

- name: Set oc-mirror plugin log path
  ansible.builtin.set_fact:
    _oc_mirror_plugin_log: "{{ workingDir }}/logs/oc-mirror-plugin-{{ plugin_name }}.progress.{{ lookup('pipe', 'date +%s') }}.log"

- name: Show oc-mirror log path
  ansible.builtin.debug:
    msg: "oc-mirror log file: {{ _oc_mirror_plugin_log }}"

- name: Run oc-mirror for plugin
  block:
    - name: Run oc-mirror for plugin {{ plugin_name }}
      ansible.builtin.shell: |
        {{ workingDir }}/bin/oc-mirror --v2 \
          --log-level {{ ocMirrorLogLevel }} \
          --authfile "{{ pullSecretPath }}" \
          -c {{ workingDir }}/plugin-{{ plugin_name }}-imageset.yaml \
          --workspace file://{{ workingDir }}/config/oc-mirror-workspace \
          docker://{{ quayHostname }}:8443 \
          --dest-tls-verify=false \
          --parallel-images {{ ocMirrorParallelImages }} \
          --parallel-layers {{ ocMirrorParallelLayers }} \
          --retry-times {{ ocMirrorRetryTimes }} \
          --retry-delay {{ ocMirrorRetryDelay }} \
          > {{ _oc_mirror_plugin_log }} 2>&1
      retries: "{{ ocMirrorAnsibleRetries }}"
      delay: "{{ ocMirrorAnsibleDelay }}"
      register: r_plugin_mirror
      until: r_plugin_mirror is success

  rescue:
    - name: Read oc-mirror log tail
      ansible.builtin.command:
        argv:
          - tail
          - -n
          - "10"
          - "{{ _oc_mirror_plugin_log }}"
      register: _oc_mirror_plugin_tail
      changed_when: false
      failed_when: false

    - name: oc-mirror failed
      ansible.builtin.fail:
        msg: |-
          oc-mirror for plugin {{ plugin_name }} failed after {{ r_plugin_mirror.attempts }} attempts.

          {{ _oc_mirror_plugin_tail.stdout | default('Unable to read oc-mirror log tail.') }}

          Full log: {{ _oc_mirror_plugin_log }}

- name: Apply updated mirror manifests to cluster
  block:
    - name: Set landing-zone cluster resources directory
      ansible.builtin.set_fact:
        lz_cluster_resources_dir: "{{ workingDir }}/config/oc-mirror-workspace/working-dir/cluster-resources"

    - name: Stat landing-zone IDMS source
      ansible.builtin.stat:
        path: "{{ lz_cluster_resources_dir }}/idms-oc-mirror.yaml"
      register: lz_idms_src_stat

    - name: Stat landing-zone ITMS source
      ansible.builtin.stat:
        path: "{{ lz_cluster_resources_dir }}/itms-oc-mirror.yaml"
      register: lz_itms_src_stat

    # Dedicated IDMS/ITMS per plugin; oc-mirror overwrites generic idms-oc-mirror.yaml — remove after copy.
    # oc-mirror v2 may emit multiple resources per file; names must stay unique (idms-<slice>-plugin-<name>).
    # Quay apply uses idms-<slice>-plugin-<name>-internal (quay_disconnected_mirrors.yaml).
    - name: Copy LZ IDMS to plugin-specific manifest
      ansible.builtin.copy:
        src: "{{ lz_cluster_resources_dir }}/idms-oc-mirror.yaml"
        dest: "{{ lz_cluster_resources_dir }}/idms-oc-mirror-plugin-{{ plugin_name }}.yaml"
        remote_src: true
      when: lz_idms_src_stat.stat.exists

    - name: Rename ImageDigestMirrorSet names in plugin LZ IDMS manifest
      ansible.builtin.replace:
        path: "{{ lz_cluster_resources_dir }}/idms-oc-mirror-plugin-{{ plugin_name }}.yaml"
        regexp: '^(\s*name:\s*)idms-([^\s]+)\s*$'
        replace: '\1idms-\2-plugin-{{ plugin_name }}'
      when: lz_idms_src_stat.stat.exists

    - name: Remove generic LZ IDMS after plugin-specific copy
      ansible.builtin.file:
        path: "{{ lz_cluster_resources_dir }}/idms-oc-mirror.yaml"
        state: absent
      when: lz_idms_src_stat.stat.exists

    - name: Copy LZ ITMS to plugin-specific manifest
      ansible.builtin.copy:
        src: "{{ lz_cluster_resources_dir }}/itms-oc-mirror.yaml"
        dest: "{{ lz_cluster_resources_dir }}/itms-oc-mirror-plugin-{{ plugin_name }}.yaml"
        remote_src: true
      when: lz_itms_src_stat.stat.exists

    - name: Rename ImageTagMirrorSet names in plugin LZ ITMS manifest
      ansible.builtin.replace:
        path: "{{ lz_cluster_resources_dir }}/itms-oc-mirror-plugin-{{ plugin_name }}.yaml"
        regexp: '^(\s*name:\s*)itms-([^\s]+)\s*$'
        replace: '\1itms-\2-plugin-{{ plugin_name }}'
      when: lz_itms_src_stat.stat.exists

    - name: Remove generic LZ ITMS after plugin-specific copy
      ansible.builtin.file:
        path: "{{ lz_cluster_resources_dir }}/itms-oc-mirror.yaml"
        state: absent
      when: lz_itms_src_stat.stat.exists

    - name: Apply updated mirror manifests to cluster
      ansible.builtin.shell: |
        {{ workingDir }}/bin/oc apply \
          -f {{ lz_cluster_resources_dir }}/ \
          --server-side --force-conflicts
      environment:
        KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  when:
    - plugin.installOperators | default(true)
    - r_plugin_mirror is defined
    - r_plugin_mirror is success

- name: Wait for updated CatalogSource to be ready
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: CatalogSource
    namespace: openshift-marketplace
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  register: r_catalog_sources
  retries: 24
  delay: 10
  until: >-
    r_catalog_sources.resources | default([])
    | selectattr('status', 'defined')
    | selectattr('status.connectionState', 'defined')
    | selectattr('status.connectionState.lastObservedState', 'equalto', 'READY')
    | list | length >= (r_catalog_sources.resources | length)
  when:
    - plugin.installOperators | default(true)
    - r_plugin_mirror is defined
    - r_plugin_mirror is success

# --- Mirror addon plugin images to Quay Enterprise ---
# Addon plugins (mirror: plugin) are mirrored to the LZ registry above, but
# spoke clusters pull from Quay Enterprise. Re-mirror from LZ to Quay Enterprise
# following the same pattern as quay_disconnected.yaml.

- name: Copy plugin imageset to internal version for Quay Enterprise mirror
  ansible.builtin.copy:
    src: "{{ workingDir }}/plugin-{{ plugin_name }}-imageset.yaml"
    dest: "{{ workingDir }}/plugin-{{ plugin_name }}-imageset.internal.yaml"
    remote_src: true
  when:
    - r_plugin_mirror is defined
    - r_plugin_mirror is success

- name: Replace upstream catalog with LZ registry in internal plugin imageset
  ansible.builtin.replace:
    path: "{{ workingDir }}/plugin-{{ plugin_name }}-imageset.internal.yaml"
    regexp: 'catalog: {{ catalog_image }}'
    replace: 'catalog: {{ quayHostname }}:8443/redhat/{{ catalog_mirror }}'
  when:
    - r_plugin_mirror is defined
    - r_plugin_mirror is success

- name: Ensure .config/containers/ exists for plugin registries.conf
  ansible.builtin.file:
    path: "{{ lookup('env','HOME') }}/.config/containers/"
    state: directory
  when:
    - r_plugin_mirror is defined
    - r_plugin_mirror is success

- name: Generate registries.conf for plugin Quay Enterprise mirror
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/registries.conf.j2"
    dest: "{{ lookup('env','HOME') }}/.config/containers/registries.conf"
  vars:
    _core_plugin_registries: "{{ plugin.registries | default([]) }}"
  when:
    - r_plugin_mirror is defined
    - r_plugin_mirror is success

- name: Set oc-mirror plugin Quay Enterprise log path
  ansible.builtin.set_fact:
    _oc_mirror_plugin_quay_log: "{{ workingDir }}/logs/oc-mirror-plugin-{{ plugin_name }}-quay.progress.{{ lookup('pipe', 'date +%s') }}.log"
  when:
    - r_plugin_mirror is defined
    - r_plugin_mirror is success

- name: Show oc-mirror plugin Quay Enterprise log path
  ansible.builtin.debug:
    msg: "oc-mirror log file: {{ _oc_mirror_plugin_quay_log }}"
  when:
    - r_plugin_mirror is defined
    - r_plugin_mirror is success

- name: Run oc-mirror for plugin (Quay Enterprise)
  when:
    - r_plugin_mirror is defined
    - r_plugin_mirror is success
  block:
    - name: Run oc-mirror for plugin {{ plugin_name }} (Quay Enterprise)
      ansible.builtin.shell: |
        {{ workingDir }}/bin/oc-mirror --v2 \
          --log-level {{ ocMirrorLogLevel }} \
          --authfile {{ workingDir }}/config/pull-secret.quay.json \
          -c {{ workingDir }}/plugin-{{ plugin_name }}-imageset.internal.yaml \
          --workspace file://{{ workingDir }}/config/oc-mirror-workspace-quay \
          docker://registry-quay-quay-enterprise.apps.{{ clusterName }}.{{ baseDomain }} \
          --dest-tls-verify=false \
          --src-tls-verify=false \
          --parallel-images {{ ocMirrorParallelImages }} \
          --parallel-layers {{ ocMirrorParallelLayersLocalStorage if quayBackend == 'LocalStorage' else ocMirrorParallelLayers }} \
          --retry-times {{ ocMirrorRetryTimes }} \
          --retry-delay {{ ocMirrorRetryDelay }} \
          --image-timeout {{ ocMirrorImageTimeout }} \
          > {{ _oc_mirror_plugin_quay_log }} 2>&1
      retries: "{{ ocMirrorAnsibleRetries }}"
      delay: "{{ ocMirrorAnsibleDelay }}"
      register: r_plugin_mirror_quay
      until: r_plugin_mirror_quay is success

  rescue:
    - name: Read oc-mirror log tail
      ansible.builtin.command:
        argv:
          - tail
          - -n
          - "10"
          - "{{ _oc_mirror_plugin_quay_log }}"
      register: _oc_mirror_plugin_quay_tail
      changed_when: false
      failed_when: false

    - name: oc-mirror failed
      ansible.builtin.fail:
        msg: |-
          oc-mirror for plugin {{ plugin_name }} (Quay Enterprise) failed after {{ r_plugin_mirror_quay.attempts }} attempts.

          {{ _oc_mirror_plugin_quay_tail.stdout | default('Unable to read oc-mirror log tail.') }}

          Full log: {{ _oc_mirror_plugin_quay_log }}

- name: Delete registries.conf after plugin Quay Enterprise mirror
  ansible.builtin.file:
    path: "{{ lookup('env','HOME') }}/.config/containers/registries.conf"
    state: absent
  when:
    - r_plugin_mirror is defined
    - r_plugin_mirror is success

- name: Apply Quay Enterprise mirrors for plugin
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/../operators/quay-operator/quay_disconnected_mirrors.yaml"
    apply:
      environment:
        KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  vars:
    quay_plugin_mirror: true
  when:
    - plugin.installOperators | default(true)
    - r_plugin_mirror_quay is defined
    - r_plugin_mirror_quay is success
