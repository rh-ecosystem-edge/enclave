---
# Migrate foundation plugin subscription from core catalog source to plugin-specific catalog source
#
# Background: Previous Enclave versions mirrored foundation plugin operators as part
# of the core catalog source. The plugin framework now creates dedicated catalog
# sources per plugin (e.g., mirror-redhat-operators-odf for ODF).
#
# This migration patches the operator subscription to use the plugin-specific catalog source.
#
# Required variables:
#   plugin_name: Name of the plugin (e.g., "odf", "lvms")
#   operator_name: Name of the operator subscription (e.g., "odf-operator", "lvms-operator")
#   operator_namespace: Namespace where the operator is installed (e.g., "openshift-storage")
#   catalog_mirror: Catalog mirror prefix (e.g., "mirror-redhat-operators" or "mirror-certified-operators")

- name: Check if {{ plugin_name | upper }} subscription exists
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ operator_name }}"
    namespace: "{{ operator_namespace }}"
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  register: r_plugin_subscription

- name: Patch {{ plugin_name | upper }} subscription to plugin-specific catalog source
  kubernetes.core.k8s:
    state: patched
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ operator_name }}"
    namespace: "{{ operator_namespace }}"
    definition:
      spec:
        source: "{{ catalog_mirror }}-{{ plugin_name }}"
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  register: r_plugin_patch
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_plugin_patch is success
  when:
    - r_plugin_subscription.resources | length > 0
    - r_plugin_subscription.resources[0].spec.source is defined
    - r_plugin_subscription.resources[0].spec.source != catalog_mirror + "-" + plugin_name
    - r_plugin_subscription.resources[0].spec.source is match("^(redhat-operators|cs-.*|" + catalog_mirror + ")$")

- name: Display {{ plugin_name | upper }} migration status
  ansible.builtin.debug:
    msg: >-
      {% if r_plugin_subscription.resources | length == 0 %}
      {{ plugin_name | upper }} subscription not found — no migration needed
      {% elif r_plugin_subscription.resources[0].spec.source == catalog_mirror + "-" + plugin_name %}
      {{ plugin_name | upper }} subscription already using plugin-specific catalog source — no migration needed
      {% else %}
      {{ plugin_name | upper }} subscription migrated from {{ r_plugin_subscription.resources[0].spec.source }}
      to {{ catalog_mirror }}-{{ plugin_name }}
      {% endif %}
