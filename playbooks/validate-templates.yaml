---
# Template Rendering Validation Playbook
# Renders all Jinja2 templates with test variables and validates the output.
# Catches broken templates, missing variables, and structural issues.
#
# Usage:
#   ansible-playbook playbooks/validate-templates.yaml -e@config/global.example.yaml

- name: Template Rendering Validation
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Include template validation tasks
      ansible.builtin.include_tasks:
        file: tasks/template_validation.yaml
        apply:
          tags: template-validation
      tags: template-validation
