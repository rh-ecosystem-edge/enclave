---
# Phase 2b: Mirror Operators - Post-installation mirroring
# This phase is ONLY for disconnected deployments
#
# Performs:
# - Run oc-mirror for post-install operators and additional images
# - Mirror images to datacenter cache (optional)
#
# This phase mirrors operators and images that will be installed after OpenShift
# is up and running. It can be executed in parallel with the OpenShift deployment
# to optimize overall deployment time.
#
# Mirrors:
# - Operators from defaults/operators.yaml (Quay, ACM, GitOps, Logging, etc.)
# - Model operators from defaults/model_operators.yaml
# - Additional plugin operators not marked with 'mirror: core'
# - Additional images (Vault, ArgoCD, etc.)
#
# Prerequisites:
# - 02a-mirror-core.yaml must have completed (mirror registry must exist)
# - Pull secrets must be available
#
# Usage:
#   ansible-playbook playbooks/02b-mirror-operators.yaml -e workingDir=/home/cloud-user
#
#   # Mirror images to datacenter cache
#   ansible-playbook playbooks/02b-mirror-operators.yaml -e workingDir=/home/cloud-user --tags mirror-cache

- name: Phase 2b - Mirror operators for post-installation
  hosts: localhost
  gather_facts: false
  environment:
    PATH: "{{ workingDir }}/bin:{{ lookup('env', 'PATH') }}"
  tasks:
    - name: Load common variables
      ansible.builtin.include_tasks:
        file: common/load-vars.yaml
        apply:
          tags: always
      tags: always

    - name: Include tasks for mirror-cache
      ansible.builtin.include_tasks:
        file: tasks/mirror_cache.yaml
        apply:
          tags: mirror-cache
      tags:
        - mirror-cache
        - never

    - name: Verify disconnected mode
      ansible.builtin.assert:
        that:
          - disconnected | default(true) | bool
        fail_msg: "Phase 2b (Mirror Operators) should only run in disconnected mode. Set disconnected=true in config/global.yaml"
        success_msg: "Running in disconnected mode - proceeding with operator mirroring"
      tags: mirror-operators

    - name: Verify mirror registry is running
      containers.podman.podman_container_info:
        name: quay-app
      register: r_container_quay_app
      tags: mirror-operators

    - name: Assert mirror registry exists
      ansible.builtin.assert:
        that:
          - r_container_quay_app.containers | default([]) | length > 0
          - r_container_quay_app.containers[0].State.Status == "running"
        fail_msg: "Mirror registry is not running. Execute 02a-mirror-core.yaml first."
        success_msg: "Mirror registry is running - proceeding with operator mirroring"
      tags: mirror-operators

    - name: Collect post-install plugin operators for operator imageset
      ansible.builtin.include_tasks:
        file: tasks/collect_post_install_plugin_operators.yaml
        apply:
          tags: mirror-operators
      tags: mirror-operators

    - name: Include tasks for operator mirror registry
      ansible.builtin.include_tasks:
        file: tasks/mirror_registry_operators.yaml
        apply:
          tags: mirror-operators
      tags: mirror-operators