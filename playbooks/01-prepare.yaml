---
# Phase 1: Prepare - Download binaries and content
# This phase is common to both connected and disconnected deployments
#
# Downloads:
# - OpenShift client tools (oc, kubectl)
# - OpenShift installer binaries
# - Mirror registry binary
# - Additional content images
#
# Usage:
#   ansible-playbook playbooks/01-prepare.yaml -e workingDir=/home/cloud-user

- name: Phase 1 - Prepare environment
  hosts: localhost
  gather_facts: false
  environment:
    PATH: "{{ workingDir }}/bin:{{ lookup('env', 'PATH') }}"
  tasks:
    - name: Load common variables
      ansible.builtin.include_tasks:
        file: common/load-vars.yaml
        apply:
          tags: always
      tags: always

    - name: Validate enabled plugin requirements
      ansible.builtin.include_tasks:
        file: tasks/validate_enabled_plugins.yaml
        apply:
          tags: always
      tags: always

    - name: Ensure pull secret directory exists
      ansible.builtin.file:
        path: "{{ pullSecretPath | dirname }}"
        state: directory
        mode: "0700"
      tags: always

    - name: Write pull secret to file
      no_log: true
      ansible.builtin.copy:
        content: "{{ pullSecret | to_json }}"
        dest: "{{ pullSecretPath }}"
        mode: "0600"
      tags: always

    - name: oc check
      ansible.builtin.command: oc version --client
      register: oc_check
      ignore_errors: true
      changed_when: false

    - name: Fail if 'oc' is present
      ansible.builtin.fail:
        msg: "oc binary was found! '{{ oc_check.stdout }}'"
      when: oc_check.rc == 0

    - name: Download control binaries
      ansible.builtin.include_tasks:
        file: tasks/download_control_binaries.yaml
        apply:
          tags: download-control-binaries
      tags: download-control-binaries

    - name: Download content
      ansible.builtin.include_tasks:
        file: tasks/download_content.yaml
        apply:
          tags: download-content
      tags: download-content
