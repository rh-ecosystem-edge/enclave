---
# Phase 6: Day-2 Operations - Optional advanced features
# This phase configures advanced features and ACM policies
#
# Performs:
# - Clair configuration for disconnected Quay (disconnected only)
# - ACM policies for mirrored catalogsources (disconnected only)
# - ACM policies for model configuration
#
# Usage:
#   ansible-playbook playbooks/06-day2.yaml -e workingDir=/home/cloud-user [-e disconnected=false]
#   ansible-playbook playbooks/06-day2.yaml -e workingDir=/home/cloud-user --tags clair-disconnected
#   ansible-playbook playbooks/06-day2.yaml -e workingDir=/home/cloud-user --tags acm-policy-catalogsources,model-config

- name: Phase 6 - Day-2 operations
  hosts: localhost
  gather_facts: false
  environment:
    PATH: "{{ workingDir }}/bin:{{ lookup('env', 'PATH') }}"
  tasks:
    - name: Load common variables
      ansible.builtin.include_tasks:
        file: common/load-vars.yaml
        apply:
          tags: always
      tags: always

    - name: Display day-2 mode
      ansible.builtin.debug:
        msg: "Running day-2 operations in {{ 'disconnected' if (disconnected | default(true)) else 'connected' }} mode"
      tags: always

    - name: Configure ACM ClusterImageSets
      ansible.builtin.include_tasks:
        file: ../operators/advanced-cluster-management/acm_cis.yaml
        apply:
          tags: acm-cis
          environment:
            KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
      tags: acm-cis

    - name: Configure Quay in disconnected environments
      when: disconnected | default(true)
      ansible.builtin.include_tasks:
        file: ../operators/quay-operator/quay_disconnected.yaml
        apply:
          tags: quay-disconnected
      tags: quay-disconnected

    - name: Configure Clair in disconnected environments
      when: disconnected | default(true)
      ansible.builtin.include_tasks:
        file: ../operators/quay-operator/clair_disconnected.yaml
        apply:
          tags: clair-disconnected
          environment:
            KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
      tags: clair-disconnected

    - name: Mirrored catalogsource configuration ACM policy
      when: disconnected | default(true)
      vars:
        short_version_dot: "{{ openshift_version.version.split('.')[:2] | join('.') }}"
        short_version_dash: "{{ openshift_version.version.split('.')[:2] | join('-') }}"
      ansible.builtin.include_tasks:
        file: tasks/catalogsource.yaml
        apply:
          tags: acm-policy-catalogsources
          environment:
            KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
      loop: "{{ openshift_versions }}"
      loop_control:
        loop_var: openshift_version
      tags: acm-policy-catalogsources

    # Optional Tier 2: OpenShift AI Module
    # Deploy OpenShift AI and supporting operators (rhods, nfd, servicemesh, etc.)
    # Enable with: enable_openshift_ai: true in config/global.yaml
    # Or deploy separately: make deploy-openshift-ai or make day2-openshift-ai
    - name: Deploy OpenShift AI (Tier 2 - optional)
      when: enable_openshift_ai | default(false)
      block:
        - name: Mirror OpenShift AI images (disconnected only)
          when: disconnected | default(true)
          ansible.builtin.include_tasks:
            file: ../operators/openshift-ai/mirror.yaml
          tags:
            - openshift-ai
            - openshift-ai-mirror
            - day2-openshift-ai

        - name: Install OpenShift AI operators
          ansible.builtin.include_tasks:
            file: ../operators/openshift-ai/tasks.yaml
          tags:
            - openshift-ai
            - openshift-ai-install
            - day2-openshift-ai
      tags:
        - openshift-ai
        - day2-openshift-ai

    # Optional Tier 3: NVIDIA GPU Operator Module
    # Deploy NVIDIA GPU operator (requires OpenShift AI)
    # Enable with: enable_nvidia: true in config/global.yaml
    # Or deploy separately: make deploy-nvidia or make day2-nvidia
    - name: Deploy NVIDIA GPU Operator (Tier 3 - optional)
      when: enable_nvidia | default(false)
      block:
        - name: Check OpenShift AI prerequisites
          ansible.builtin.include_tasks:
            file: ../operators/nvidia-gpu-operator/prerequisites.yaml
          tags:
            - nvidia
            - nvidia-prerequisites
            - day2-nvidia

        - name: Display NVIDIA user disclaimer
          ansible.builtin.include_tasks:
            file: ../operators/nvidia-gpu-operator/disclaimer.yaml
          tags:
            - nvidia
            - nvidia-disclaimer
            - day2-nvidia

        - name: Mirror NVIDIA images (disconnected only)
          when: disconnected | default(true)
          ansible.builtin.include_tasks:
            file: ../operators/nvidia-gpu-operator/mirror.yaml
          tags:
            - nvidia
            - nvidia-mirror
            - day2-nvidia

        - name: Install NVIDIA GPU operator
          ansible.builtin.include_tasks:
            file: ../operators/nvidia-gpu-operator/tasks.yaml
          tags:
            - nvidia
            - nvidia-install
            - day2-nvidia
      tags:
        - nvidia
        - day2-nvidia

    - name: Kubevirt - VMaaS
      ansible.builtin.include_tasks:
        file: tasks/vmaas_validation.yaml
        apply:
          tags:
            - vmaas
            - aap_archive_service
          environment:
            KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
      tags:
        - vmaas
        - aap_archive_service

    - name: Management cluster upgrade
      ansible.builtin.include_tasks:
        file: tasks/mgmt_cluster_upgrade.yaml
        apply:
          tags: mgmt-cluster-upgrade
          environment:
            KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
      tags:
        - mgmt-cluster-upgrade
