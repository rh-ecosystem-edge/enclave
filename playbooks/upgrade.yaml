---
# Red Hat Sovereign Enclave - Upgrade Playbook
#
# This playbook handles upgrades from previous Enclave versions to ensure
# compatibility with the current version.
#
# Usage:
#   ansible-playbook playbooks/upgrade.yaml -e workingDir=/home/cloud-user

- name: Upgrade Enclave deployment
  hosts: localhost
  gather_facts: false
  vars:
    k8s_retries: 30
    k8s_delay: 10
  tasks:
    - name: Load configuration
      ansible.builtin.include_tasks:
        file: common/load-vars.yaml

    - name: Run migrations
      ansible.builtin.include_tasks:
        file: tasks/migrations.yaml

    - name: Upgrade management cluster OpenShift version
      ansible.builtin.command:
        argv:
          - enclave
          - reconcile
          - mgmt-cluster-version
          - --use-defaults
      register: r_mgmt_cluster_upgrade
      when: upgrade_mgmt_cluster | default(true) | bool

    - name: Print management cluster upgrade output
      ansible.builtin.debug:
        var: r_mgmt_cluster_upgrade.stderr_lines
      when: upgrade_mgmt_cluster | default(true) | bool

    - name: Upgrade operator versions
      ansible.builtin.command:
        argv:
          - enclave
          - reconcile
          - operator-versions
          - --use-defaults
      register: r_operator_versions_upgrade
      when: upgrade_operators | default(true) | bool

    - name: Print operator versions upgrade output
      ansible.builtin.debug:
        var: r_operator_versions_upgrade.stderr_lines
      when: upgrade_operators | default(true) | bool
