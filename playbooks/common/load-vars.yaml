---

- name: Set user config file paths
  ansible.builtin.set_fact:
    user_config_files:
      - "{{ vars_file | default('../../config/global.yaml', true) }}"
      - "{{ certs_vars_file | default('../../config/certificates.yaml', true) }}"
      - "{{ cloud_infra_vars_file | default('../../config/cloud_infra.yaml', true) }}"

- name: Include deployment defaults
  ansible.builtin.include_vars: ../../defaults/deployment.yaml

- name: Include user config vars
  ansible.builtin.include_vars: "{{ item }}"
  loop: "{{ user_config_files }}"

- name: Resolve sslCACertificate from system trust store if not provided
  when:
    - sslCACertificate is not defined or sslCACertificate | length == 0
    - (sslAPICertificateFullChain is defined and sslAPICertificateFullChain | length > 0) or
      (sslIngressCertificateFullChain is defined and sslIngressCertificateFullChain | length > 0)
  block:
    - name: Get root CA from system trust store since it is not provided in the config
      ansible.builtin.command:
        argv:
          - enclave
          - tools
          - get-root-ca
          - --chain-pem
          - "{{ (sslAPICertificateFullChain | default('', true)) or (sslIngressCertificateFullChain | default('', true)) }}"
      register: r_root_ca
      changed_when: false

    - name: Set sslCACertificate from system trust store
      ansible.builtin.set_fact:
        sslCACertificate: "{{ r_root_ca.stdout | trim }}"
      when: r_root_ca.rc == 0 and r_root_ca.stdout | trim | length > 0

- name: Write SSH public key to file if content provided
  when: sshPubKey is defined and sshPubKey | length > 0
  block:
    - name: Ensure config directory exists
      ansible.builtin.file:
        path: "{{ workingDir }}/config"
        state: directory
        mode: "0750"

    - name: Write sshPubKey content to file
      ansible.builtin.copy:
        content: "{{ sshPubKey }}\n"
        dest: "{{ workingDir }}/config/ssh-pub-key.pub"
        mode: "0644"

    - name: Set sshPubPath from written file
      ansible.builtin.set_fact:
        sshPubPath: "{{ workingDir }}/config/ssh-pub-key.pub"

- name: Include common configuration
  ansible.builtin.include_vars: "../../defaults/{{ config_file }}"
  loop:
    - control_binaries.yaml
    - operators.yaml
    - platforms.yaml
    - catalogs.yaml
    - mirror_registry.yaml
    - quay_operator.yaml
    - k8s.yaml
    - oc_mirror.yaml
  loop_control:
    loop_var: config_file

- name: Ensure storage plugin is in enabled_plugins
  ansible.builtin.set_fact:
    enabled_plugins: "{{ enabled_plugins | union([storage_plugin]) }}"

- name: Find plugin directories for early remote fetch
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../plugins"
    file_type: directory
    depth: 1
  register: r_plugin_dirs_early

- name: Check each plugin descriptor for remote type
  ansible.builtin.stat:
    path: "{{ item.path }}/plugin.yaml"
  loop: "{{ r_plugin_dirs_early.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: r_plugin_yaml_stats_early

- name: Load plugin descriptors to identify remote plugins
  ansible.builtin.include_vars:
    file: "{{ item.stat.path }}"
    name: "plugin_descriptor_{{ item.item.path | basename }}"
  loop: "{{ r_plugin_yaml_stats_early.results | selectattr('stat.exists') | list }}"
  loop_control:
    label: "{{ item.item.path | basename }}"

- name: Fetch remote plugins before loading plugin configs
  ansible.builtin.include_tasks:
    file: ../tasks/fetch_remote_plugin.yaml
  vars:
    plugin_name: "{{ item.item.path | basename }}"
    plugin_dir: "{{ item.item.path }}"
    plugin: "{{ vars['plugin_descriptor_' + (item.item.path | basename)] }}"
    r_plugin_yaml:
      stat:
        exists: true
  loop: "{{ r_plugin_yaml_stats_early.results | selectattr('stat.exists') | list }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
  when:
    - item.item.path | basename in enabled_plugins
    - vars['plugin_descriptor_' + (item.item.path | basename)].remote is defined

- name: Find plugin directories
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../plugins"
    file_type: directory
    depth: 1
  register: r_plugin_dirs

- name: Stat plugin config files
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../config/plugins/{{ item }}.yaml"
  loop: >-
    {{ r_plugin_dirs.files
       | map(attribute='path')
       | map('basename')
       | select('in', enabled_plugins)
       | list }}
  register: r_plugin_config_stats

- name: Load plugin config files
  ansible.builtin.include_vars:
    file: "{{ item.stat.path }}"
  loop: "{{ r_plugin_config_stats.results | selectattr('stat.exists') | list }}"
  loop_control:
    label: "{{ item.stat.path | basename }}"

- name: Set Management cluster OpenShift version from default
  ansible.builtin.set_fact:
    mgmt_openshift_version: "{{ (openshift_versions | selectattr('default', 'defined') | selectattr('default', 'equalto', true) | first).version }}"

- name: Override OpenShift versions on fresh install
  ansible.builtin.set_fact:
    openshift_versions: "{{ [{'version': mgmt_openshift_version, 'default': true}] }}"
  when: fresh | default(true) | bool
