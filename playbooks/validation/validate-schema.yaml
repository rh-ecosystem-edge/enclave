---
# Schema Validation Playbook
# Validates all config files against their JSON schemas
#
# Usage:
#   ansible-playbook playbooks/validation/validate-schema.yaml -e workingDir=/home/cloud-user

- name: Schema Validation
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Include defaults schema validation tasks
      ansible.builtin.include_tasks:
        file: tasks/defaults_schema_validation.yaml
        apply:
          tags: test-fixtures
      tags: test-fixtures

    - name: Include config fixtures validation tasks
      ansible.builtin.include_tasks:
        file: tasks/config_fixtures_validation.yaml
        apply:
          tags: test-fixtures
      tags: test-fixtures

    - name: Include config schema validation tasks
      ansible.builtin.include_tasks:
        file: tasks/config_schema_validation.yaml
        apply:
          tags: validate-config
      tags: validate-config
