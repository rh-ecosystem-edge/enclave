---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

additionalProperties: false
properties:
  control_binaries:
    type: object
    description: URLs and checksums for required binaries.
    properties:
      openshift_client:
        type: object
        properties:
          url:
            type: string
            description: URL to download OpenShift client binary.
          checksum:
            type: string
            description: SHA256 checksum for the binary.
            pattern: "^sha256:[0-9a-f]{64}$"
        required:
        - url
        - checksum
        additionalProperties: false
      helm:
        type: object
        properties:
          url:
            type: string
            description: URL to download Helm binary.
          checksum:
            type: string
            description: SHA256 checksum for the binary.
            pattern: "^sha256:[0-9a-f]{64}$"
        required:
        - url
        - checksum
        additionalProperties: false
      mirror_registry:
        type: object
        properties:
          url:
            type: string
            description: URL to download mirror-registry binary.
          checksum:
            type: string
            description: SHA256 checksum for the binary.
            pattern: "^sha256:[0-9a-f]{64}$"
        required:
        - url
        - checksum
        additionalProperties: false
      oc_mirror:
        type: object
        properties:
          url:
            type: string
            description: URL to download oc-mirror binary.
          checksum:
            type: string
            description: SHA256 checksum for the binary.
            pattern: "^sha256:[0-9a-f]{64}$"
        required:
        - url
        - checksum
        additionalProperties: false
    additionalProperties: false
required:
- control_binaries
