---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

definitions:
  operator:
    additionalProperties: false
    properties:
      name:
        type: string
        description: Operator package name as it appears in the catalog.
      version:
        type: string
        description: Operator version.
      channel:
        type: string
        description: Update channel for the operator.
      init_version:
        type: string
        description: Initial operator version.
      namespace:
        type: string
        description: Target namespace where the operator will be installed.
      source:
        type: string
        description: Catalog source name (from oc-mirror configuration).
      csvName:
        type: string
        description: ClusterServiceVersion name for the operator.
      full_channel:
        type: boolean
        description: When true, omit subscription startingCSV so OLM uses channel head. Use for operators whose catalog has build-suffix CSVs to avoid subscription pin drift and ConstraintsNotSatisfiable when the exact CSV is not in the mirrored catalog.
      global:
        type: boolean
        description: Configure operator to watch the entire cluster.
    required:
    - name
    - version
    - channel
    - init_version

additionalProperties: false
properties:
  operators:
    type: array
    description: List of operators to install and configure.
    items:
      $ref: "#/definitions/operator"
  model_operators:
    type: array
    description: List of operators to install and configure.
    items:
      $ref: "#/definitions/operator"
  storage_operators:
    type: object
    additionalProperties: false
    properties:
      odf:
        type: array
        description: List of operators to install and configure.
        items:
          $ref: "#/definitions/operator"
      lvms:
        type: array
        description: List of operators to install and configure.
        items:
          $ref: "#/definitions/operator"
