---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

definitions:
  operator:
    additionalProperties: false
    properties:
      name:
        type: string
        description: Operator package name as it appears in the catalog.
      defaultChannel:
        type: string
        description: Default update channel for the operator.
      channels:
        type: array
        description: Update channels for the operator.
        items:
          type: object
          additionalProperties: false
          properties:
            name:
              type: string
              description: Update channel name for the operator.
          required:
          - name
      namespace:
        type: string
        description: Target namespace where the operator will be installed.
      source:
        type: string
        description: Catalog source name (from oc-mirror configuration).
      disableTargetNamespace:
        type: boolean
        description: configure operator to watch a specific namespace or to watch the entire cluster
    required:
    - name
    - defaultChannel
    - channels

additionalProperties: false
properties:
  operators:
    type: array
    description: List of operators to install and configure.
    items:
      $ref: "#/definitions/operator"
  model_operators:
    type: array
    description: List of operators to install and configure.
    items:
      $ref: "#/definitions/operator"
  storage_operators:
    type: object
    additionalProperties: false
    properties:
      odf:
        $ref: "#/definitions/operator"
      lvms:
        $ref: "#/definitions/operator"
