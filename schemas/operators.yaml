---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

definitions:
  operator:
    additionalProperties: false
    properties:
      name:
        type: string
        description: Operator package name as it appears in the catalog.
      version:
        type: string
        description: Operator version.
      channel:
        type: string
        description: Update channel for the operator.
      init_version:
        type: string
        description: Initial operator version.
      namespace:
        type: string
        description: Target namespace where the operator will be installed.
      source:
        type: string
        description: Catalog source name (from oc-mirror configuration).
      csvNames:
        type: array
        items:
          type: string
          description: ClusterServiceVersion name for the operator.
      csvMirror:
        type: boolean
        description: Mirror operator packages listed under csvNames.
      extraMirrorPackages:
        type: array
        items:
          type: string
        description: Additional packages to mirror as bare entries without version constraints.
      global:
        type: boolean
        description: Configure operator to watch the entire cluster.
      disableDefaultNetworkPolicies:
        type: boolean
        description: >-
          Opt out of all three default NetworkPolicies: allow-from-same-namespace,
          allow-ingress-from-kube-apiserver, and allow-ingress-from-monitoring.
          When true, no default ingress rules are created and allowIngressFrom is forbidden.
      allowIngressFrom:
        type: array
        description: Additional ingress NetworkPolicies based on namespace label selectors.
        items:
          type: object
          additionalProperties: false
          required:
            - name
            - namespaceSelector
          properties:
            name:
              type: string
              description: Identifier used to name the NetworkPolicy (allow-ingress-from-<name>).
              pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
              maxLength: 253
            namespaceSelector:
              type: object
              additionalProperties: false
              required:
                - matchLabels
              properties:
                matchLabels:
                  type: object
                  description: Label selector to match source namespaces.
                  minProperties: 1
                  additionalProperties:
                    type: string
    if:
      required:
        - disableDefaultNetworkPolicies
      properties:
        disableDefaultNetworkPolicies:
          const: true
    then:
      properties:
        allowIngressFrom: false
    dependencies:
      csvMirror:
      - csvNames
    required:
    - name
    - version
    - channel
    - init_version

additionalProperties: false
properties:
  operators:
    type: array
    description: List of operators to install and configure.
    items:
      $ref: "#/definitions/operator"
