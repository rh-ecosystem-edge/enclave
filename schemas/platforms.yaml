---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

additionalProperties: false
properties:
  openshift_versions:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      properties:
        version:
          type: string
          description: OpenShift version to be available
        default:
          type: boolean
          description: Default OpenShift version
      required:
      - version
required:
- openshift_versions
