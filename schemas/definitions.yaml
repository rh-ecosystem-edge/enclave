---
definitions:
  ipv4Address:
    type: string
    pattern: "^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$"
    description: IPv4 address
  ipv4AddressWithOptionalPort:
    type: string
    pattern: "^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(:(([1-9][0-9]{0,3})|([1-5][0-9]{4})|(6[0-4][0-9]{3})|(65[0-4][0-9]{2})|(655[0-2][0-9])|(6553[0-5])))?$"
    description: IPv4 address with optional port (e.g. 192.168.1.1 or 192.168.1.1:8008)
  cidr:
    type: string
    pattern: "^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)/(3[0-2]|[12]?[0-9])$"
    description: CIDR notation network address
  macAddress:
    type: string
    pattern: "^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$"
    description: MAC address in colon-separated hex notation
  httpUrl:
    type: string
    pattern: "^https?://[^/]"
    description: HTTP or HTTPS URL with a non-empty hostname
  k8sQuantity:
    type: string
    pattern: "^([0-9]+\\.?[0-9]*|\\.[0-9]+)([eE][+-]?[0-9]+|Ki|Mi|Gi|Ti|Pi|Ei|m|k|M|G|T|P|E)?$"
    description: A Kubernetes resource quantity (e.g. 5Gi, 100m, 512Mi)
  nonEmptyString:
    type: string
    minLength: 1
    description: A non-empty string value
  hostname:
    type: string
    pattern: "^[a-zA-Z0-9]([a-zA-Z0-9\\-]*[a-zA-Z0-9])?(\\.[a-zA-Z0-9]([a-zA-Z0-9\\-]*[a-zA-Z0-9])?)*$"
    description: A valid DNS hostname
  disconnected:
    type: boolean
    description: >-
      Whether the deployment is disconnected (air-gapped). Default: true.
      Set to false for connected deployments.
  fresh:
    type: boolean
    description: >-
      Whether this is a fresh install. default: true.
      Set to false to mirror multiple OpenShift versions.
  masterMaxPods:
    type: integer
    minimum: 1
    description: >-
      Configure High Density Pod Limits for ABI. Default: 500.
  diskEncryption:
    type: boolean
    description: >-
      Whether to enable disk encryption using TPM v2. Default: false.
      Set to true to encrypt the installation partition on all nodes.
  ocMirrorLogLevel:
    type: string
    enum: [trace, debug, info, error]
    description: "Log level for oc-mirror. Default: info."
  quayBackendRGWIsSecure:
    type: boolean
    description: Whether to use HTTPS for backend storage
  quayBackendRGWMaximumChunkSizeMb:
    type: integer
    minimum: 1
    description: Maximum multipart upload chunk size in MB
  quayBackendRGWMinimumChunkSizeMb:
    type: integer
    minimum: 1
    description: Minimum multipart upload chunk size in MB
  quayBackendRGWPort:
    type: integer
    minimum: 1
    maximum: 65535
    description: Port for backend storage endpoint
  quayBackendRGWServerSideAssembly:
    type: boolean
    description: Enable server-side assembly for multipart uploads
  quayBackendStoragePath:
    type: string
    pattern: "^/"
    description: Path for backend storage
  hostEntry:
    type: object
    description: Host entry for cluster or discovery nodes
    properties:
      bmcSystemId:
        type: string
        description: Redfish system ID path component, defaults to '1'
      ipAddress:
        "$ref": "#/definitions/ipv4Address"
      macAddress:
        "$ref": "#/definitions/macAddress"
      mapInterfaces:
        description: Interface mapping configuration
        type: array
        items:
          type: object
          required:
            - name
            - macAddress
          properties:
            name:
              type: string
            macAddress:
              "$ref": "#/definitions/macAddress"
      name:
        "$ref": "#/definitions/nonEmptyString"
      networkConfig:
        type: object
        description: Network configuration
      redfish:
        "$ref": "#/definitions/ipv4AddressWithOptionalPort"
      redfishPassword:
        "$ref": "#/definitions/nonEmptyString"
      redfishUser:
        "$ref": "#/definitions/nonEmptyString"
      rootDisk:
        "$ref": "#/definitions/nonEmptyString"
    required:
      - name
      - redfish
      - redfishPassword
      - redfishUser
      - rootDisk
      - macAddress
    oneOf:
      - required:
          - ipAddress
        not:
          anyOf:
            - required:
              - networkConfig
            - required:
              - mapInterfaces
      - required:
          - networkConfig
          - mapInterfaces
        not:
          required:
            - ipAddress
