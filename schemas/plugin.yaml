---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

definitions:
  operator:
    type: object
    additionalProperties: false
    properties:
      name:
        type: string
        description: Operator package name as it appears in the catalog.
      version:
        type: string
        description: Operator version.
      channel:
        type: string
        description: Update channel for the operator.
      init_version:
        type: string
        description: Initial operator version.
      namespace:
        type: string
        description: Target namespace where the operator will be installed.
      source:
        type: string
        description: Catalog source name (from oc-mirror configuration).
      csvNames:
        type: array
        items:
          type: string
        description: ClusterServiceVersion names for the operator.
      csvMirror:
        type: boolean
        description: Mirror operator packages listed under csvNames.
      extraMirrorPackages:
        type: array
        items:
          type: string
        description: Additional packages to mirror as bare entries without version constraints.
      global:
        type: boolean
        description: Configure operator to watch the entire cluster.
    dependencies:
      csvMirror:
      - csvNames
    required:
      - name
      - version
      - channel

  selector:
    description: Defines a set of label matching selectors for ACM.
    type: object
    additionalProperties: false
    properties:
      matchLabels:
        type: object
        description: >-
          A map of {key,value} pairs. A single {key,value} in the matchLabels map
          is equivalent to an element of matchExpressions with operator 'In'.
        additionalProperties:
          type: string
      matchExpressions:
        type: array
        description: A list of label selector requirements. The requirements are ANDed.
        items:
          type: object
          required:
            - key
            - operator
          additionalProperties: false
          properties:
            key:
              type: string
              description: The label key that the selector applies to.
            operator:
              type: string
              description: Represents a key's relationship to a set of values.
              enum:
                - In
                - NotIn
                - Exists
                - DoesNotExist
            values:
              type: array
              description: >-
                An array of string values. Required if operator is 'In' or 'NotIn'.
                Must be empty if operator is 'Exists' or 'DoesNotExist'.
              items:
                type: string
          allOf:
            - if:
                properties:
                  operator:
                    enum: [In, NotIn]
              then:
                required: [values]
                properties:
                  values:
                    minItems: 1
            - if:
                properties:
                  operator:
                    enum: [Exists, DoesNotExist]
              then:
                properties:
                  values:
                    maxItems: 0

  registry:
    type: object
    additionalProperties: false
    properties:
      location:
        type: string
        description: Source registry location (e.g. registry.redhat.io/lvms4).
      mirror:
        type: string
        description: Mirror path under the internal Quay registry.
    required:
      - location
      - mirror

  requirement_var:
    type: object
    additionalProperties: false
    properties:
      name:
        type: string
        description: Ansible variable name that must be defined.
      description:
        type: string
        description: Human-readable description shown on failure.
      when:
        type: string
        description: Jinja2 condition — skip check if false.
    required:
      - name

  requirement_file:
    type: object
    additionalProperties: false
    properties:
      path:
        type: string
        description: File path relative to plugin directory.
      description:
        type: string
        description: Human-readable description shown on failure.
      when:
        type: string
        description: Jinja2 condition — skip check if false.
    required:
      - path

  helm_chart:
    type: object
    additionalProperties: false
    not:
      required: [valuesTemplate, valuesFile]
    if:
      required: [repo]
    then:
      required: [chart]
    properties:
      chart:
        type: string
        description: >-
          Chart name (when repo is set) or path relative to the plugin
          directory (local chart). Default for local: charts/<release>.
      repo:
        type: string
        description: >-
          Helm repository URL. When set, the chart is fetched from this
          remote repo instead of the local plugin directory.
      version:
        type: string
        description: Chart version constraint (e.g. '1.2.3' or '^1.0').
      release:
        type: string
        description: Helm release name.
      namespace:
        type: string
        description: Kubernetes namespace for the release.
      valuesTemplate:
        type: string
        description: Path to Jinja2 values template relative to plugin directory.
      valuesFile:
        type: string
        description: Path to static values file relative to plugin directory.
      createNamespace:
        type: boolean
        description: "Pass --create-namespace. Default: true."
      timeout:
        type: string
        description: "Helm timeout (e.g. '15m'). Default: '15m'."
      wait:
        type: boolean
        description: "Pass --wait. Default: true."
      extractImages:
        type: boolean
        description: >-
          Extract container image references from the chart's default values
          via helm template and merge into additionalImages for mirroring.
          Only works for local charts (repo must not be set). Default: false.
    required:
      - release
      - namespace

additionalProperties: false
properties:
  name:
    type: string
    description: Plugin identifier. Must match the directory name.
    pattern: "^[A-Za-z0-9][A-Za-z0-9._-]*$"
  type:
    type: string
    enum:
      - foundation
      - addon
    description: Plugin type. foundation plugins deploy before core operators.
  order:
    type: integer
    description: Deploy order among same-type plugins. Lower values deploy first.
  catalog:
    type: string
    description: The Operator catalog name to include in the image set.
    enum:
      - redhat
      - certified
  operators:
    type: array
    description: List of OLM operators to install.
    items:
      $ref: "#/definitions/operator"
  installOperators:
    type: boolean
    decsription: Install operators.
  clusterSelector:
    $ref: "#/definitions/selector"
  helm:
    type: array
    description: Helm charts to install, in order. Runs after OLM operators, before tasks/deploy.yaml.
    items:
      $ref: "#/definitions/helm_chart"
  defaults:
    type: object
    description: Default variables loaded into Ansible scope before plugin tasks run.
  registries:
    type: array
    description: Registry mirror entries for MCE custom-registries patching.
    items:
      $ref: "#/definitions/registry"
  additionalImages:
    type: array
    description: The additional images configuration of the image set.
    items:
      type: string
      description: The tag or digest of the image to mirror.
  blockedImages:
    type: array
    description: The blocked images configuration of the image set.
    items:
      type: string
      description: The full tag, digest, or pattern of images to block from mirroring.
  requires:
    type: object
    description: Declarative requirements validated at plugin load time.
    additionalProperties: false
    properties:
      vars:
        type: array
        description: Ansible variables that must be defined.
        items:
          $ref: "#/definitions/requirement_var"
      files:
        type: array
        description: Files that must exist within the plugin directory.
        items:
          $ref: "#/definitions/requirement_file"
required:
  - name
  - type
