---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

additionalProperties: false
properties:
  agent_hosts:
    type: array
    minItems: 3
    maxItems: 3
    description: List of exactly 3 control plane nodes
    items:
      "$ref": "#/definitions/hostEntry"
  apiVIP:
    "$ref": "#/definitions/ipv4Address"
  baseDomain:
    "$ref": "#/definitions/nonEmptyString"
  storage_plugin:
    type: string
    enum: [lvms, odf, vast-csi]
    description: Storage plugin to deploy for Quay database and assisted installer
  enabled_plugins:
    type: array
    description: List of plugins to deploy during the pipeline
    items:
      "$ref": "#/definitions/nonEmptyString"
  pullSecretPath:
    "$ref": "#/definitions/nonEmptyString"
    description: Path to the pull secret JSON file
  dc_cache_address:
    "$ref": "#/definitions/nonEmptyString"
    description: Address of the disconnected cache registry
  dc_cache_user:
    "$ref": "#/definitions/nonEmptyString"
    description: Username for the disconnected cache registry
  dc_cache_password:
    "$ref": "#/definitions/nonEmptyString"
    description: Password for the disconnected cache registry
  clusterName:
    "$ref": "#/definitions/nonEmptyString"
  defaultDNS:
    "$ref": "#/definitions/ipv4Address"
  defaultGateway:
    "$ref": "#/definitions/ipv4Address"
  defaultNtpServers:
    type: array
    description: Additional NTP servers for cluster nodes
    items:
      type: string
  defaultPrefix:
    type: integer
    minimum: 1
    maximum: 32
    description: Network prefix length (subnet mask bits)
  disconnected:
    "$ref": "#/definitions/disconnected"
  masterMaxPods:
    "$ref": "#/definitions/masterMaxPods"
  diskEncryption:
    "$ref": "#/definitions/diskEncryption"
  ingressVIP:
    "$ref": "#/definitions/ipv4Address"
  lzBmcHostname:
    "$ref": "#/definitions/hostname"
  lzBmcIP:
    "$ref": "#/definitions/ipv4Address"
  machineNetwork:
    "$ref": "#/definitions/cidr"
  ocMirrorLogLevel:
    "$ref": "#/definitions/ocMirrorLogLevel"
  odfExternalConfig:
    type: string
    description: ODF external cluster configuration JSON string
  pullSecret:
    type: object
    description: Pull Secret
  quayBackend:
    type: string
    enum: [RadosGWStorage, LocalStorage]
    description: Quay storage backend type
  quayBackendLocalStorageConfiguration:
    type: object
    description: Custom LocalStorage backend configuration merged with quayBackendDefaults
  quayBackendRGWConfiguration:
    type: object
    description: RadosGW/S3 backend configuration for Quay
    additionalProperties: false
    properties:
      access_key:
        "$ref": "#/definitions/nonEmptyString"
      bucket_name:
        "$ref": "#/definitions/nonEmptyString"
      hostname:
        "$ref": "#/definitions/nonEmptyString"
      is_secure:
        "$ref": "#/definitions/quayBackendRGWIsSecure"
      maximum_chunk_size_mb:
        "$ref": "#/definitions/quayBackendRGWMaximumChunkSizeMb"
      minimum_chunk_size_mb:
        "$ref": "#/definitions/quayBackendRGWMinimumChunkSizeMb"
      port:
        "$ref": "#/definitions/quayBackendRGWPort"
      secret_key:
        "$ref": "#/definitions/nonEmptyString"
      server_side_assembly:
        "$ref": "#/definitions/quayBackendRGWServerSideAssembly"
      storage_path:
        "$ref": "#/definitions/quayBackendStoragePath"
    required:
      - access_key
      - bucket_name
      - hostname
      - secret_key
  quayPassword:
    "$ref": "#/definitions/nonEmptyString"
  quayUser:
    "$ref": "#/definitions/nonEmptyString"
  rendezvousIP:
    "$ref": "#/definitions/ipv4Address"
  schemaValidationNoLog:
    type: boolean
    default: false
    description: >-
      Whether to suppress schema validation task output (no_log). Default: false.
      Set to true in CI to avoid leaking secrets in logs.
  sshPubPath:
    "$ref": "#/definitions/nonEmptyString"
  vastAdminPassword:
    "$ref": "#/definitions/nonEmptyString"
  vastAdminUsername:
    "$ref": "#/definitions/nonEmptyString"
  vastDefaults:
    type: object
    description: VAST CSI default configuration
    additionalProperties: false
    properties:
      infraTenant:
        "$ref": "#/definitions/nonEmptyString"
      storagePath:
        "$ref": "#/definitions/nonEmptyString"
      validateCerts:
        type: boolean
      apiTimeout:
        type: integer
        minimum: 1
      apiVersion:
        "$ref": "#/definitions/nonEmptyString"
      csiProvisioners:
        type: object
        additionalProperties: false
        properties:
          nfs:
            "$ref": "#/definitions/nonEmptyString"
          block:
            "$ref": "#/definitions/nonEmptyString"
      csiDriverName:
        "$ref": "#/definitions/nonEmptyString"
      quayPvcSize:
        "$ref": "#/definitions/nonEmptyString"
      tiers:
        type: array
        minItems: 1
        maxItems: 20
        items:
          type: object
          additionalProperties: false
          properties:
            name:
              type: string
              pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
              maxLength: 63
            protocol:
              type: string
              enum: [nfs, block]
            default:
              type: boolean
          required:
            - name
            - protocol
  vastEndpoint:
    "$ref": "#/definitions/httpUrl"
    description: VAST management endpoint URL
  vastVipPool:
    type: object
    description: VAST VIP pool configuration
    additionalProperties: false
    properties:
      subnet_cidr:
        type: integer
        minimum: 1
        maximum: 32
      ip_ranges:
        type: array
        items:
          type: object
          properties:
            start:
              "$ref": "#/definitions/ipv4Address"
            end:
              "$ref": "#/definitions/ipv4Address"
          required:
            - start
            - end
      role:
        type: string
    required:
      - subnet_cidr
      - ip_ranges
  aapLicenseFile:
    "$ref": "#/definitions/nonEmptyString"
    description: Path to AAP license manifest.zip file on the Landing Zone
  workingDir:
    "$ref": "#/definitions/nonEmptyString"

required:
  - agent_hosts
  - apiVIP
  - baseDomain
  - clusterName
  - defaultDNS
  - defaultGateway
  - defaultPrefix
  - ingressVIP
  - lzBmcIP
  - machineNetwork
  - pullSecret
  - quayBackend
  - quayPassword
  - quayUser
  - rendezvousIP
  - sshPubPath
  - workingDir

allOf:
  - if:
      properties:
        quayBackend:
          const: RadosGWStorage
    then:
      required:
        - quayBackendRGWConfiguration
  - if:
      properties:
        storage_plugin:
          const: odf
      required:
        - storage_plugin
    then:
      required:
        - odfExternalConfig
  - if:
      properties:
        storage_plugin:
          const: vast-csi
      required:
        - storage_plugin
    then:
      required:
        - vastEndpoint
        - vastAdminUsername
        - vastAdminPassword
        - vastVipPool
