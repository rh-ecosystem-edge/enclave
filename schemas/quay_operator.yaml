---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

additionalProperties: false
properties:
  quayFeatureProxyStorage:
    type: boolean
    description: Enable proxy storage feature for Quay
  quayFeatureQuotaManagement:
    type: boolean
    description: Enable quota management feature for Quay
  quayMaximumLayerSize:
    type: string
    description: Maximum layer size for Quay registry in M or G units (e.g. 100G, 20M)
    pattern: "^[0-9]+(G|M)$"
  quayBackendDefaults:
    type: object
    description: Default configuration applied to all Quay backends
    additionalProperties: false
    properties:
      storage_path:
        type: string
        description: Path for backend storage
        pattern: "^/"
    required:
      - storage_path
  quayBackendRGWDefaults:
    type: object
    description: Default configuration applied only when quayBackend is RadosGWStorage
    additionalProperties: false
    properties:
      is_secure:
        type: boolean
        description: Whether to use HTTPS for backend storage
      port:
        type: integer
        description: Port for backend storage endpoint
        minimum: 1
        maximum: 65535
      minimum_chunk_size_mb:
        type: integer
        description: Minimum multipart upload chunk size in MB
        minimum: 1
      maximum_chunk_size_mb:
        type: integer
        description: Maximum multipart upload chunk size in MB
        minimum: 1
      server_side_assembly:
        type: boolean
        description: Enable server-side assembly for multipart uploads
    required:
      - is_secure
      - port
      - minimum_chunk_size_mb
      - maximum_chunk_size_mb
      - server_side_assembly

required:
  - quayFeatureProxyStorage
  - quayFeatureQuotaManagement
  - quayMaximumLayerSize
  - quayBackendDefaults
  - quayBackendRGWDefaults
