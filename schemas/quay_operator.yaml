---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

additionalProperties: false
properties:
  quayFeatureProxyStorage:
    type: boolean
    description: Enable proxy storage feature for Quay
  quayFeatureQuotaManagement:
    type: boolean
    description: Enable quota management feature for Quay
  quayMaximumLayerSize:
    type: string
    description: Maximum layer size for Quay registry in M or G units (e.g. 100G, 20M)
    pattern: "^[0-9]+(G|M)$"
  quayBackendDefaults:
    type: object
    description: Default configuration applied to all Quay backends
    additionalProperties: false
    properties:
      storage_path:
        "$ref": "#/definitions/quayBackendStoragePath"
    required:
      - storage_path
  quayBackendRGWDefaults:
    type: object
    description: Default configuration applied only when quayBackend is RadosGWStorage
    additionalProperties: false
    properties:
      is_secure:
        "$ref": "#/definitions/quayBackendRGWIsSecure"
      port:
        "$ref": "#/definitions/quayBackendRGWPort"
      minimum_chunk_size_mb:
        "$ref": "#/definitions/quayBackendRGWMinimumChunkSizeMb"
      maximum_chunk_size_mb:
        "$ref": "#/definitions/quayBackendRGWMaximumChunkSizeMb"
      server_side_assembly:
        "$ref": "#/definitions/quayBackendRGWServerSideAssembly"
    required:
      - is_secure
      - port
      - minimum_chunk_size_mb
      - maximum_chunk_size_mb
      - server_side_assembly

required:
  - quayFeatureProxyStorage
  - quayFeatureQuotaManagement
  - quayMaximumLayerSize
  - quayBackendDefaults
  - quayBackendRGWDefaults
