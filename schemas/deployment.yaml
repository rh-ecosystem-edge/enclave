---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

additionalProperties: false
properties:
  disconnected:
    "$ref": "#/definitions/disconnected"
  fresh:
    "$ref": "#/definitions/fresh"
  masterMaxPods:
    "$ref": "#/definitions/masterMaxPods"
  diskEncryption:
    "$ref": "#/definitions/diskEncryption"
  ocMirrorLogLevel:
    "$ref": "#/definitions/ocMirrorLogLevel"
  pullSecretPath:
    type: string
    description: >-
      Path to the pull secret JSON file. Default: {{ workingDir }}/config/pull-secret.json.
  storage_plugin:
    type: string
    enum: [lvms, odf, vast-csi]
    description: >-
      Which storage plugin to deploy. Default: lvms.
  enabled_plugins:
    type: array
    items:
      type: string
    description: >-
      List of plugins to deploy during the pipeline. Default: [storage_plugin].
  migrationTasksFilePath:
    type: string
    description: >-
      Path to the migration control file on the Landing Zone host. Records one applied migration
      filename per line (append-only).
  quayRegistryCAConfigmapName:
    type: string
    description: >-
      ConfigMap name for Quay registry CA certificates used by image.config and UpdateService.
      Partner overlays that replace image.config.spec.additionalTrustedCA must include the
      'updateservice-registry' key from this ConfigMap to prevent UpdateService reconciliation failures.
  defaultInterfaceName:
    type: string
    pattern: "^[a-zA-Z0-9_.-]+$"
    description: >-
      Default network interface name for NMState configuration. Override per host via
      discovery_hosts[].interfaceName.
required:
  - disconnected
  - fresh
  - masterMaxPods
  - diskEncryption
  - ocMirrorLogLevel
  - pullSecretPath
  - defaultInterfaceName
