---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

additionalProperties: false
properties:
  disconnected:
    "$ref": "#/definitions/disconnected"
  fresh:
    "$ref": "#/definitions/fresh"
  masterMaxPods:
    "$ref": "#/definitions/masterMaxPods"
  diskEncryption:
    "$ref": "#/definitions/diskEncryption"
  ocMirrorLogLevel:
    "$ref": "#/definitions/ocMirrorLogLevel"
  pullSecretPath:
    type: string
    description: >-
      Path to the pull secret JSON file. Default: {{ workingDir }}/config/pull-secret.json.
  storage_plugin:
    type: string
    enum: [lvms, odf, vast-csi]
    description: >-
      Which storage plugin to deploy. Default: lvms.
  enabled_plugins:
    type: array
    items:
      type: string
    description: >-
      List of plugins to deploy during the pipeline. Default: [storage_plugin].
required:
  - disconnected
  - fresh
  - masterMaxPods
  - diskEncryption
  - ocMirrorLogLevel
  - pullSecretPath
