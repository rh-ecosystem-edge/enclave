---
"$schema": "http://json-schema.org/draft-07/schema"
version: "1.0"
type: object

additionalProperties: false
properties:
  content_images:
    type: object
    description: URLs and checksums for RHCOS images.
    properties:
      imgs:
        type: array
        description: List of rootfs images (used by agent-based installer).
        items:
          type: object
          required:
          - url
          - checksum
          properties:
            url:
              type: string
              description: URL to download the rootfs image.
            checksum:
              type: string
              description: SHA256 checksum for the image.
              pattern: "^sha256:[0-9a-f]{64}$"
          additionalProperties: false
      isos:
        type: array
        description: List of ISO images (used for traditional installation).
        items:
          type: object
          required:
          - url
          - checksum
          properties:
            url:
              type: string
              description: URL to download the ISO image.
            checksum:
              type: string
              description: SHA256 checksum for the image.
              pattern: "^sha256:[0-9a-f]{64}$"
          additionalProperties: false
    additionalProperties: false
required:
- content_images
