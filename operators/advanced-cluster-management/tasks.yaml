- name: Ensure RHACM MultiClusterHub is present
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operator.open-cluster-management.io/v1
      kind: MultiClusterHub
      metadata:
        name: multiclusterhub
        namespace: open-cluster-management
      spec: {}
  retries: 60
  delay: 10
  register: r_mhc
  until: r_mhc is succeeded

- name: Set MCE operator namespace for upgrade approval during MCH wait
  ansible.builtin.set_fact:
    mce_namespace: "{{ (operators | selectattr('name', 'equalto', 'multicluster-engine') | first).namespace }}"

- name: Wait until RHACM MultiClusterHub is ready (approving pending upgrades)
  ansible.builtin.shell: |
    set -euo pipefail
    # Approve any unapproved InstallPlans for MCE and ACM
    for ns in "{{ mce_namespace }}" "{{ operator.namespace }}"; do
      for plan in $(oc get installplan -n "$ns" \
        -o jsonpath='{.items[?(@.spec.approved==false)].metadata.name}'); do
        echo "Approving InstallPlan $plan in $ns"
        oc patch installplan "$plan" -n "$ns" \
          --type merge -p '{"spec":{"approved":true}}' 2>&1 || true
      done
    done
    # Output MCH phase for the until condition
    oc get multiclusterhub multiclusterhub -n open-cluster-management \
      -o jsonpath='{.status.phase}'
  register: mch_phase_result
  retries: 120
  delay: 30
  until:
    - mch_phase_result.rc == 0
    - mch_phase_result.stdout == "Running"
  changed_when: false

- name: Create Namespace for policies
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: openshift-acm-policies
  register: r_namespace_acm_policies
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_namespace_acm_policies is success

- name: Add ManagedClusterSetBinding
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cluster.open-cluster-management.io/v1beta2
      kind: ManagedClusterSetBinding
      metadata:
        name: default
        namespace: openshift-acm-policies
      spec:
        clusterSet: default
  register: r_managedclustersetbinding
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_managedclustersetbinding is success

- name: Create Placement for policies
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cluster.open-cluster-management.io/v1beta1
      kind: Placement
      metadata:
        name: placement-local
        namespace: openshift-acm-policies
      spec:
        predicates:
          - requiredClusterSelector:
              labelSelector:
                matchExpressions:
                  - key: name
                    operator: In
                    values:
                      - local-cluster
  register: r_placement_acm_policies
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_placement_acm_policies is success

- name: ACM ClusterImageSet reconciliation
  ansible.builtin.include_tasks:
    file: acm_cis.yaml

- name: Trust custom Root CA in Hive for spoke cluster connections
  ansible.builtin.include_tasks:
    file: trust_hive_ca.yaml
  when:
    - sslCACertificate is defined
    - sslCACertificate | length > 0
