- name: Configure MultiClusterHub
  ansible.builtin.include_tasks:
    file: configure_mch.yaml

- name: Create Namespace for policies
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: openshift-acm-policies
  register: r_namespace_acm_policies
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_namespace_acm_policies is success

- name: Add ManagedClusterSetBinding
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cluster.open-cluster-management.io/v1beta2
      kind: ManagedClusterSetBinding
      metadata:
        name: default
        namespace: openshift-acm-policies
      spec:
        clusterSet: default
  register: r_managedclustersetbinding
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_managedclustersetbinding is success

- name: Create Placement for policies
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cluster.open-cluster-management.io/v1beta1
      kind: Placement
      metadata:
        name: placement-local
        namespace: openshift-acm-policies
      spec:
        predicates:
          - requiredClusterSelector:
              labelSelector:
                matchExpressions:
                  - key: name
                    operator: In
                    values:
                      - local-cluster
  register: r_placement_acm_policies
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_placement_acm_policies is success

- name: ACM ClusterImageSet reconciliation
  ansible.builtin.include_tasks:
    file: acm_cis.yaml

- name: Trust custom Root CA in Hive for spoke cluster connections
  ansible.builtin.include_tasks:
    file: trust_hive_ca.yaml
  when:
    - sslCACertificate is defined
    - sslCACertificate | length > 0
