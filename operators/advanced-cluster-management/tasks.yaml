- name: Create assisted-service-user-config ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: assisted-service-user-config
        namespace: multicluster-engine
      data:
        ALLOW_CONVERGED_FLOW: "false"
        PAUSE_PROVISIONED_BMHS: "false"

- name: Create AgentServiceConfig for disconnected environment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: agent-install.openshift.io/v1beta1
      kind: AgentServiceConfig
      metadata:
        annotations:
          agent-install.openshift.io/enable-local-cluster-import: "true"
          unsupported.agent-install.openshift.io/assisted-service-configmap: assisted-service-user-config
        name: agent
      spec:
        mirrorRegistryRef:
          name: custom-registries
        databaseStorage:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 40Gi
        filesystemStorage:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 40Gi
        osImages:
        - cpuArchitecture: x86_64
          openshiftVersion: "4.20"
          rootFSUrl: "http://{{ quayHostname }}/rhcos-4.20.0-x86_64-live-rootfs.x86_64.img"
          url: "http://{{ quayHostname }}/rhcos-4.20.0-x86_64-live-iso.x86_64.iso"
          version: 9.6.20251023-0

- name: ACM ClusterImageSet reconciliation
  ansible.builtin.include_tasks:
    file: acm_cis.yaml
