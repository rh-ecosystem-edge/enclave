- name: Create Configmap for disconnected
  when: disconnected | default(true)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: custom-registries
        namespace: multicluster-engine
        labels:
          app: assisted-service
