            prefix = ""
            location="quay.io/openshift-release-dev/ocp-v4.0-art-dev"
            mirror-by-digest-only=true
          [[registry.mirror]]
            location="registry-quay-quay-enterprise.apps.{{ clusterName }}.{{ baseDomain }}/openshift/release"

          [[registry]]
            prefix = ""
            location="registry.redhat.io/openshift"
            mirror-by-digest-only=true
          [[registry.mirror]]
            location="registry-quay-quay-enterprise.apps.{{ clusterName }}.{{ baseDomain }}/openshift"

          [[registry]]
            prefix = ""
            location = "registry.redhat.io/openshift-pipelines"
            mirror-by-digest-only=true
