- name: Create assisted-service-user-config ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: assisted-service-user-config
        namespace: multicluster-engine
      data:
        ALLOW_CONVERGED_FLOW: "false"
        PAUSE_PROVISIONED_BMHS: "false"
  register: r_configmap_assisted_service
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_configmap_assisted_service is success

- name: Create AgentServiceConfig for disconnected environment
  vars:
    _osimages: |
      {% for v in openshift_versions %}
      - cpuArchitecture: x86_64
        openshiftVersion: "{{ v.version }}"
        url: "http://{{ quayHostname }}/rhcos-{{ v.version }}-x86_64-live-iso.x86_64.iso"
        version: "{{ iso_version_facts[v.version] }}"
      {% endfor %}
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: agent-install.openshift.io/v1beta1
      kind: AgentServiceConfig
      metadata:
        annotations:
          agent-install.openshift.io/enable-local-cluster-import: "true"
          unsupported.agent-install.openshift.io/assisted-service-configmap: assisted-service-user-config
        name: agent
      spec:
        mirrorRegistryRef:
          name: custom-registries
        databaseStorage:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 40Gi
        filesystemStorage:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 40Gi
        osImages: "{{ _osimages | from_yaml }}"
  register: r_agentserviceconfig
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_agentserviceconfig is success
