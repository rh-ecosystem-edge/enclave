---
- name: Patch CertManager to set resources
  kubernetes.core.k8s:
    state: patched
    definition:
      apiVersion: operator.openshift.io/v1alpha1
      kind: CertManager
      metadata:
        name: cluster
      spec:
        cainjectorConfig:
          overrideReplicas: 2
          overrideResources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 200m
              memory: 256Mi
        controllerConfig:
          overrideReplicas: 2
          overrideResources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 200m
              memory: 128Mi
        webhookConfig:
          overrideReplicas: 3
          overrideResources:
            limits:
              cpu: 20m
              memory: 32Mi
            requests:
              cpu: 20m
              memory: 32Mi

- name: Wait for cert-manager webhook to be available
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager-webhook
    namespace: cert-manager
  register: r_cert_manager_webhook
  retries: 60
  delay: 10
  until:
    - r_cert_manager_webhook.resources is defined
    - r_cert_manager_webhook.resources | length > 0
    - r_cert_manager_webhook.resources[0].status.availableReplicas is defined
    - r_cert_manager_webhook.resources[0].status.availableReplicas >= 3
