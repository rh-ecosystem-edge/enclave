---
# NVIDIA GPU Operator Default Configuration

# Enable/disable NVIDIA support
enable_nvidia: false

# NVIDIA support mode
# - certified: Red Hat certified GPU operator (default)
# - community: Community GPU operator from OperatorHub
# - vendor-managed: No operator; facility provider manages GPUs
nvidia_support_mode: "certified"

# GPU Operator version (certified mode)
nvidia_gpu_operator_version: "25.10.1"
nvidia_gpu_operator_channel: "v25.10"
nvidia_gpu_operator_min_version: "25.10.0"
nvidia_gpu_operator_namespace: "nvidia-gpu-operator"

# OpenShift AI dependency
# Set to false to skip OpenShift AI prerequisite check
nvidia_require_openshift_ai: true

# User disclaimer
# Set to false to skip interactive disclaimer prompt
nvidia_show_disclaimer: true

# NVIDIA driver configuration
nvidia_driver_enabled: true
nvidia_driver_use_nvidia_driver_crd: false
nvidia_driver_auto_upgrade: true
nvidia_driver_kernel_module_type: "auto"  # auto, nv_peer_mem, nvidia-peermem
nvidia_driver_max_parallel_upgrades: 1
nvidia_driver_max_unavailable: "25%"

# NVIDIA licensing
nvidia_licensing_nls_enabled: true

# NVIDIA feature enablement
nvidia_dcgm_enabled: true
nvidia_dcgm_exporter_enabled: true
nvidia_mig_manager_enabled: true
nvidia_gpu_feature_discovery_enabled: true
nvidia_device_plugin_enabled: true
nvidia_toolkit_enabled: true
nvidia_vgpu_manager_enabled: false
nvidia_vgpu_device_manager_enabled: true
nvidia_sandbox_device_plugin_enabled: true
nvidia_vfio_manager_enabled: true
nvidia_gds_enabled: false
nvidia_gdrcopy_enabled: false

# ClusterPolicy configuration
nvidia_cluster_policy_name: "gpu-cluster-policy"
nvidia_default_runtime: "crio"
nvidia_use_ocp_driver_toolkit: true
nvidia_cdi_enabled: true
nvidia_sandbox_workloads_enabled: false
nvidia_sandbox_workloads_default: "container"
nvidia_mig_strategy: "single"
nvidia_daemonsets_update_strategy: "RollingUpdate"
nvidia_daemonsets_rolling_update_max_unavailable: "1"
