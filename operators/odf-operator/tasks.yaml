- name: Ensure Secret is present
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: rook-ceph-external-cluster-details
        namespace: openshift-storage
      data:
        external_cluster_details: "{{ odfExternalConfig | b64encode }}"
      type: Opaque

- name: Ensure StorageCluster is present
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: ocs.openshift.io/v1
      kind: StorageCluster
      metadata:
        name: ocs-external-storagecluster
        namespace: openshift-storage
      spec:
        encryption: {}
        externalStorage:
          enable: true
        labelSelector: {}
        managedResources:
          cephBlockPools:
            defaultStorageClass: true
          cephFilesystems: {}
          cephObjectStoreUsers:
            reconcileStrategy: ignore
          cephObjectStores:
            reconcileStrategy: ignore
  retries: 60
  delay: 10
  register: r_storagecluster
  until: r_storagecluster is succeeded

- name: Wait for StorageCluster to be available
  kubernetes.core.k8s_info:
    api_version: ocs.openshift.io/v1
    kind: StorageCluster
    name: ocs-external-storagecluster
    namespace: openshift-storage
    wait: true
    wait_sleep: 10
    wait_timeout: 300
    wait_condition:
      reason: ReconcileCompleted
      status: "True"
      type: Available
  register: r_storage_cluster_info
  until: r_storage_cluster_info is success
  retries: 30
  delay: 10
