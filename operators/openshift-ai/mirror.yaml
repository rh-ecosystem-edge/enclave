---
# OpenShift AI Image Mirroring for Disconnected Environments
# Mirrors OpenShift AI operator and supporting operators to local Quay registry

- name: Generate OpenShift AI imagesetconfiguration
  when: disconnected | default(true)
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/imagesetconfiguration-openshift-ai.yaml.j2"
    dest: "{{ workingDir }}/config/imagesetconfiguration-openshift-ai.yaml"
  tags:
    - openshift-ai-mirror

- name: Mirror OpenShift AI operator images
  when: disconnected | default(true)
  ansible.builtin.shell: |
    {{ workingDir }}/bin/oc-mirror --v2 \
      --log-level {{ ocMirrorLogLevel }} \
      --authfile {{ pullSecretPath }} \
      -c {{ workingDir }}/config/imagesetconfiguration-openshift-ai.yaml \
      --workspace file://{{ workingDir }}/config/oc-mirror-workspace \
      docker://{{ quayHostname }}:8443 \
      --dest-tls-verify=false \
      --parallel-images 10 \
      --parallel-layers 10 \
      --retry-times 10 \
      --retry-delay 0 \
      > {{ workingDir }}/logs/oc-mirror-openshift-ai.$(date +%s).log 2>&1
  retries: 5
  delay: 10
  register: r_oc_mirror_openshift_ai
  until: r_oc_mirror_openshift_ai is succeeded
  tags:
    - openshift-ai-mirror

- name: OpenShift AI mirror summary
  ansible.builtin.debug:
    msg:
      - "OpenShift AI images mirrored successfully"
      - "Mirror log: {{ workingDir }}/logs/oc-mirror-openshift-ai.*.log"
      - "Operators mirrored:"
      - "  - rhods-operator (OpenShift AI)"
      - "  - nfd (Node Feature Discovery)"
      - "  - servicemeshoperator3 (Service Mesh)"
      - "  - openshift-cert-manager-operator (Cert Manager)"
      - "  - rhcl-operator (Connectivity Link)"
      - "  - leader-worker-set"
      - "  - limitador-operator"
      - "  - authorino-operator"
      - "  - dns-operator"
  tags:
    - openshift-ai-mirror
