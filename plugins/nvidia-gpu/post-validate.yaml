---
# The NVIDIA GPU operator is deployed to managed (spoke) clusters via ACM policy
# from the openshift-ai plugin. This post-validate checks that the ACM policy
# resources are correctly configured on the hub cluster.

- name: Verify ACM Policy for GPU operator exists
  kubernetes.core.k8s_info:
    api_version: policy.open-cluster-management.io/v1
    kind: Policy
    name: model-configuration
    namespace: "{{ openshift_ai_policy_namespace }}"
  register: r_gpu_policy
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_gpu_policy is success
    - r_gpu_policy.resources | length > 0

- name: Verify ACM Policy is not disabled
  ansible.builtin.assert:
    that:
      - not (r_gpu_policy.resources[0].spec.disabled | default(false) | bool)
    fail_msg: "ACM Policy model-configuration is disabled"
    success_msg: "ACM Policy model-configuration is enabled"

- name: Verify PlacementRule for GPU policy exists
  kubernetes.core.k8s_info:
    api_version: apps.open-cluster-management.io/v1
    kind: PlacementRule
    name: model-configuration
    namespace: "{{ openshift_ai_policy_namespace }}"
  register: r_gpu_placementrule
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_gpu_placementrule is success
    - r_gpu_placementrule.resources | length > 0

- name: Verify PlacementBinding for GPU policy exists
  kubernetes.core.k8s_info:
    api_version: policy.open-cluster-management.io/v1
    kind: PlacementBinding
    name: model-configuration
    namespace: "{{ openshift_ai_policy_namespace }}"
  register: r_gpu_placementbinding
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_gpu_placementbinding is success
    - r_gpu_placementbinding.resources | length > 0

- name: Check certified operator CatalogSource exists
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: CatalogSource
    namespace: openshift-marketplace
  register: r_gpu_catalogs

- name: Verify mirror catalog for GPU operator is available
  ansible.builtin.assert:
    that: >-
      r_gpu_catalogs.resources
        | selectattr('metadata.name', 'defined')
        | map(attribute='metadata.name')
        | list | length > 0
    fail_msg: "No CatalogSources found in openshift-marketplace"
    success_msg: "Found {{ r_gpu_catalogs.resources | length }} CatalogSource(s) in openshift-marketplace"

- name: NVIDIA GPU post-validation passed
  ansible.builtin.debug:
    msg: "NVIDIA GPU deployment verified - ACM policy resources present, catalog sources available"
