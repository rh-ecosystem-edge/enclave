---
- name: Verify GPU operator CSV is Succeeded
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: "{{ nvidia_gpu_namespace }}"
  register: r_gpu_csvs
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_gpu_csvs is success
    - r_gpu_csvs.resources | length > 0
    - r_gpu_csvs.resources | selectattr('status.phase', 'equalto', 'Succeeded') | list | length == r_gpu_csvs.resources | length

- name: Display GPU operator CSVs
  ansible.builtin.debug:
    msg: "CSV {{ item.metadata.name }} is {{ item.status.phase }}"
  loop: "{{ r_gpu_csvs.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

- name: Verify ClusterPolicy CR exists
  kubernetes.core.k8s_info:
    api_version: nvidia.com/v1
    kind: ClusterPolicy
    name: "{{ nvidia_cluster_policy_name }}"
  register: r_cluster_policy
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_cluster_policy is success
    - r_cluster_policy.resources | length > 0

- name: Check for nodes with nvidia.com/gpu allocatable
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
    label_selectors:
      - feature.node.kubernetes.io/pci-10de.present=true
  register: r_gpu_nodes_alloc

- name: Verify nvidia.com/gpu is allocatable
  ansible.builtin.assert:
    that: >-
      r_gpu_nodes_alloc.resources
        | selectattr('status.allocatable', 'defined')
        | map(attribute='status.allocatable')
        | map('dict2items')
        | flatten
        | selectattr('key', 'equalto', 'nvidia.com/gpu')
        | list | length > 0
    fail_msg: >-
      No nodes have nvidia.com/gpu as an allocatable resource.
      The GPU operator may still be initializing drivers and device plugins.
    success_msg: "GPU resources are allocatable on cluster nodes"
  when: r_gpu_nodes_alloc.resources | length > 0

- name: NVIDIA GPU post-validation passed
  ansible.builtin.debug:
    msg: "NVIDIA GPU deployment verified - operator CSV healthy, ClusterPolicy present"
