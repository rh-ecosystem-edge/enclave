---
name: lvms
type: foundation
order: 10
mirror: core

operators:
  - name: lvms-operator
    version: 4.20.0
    channel: stable-4.20
    init_version: 4.20.0
    namespace: openshift-storage
    source: cs-mirror-redhat-operators-v4-20

requires:
  files:
    - path: "tasks/deploy.yaml"
      description: "LVMS deployment tasks"
    - path: "tasks/quay.yaml"
      description: "LVMS Quay storage configuration"

defaults:
  lvmsConfigDefaults:
    deviceSelector:
      forceWipeDevicesAndDestroyAllData: true
  lvmsDefaults:
    deviceClassName: vg1
    defaultStorageClass: true
    thinPoolConfig:
      name: vg1-pool-1
      sizePercent: 90
      overprovisionRatio: 10

registries:
  - location: "registry.redhat.io/lvms4"
    mirror: "lvms4"
