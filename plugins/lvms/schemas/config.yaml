---
"$schema": "http://json-schema.org/draft-07/schema"
type: object
additionalProperties: false
properties:
  lvmsConfig:
    type: object
    description: LVMS storage configuration overrides for this deployment.
    additionalProperties: false
    properties:
      deviceSelector:
        type: object
        additionalProperties: false
        properties:
          optionalPaths:
