---
"$schema": "http://json-schema.org/draft-07/schema"
type: object
additionalProperties: false
properties:
  lvmsConfigDefaults:
    type: object
    description: Default overrides for lvmsConfig merged before user values.
    additionalProperties: false
    properties:
      deviceSelector:
        type: object
        additionalProperties: false
        properties:
          forceWipeDevicesAndDestroyAllData:
            type: boolean
            description: Wipe and reformat devices managed by LVMS on creation.
  lvmsDefaults:
    type: object
    description: Default LVMS LVMCluster configuration values.
    additionalProperties: false
    properties:
      deviceClassName:
        type: string
        description: Name of the LVMVolumeGroup device class.
      defaultStorageClass:
        type: boolean
        description: Make the LVMS StorageClass the cluster default.
      thinPoolConfig:
        type: object
        description: Thin pool configuration for the LVMS volume group.
        additionalProperties: false
        properties:
          name:
            type: string
            description: Name of the thin pool logical volume.
          sizePercent:
            type: integer
            description: Percentage of the volume group allocated to the thin pool (1–100).
            minimum: 1
            maximum: 100
          overprovisionRatio:
            type: integer
            description: Thin pool overprovisioning ratio (must be at least 1).
            minimum: 1
        required:
          - name
          - sizePercent
          - overprovisionRatio
