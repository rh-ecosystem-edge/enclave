---
name: trust-manager
type: addon
order: 100

requires:
  resources:
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: certificates.cert-manager.io
    - apiVersion: apps/v1
      kind: Deployment
      name: cert-manager
      namespace: cert-manager

helm:
  - release: trust-manager
    repo: https://charts.jetstack.io
    chart: trust-manager
    version: v0.20.0
    namespace: cert-manager
    createNamespace: false
