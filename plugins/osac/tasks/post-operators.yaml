---
# Post-operators hook for OSAC plugin.
# Runs after the 'aap' plugin has deployed the AAP operator and instance,
# before the OSAC Helm chart is installed.
#
# Prerequisites (handled by 'aap' plugin, order 103):
#   - AAP operator installed and ready
#   - AnsibleAutomationPlatform CR created and reconciled
#   - AAP license secret created
#
# Responsibilities:
#   1. Create OSAC namespace and RBAC resources
#   2. Wait for AAP controller to become ready
#   3. Extract AAP admin credentials
#   4. Create AAP Personal Access Token via awx-manage
#   5. Upload kubeconfig secret for AAP
#   6. Create config-as-code secrets for bootstrap
#   7. Set osac_aap_url and osac_aap_token facts for Helm values template
#
# Facts exported:
#   osac_aap_url   — AAP controller route URL (used in templates/values.yaml.j2)
#   osac_aap_token — AAP personal access token (used in templates/values.yaml.j2)

# --- Namespace and RBAC ---

- name: Ensure OSAC namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ osacDefaults.osacNamespace }}"

- name: Create OSAC ServiceAccount in AAP namespace
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', plugin_dir ~ '/files/aap-osac-sa.yaml.j2') | from_yaml }}"

- name: Create OSAC ClusterRole
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', plugin_dir ~ '/files/aap-osac-clusterrole.yaml.j2') | from_yaml }}"

- name: Create OSAC ClusterRoleBinding
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', plugin_dir ~ '/files/aap-osac-rolebinding.yaml.j2') | from_yaml }}"

# --- Wait for AAP Controller ---
# The 'aap' plugin (order 103) deploys the AAP instance but OSAC needs
# the controller route and admin credentials to be available.

- name: Wait for AAP controller route
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    namespace: "{{ osacDefaults.aapNamespace }}"
    label_selectors:
      - "app.kubernetes.io/component=automationcontroller"
  register: r_aap_route
  until: r_aap_route.resources | length > 0
  retries: 60
  delay: 30

- name: Set AAP URL fact
  ansible.builtin.set_fact:
    osac_aap_url: "https://{{ r_aap_route.resources[0].spec.host }}"
    _aap_route_host: "{{ r_aap_route.resources[0].spec.host }}"

# Ensure the AAP route hostname resolves on the Landing Zone.
# Libvirt dnsmasq only has entries for a fixed set of app hostnames,
# so dynamically created routes (like AAP) won't resolve by default.
- name: Add AAP route hostname to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ ingressVIP }} {{ _aap_route_host }}"
    regexp: "{{ _aap_route_host | regex_escape() }}"
    state: present
  become: true

# --- AAP Credentials ---

- name: Wait for AAP admin secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ osacDefaults.aapNamespace }}"
    name: "{{ osacDefaults.aapName }}-admin-password"
  register: r_aap_admin_secret
  until: r_aap_admin_secret.resources | length > 0
  retries: 30
  delay: 10

- name: Extract AAP admin password
  ansible.builtin.set_fact:
    _aap_admin_password: "{{ r_aap_admin_secret.resources[0].data.password | b64decode }}"

# --- AAP Token ---
# AAP 2.5 gateway does not support Basic auth or expose the OAuth2 token
# endpoint (/api/o/token/) through the route. Create the token directly
# via awx-manage inside the controller pod, bypassing the gateway.

- name: Create AAP personal access token via awx-manage
  ansible.builtin.command:
    cmd: >-
      oc exec -n {{ osacDefaults.aapNamespace }}
      deployment/{{ osacDefaults.aapName }}-controller-web
      -- awx-manage create_oauth2_token
      --user {{ osacDefaults.aapApiUser }}
  register: r_aap_token_exec
  retries: 10
  delay: 15
  until: r_aap_token_exec.rc == 0
  changed_when: r_aap_token_exec.rc == 0
  no_log: true

- name: Set AAP token fact
  ansible.builtin.set_fact:
    osac_aap_token: "{{ r_aap_token_exec.stdout_lines | last | trim }}"

# --- Kubeconfig Secret ---

- name: Create kubeconfig secret for AAP
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ osacDefaults.aapName }}-kubeconfig"
        namespace: "{{ osacDefaults.aapNamespace }}"
      type: Opaque
      data:
        kubeconfig: "{{ lookup('ansible.builtin.file', workingDir ~ '/ocp-cluster/auth/kubeconfig') | b64encode }}"

# --- Config-as-Code Secrets for Bootstrap ---

- name: Create config-as-code-ig secret for bootstrap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: config-as-code-ig
        namespace: "{{ osacDefaults.osacNamespace }}"
      type: Opaque
      stringData:
        controller_hostname: "{{ osac_aap_url }}"
        controller_username: "{{ osacDefaults.aapApiUser }}"
        controller_password: "{{ _aap_admin_password }}"
        controller_validate_certs: "{{ osacDefaults.aapApiValidateCerts | string | lower }}"

- name: Create config-as-code-manifest-ig secret for bootstrap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: config-as-code-manifest-ig
        namespace: "{{ osacDefaults.osacNamespace }}"
      type: Opaque
      data:
        manifest.zip: "{{ lookup('ansible.builtin.file', aap_license_file) | b64encode }}"

- name: Log OSAC post-operators completion
  ansible.builtin.debug:
    msg: "OSAC post-operators complete. AAP URL={{ osac_aap_url }}, token set."
