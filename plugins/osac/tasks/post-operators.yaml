---
# Post-operators hook for OSAC plugin.
# Runs after the AAP operator is installed (CRDs available),
# before the OSAC Helm chart is deployed.
#
# Responsibilities:
#   1.  Create osac namespace with ca-bundle label
#   2.  Wait for ca-bundle ConfigMap sync (trust-manager)
#   3.  Detect Keycloak hostname from cluster ingress config
#   4.  Add Keycloak route to /etc/hosts (connected mode only)
#   5.  Get Keycloak admin credentials
#   6.  Obtain Keycloak admin access token via REST API
#   7.  Create osac realm (idempotent)
#   8.  Create and configure osac-controller client (via keycloak_client.yaml)
#   8b. Create and configure osac-admin client (via keycloak_client.yaml)
#   9.  Fetch client UUID + secret, create fulfillment-controller-credentials
#   10. Deploy PostgreSQL (when not BYO): certs, init secret, config, Deployment, Service, NetworkPolicy
#   11. Create postgres-client-cert-service Certificate CR (when not BYO)
#   12. Wait for certificate issuance
#   13. Create fulfillment-db secret (when not BYO, or BYO with osacDatabaseUrl)
#   14. Create config-as-code-manifest-ig secret (AAP license)

# =====================================================================
# 1. Create osac namespace with ca-bundle label
# =====================================================================

- name: Create osac namespace with ca-bundle label
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: osac
        labels:
          enclave/ca-bundle: "true"
  register: __r_ns
  retries: 5
  delay: 5
  until: __r_ns is success

# =====================================================================
# 2. Wait for ca-bundle ConfigMap sync
# =====================================================================

- name: Wait for ca-bundle ConfigMap in osac namespace
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: ca-bundle
    namespace: osac
  register: __r_ca_bundle
  retries: 30
  delay: 10
  until:
    - __r_ca_bundle.resources | length > 0
    - __r_ca_bundle.resources[0].data['bundle.pem'] is defined
    - __r_ca_bundle.resources[0].data['bundle.pem'] | length > 0

# =====================================================================
# 2b. Write CA bundle to local file for Keycloak TLS validation
# =====================================================================

- name: Create temp file for Keycloak CA bundle
  ansible.builtin.tempfile:
    state: file
    suffix: -osac-ca-bundle.pem
  register: __r_osac_keycloak_ca_file

- name: Write CA bundle to temp file for Keycloak TLS validation
  ansible.builtin.copy:
    content: "{{ __r_ca_bundle.resources[0].data['bundle.pem'] }}"
    dest: "{{ __r_osac_keycloak_ca_file.path }}"
    mode: '0600'

- name: Set Keycloak CA path fact
  ansible.builtin.set_fact:
    _osac_keycloak_ca_path: "{{ __r_osac_keycloak_ca_file.path }}"

# =====================================================================
# 3. Detect Keycloak hostname from cluster ingress config
# =====================================================================

- name: Detect cluster ingress domain
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: Ingress
    name: cluster
  register: __r_ingress_config

- name: Set Keycloak hostname
  ansible.builtin.set_fact:
    _osac_keycloak_hostname: "{{ osac_keycloak_name }}.{{ __r_ingress_config.resources[0].spec.domain }}"

# =====================================================================
# 4. Add Keycloak route hostname to /etc/hosts (connected mode only)
# =====================================================================
# In connected/libvirt deployments, dnsmasq only resolves a fixed set
# of app hostnames. Dynamically created routes won't resolve by default,
# so we add them to /etc/hosts on the Landing Zone.

- name: Add Keycloak route hostname to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ ingressVIP }} {{ _osac_keycloak_hostname }}"
    regexp: "{{ _osac_keycloak_hostname | regex_escape() }}"
    state: present
  become: true
  when: not disconnected | default(true) | bool

# =====================================================================
# 5. Get Keycloak admin credentials
# =====================================================================

- name: Get Keycloak admin credentials secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ osac_keycloak_name }}-initial-admin"
    namespace: "{{ osac_keycloak_ns }}"
  register: __r_keycloak_admin_secret
  retries: 10
  delay: 10
  until: __r_keycloak_admin_secret.resources | length > 0
  no_log: true

- name: Extract Keycloak admin credentials
  ansible.builtin.set_fact:
    _osac_kc_admin_user: "{{ __r_keycloak_admin_secret.resources[0].data.username | b64decode }}"
    _osac_kc_admin_pass: "{{ __r_keycloak_admin_secret.resources[0].data.password | b64decode }}"
  no_log: true

# =====================================================================
# 6. Obtain Keycloak admin access token
# =====================================================================

- name: Get Keycloak admin access token
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: password
      client_id: admin-cli
      username: "{{ _osac_kc_admin_user }}"
      password: "{{ _osac_kc_admin_pass }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: 200
  register: __r_kc_token
  retries: 10
  delay: 15
  until: __r_kc_token.status == 200
  no_log: true

- name: Set Keycloak access token fact
  ansible.builtin.set_fact:
    _osac_kc_token: "{{ __r_kc_token.json.access_token }}"
  no_log: true

# =====================================================================
# 7. Create osac realm (idempotent)
# =====================================================================

- name: Check if osac realm exists
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: [200, 404]
  register: __r_realm_check
  no_log: true

- name: Create osac realm
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms"
    method: POST
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
      Content-Type: application/json
    body_format: json
    body:
      realm: "{{ osac_keycloak_realm }}"
      enabled: true
      organizationsEnabled: true
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: [201]
  when: __r_realm_check.status == 404
  no_log: true

# =====================================================================
# 7b. Create OSAC-specific client scopes (groups, username, osac-api)
# =====================================================================

- name: Create OSAC client scopes
  ansible.builtin.include_tasks: keycloak_client_scope.yaml
  vars:
    _kc_scope: "{{ item }}"
  loop: "{{ osac_keycloak_client_scopes }}"

# =====================================================================
# 7c. Create osac-cli public client for UI/CLI login
# =====================================================================

- name: Check if osac-cli client exists
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/clients?clientId=osac-cli"
    method: GET
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: 200
  register: __r_osac_cli_check
  no_log: true

- name: Create osac-cli public client
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/clients"
    method: POST
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
      Content-Type: application/json
    body_format: json
    body:
      clientId: osac-cli
      enabled: true
      publicClient: true
      standardFlowEnabled: true
      directAccessGrantsEnabled: true
      serviceAccountsEnabled: false
      protocol: openid-connect
      defaultClientScopes:
        - groups
        - basic
        - username
        - roles
        - osac-api
      optionalClientScopes: []
      redirectUris:
        - http://localhost
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: [201]
  when: __r_osac_cli_check.json | length == 0
  no_log: true

# =====================================================================
# 7d. Create groups and test users
# =====================================================================

- name: Create Keycloak groups for test users
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/groups"
    method: POST
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: "{{ item }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: [201, 409]
  loop: "{{ osac_keycloak_test_users | map(attribute='groups') | flatten | unique }}"
  no_log: true
  when: osacTestUsers | bool

- name: Create test users
  ansible.builtin.include_tasks: keycloak_user.yaml
  vars:
    _kc_user: "{{ item }}"
  loop: "{{ osac_keycloak_test_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: osacTestUsers | bool

# =====================================================================
# 7e. Verify test users exist with correct attributes and groups
# =====================================================================

- name: Fetch test user from Keycloak
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/users?username={{ item.username }}&exact=true"
    method: GET
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: 200
  register: __r_verify_users
  loop: "{{ osac_keycloak_test_users }}"
  no_log: true
  when: osacTestUsers | bool

- name: Assert test user attributes
  ansible.builtin.assert:
    that:
      - item.json | length == 1
      - item.json[0].username == item.item.username
      - item.json[0].firstName == item.item.firstName
      - item.json[0].lastName == item.item.lastName
      - item.json[0].email == item.item.email
      - item.json[0].enabled
      - item.json[0].emailVerified
  loop: "{{ __r_verify_users.results }}"
  no_log: true
  when: osacTestUsers | bool

- name: Fetch test user group membership
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/users/{{ item.json[0].id }}/groups"
    method: GET
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: 200
  register: __r_verify_groups
  loop: "{{ __r_verify_users.results }}"
  no_log: true
  when: osacTestUsers | bool

- name: Assert test user group membership
  ansible.builtin.assert:
    that:
      - (item.json | map(attribute='name') | sort) == (item.item.item.groups | sort)
  loop: "{{ __r_verify_groups.results }}"
  no_log: true
  when: osacTestUsers | bool

# =====================================================================
# 7f. Verify osac-cli client has expected default scopes
# =====================================================================

- name: Fetch osac-cli client details
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/clients?clientId=osac-cli"
    method: GET
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: 200
  register: __r_osac_cli_details
  no_log: true

- name: Fetch osac-cli default scopes
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/clients/{{ __r_osac_cli_details.json[0].id }}/default-client-scopes"
    method: GET
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: 200
  register: __r_osac_cli_scopes
  no_log: true

- name: Assert osac-cli client scopes include OSAC-specific scopes
  vars:
    _scope_names: "{{ __r_osac_cli_scopes.json | map(attribute='name') | list }}"
  ansible.builtin.assert:
    that:
      - "'groups' in _scope_names"
      - "'username' in _scope_names"
      - "'osac-api' in _scope_names"
  no_log: true

# =====================================================================
# 8. Create and configure osac-controller client (idempotent)
# =====================================================================

- name: Set up osac-controller Keycloak client
  ansible.builtin.include_tasks: keycloak_client.yaml
  vars:
    _kc_setup_client_id: "{{ osac_keycloak_client_id }}"

# =====================================================================
# 8b. Create and configure osac-admin client (idempotent)
# =====================================================================

- name: Set up osac-admin Keycloak client
  ansible.builtin.include_tasks: keycloak_client.yaml
  vars:
    _kc_setup_client_id: "{{ osac_keycloak_admin_client_id }}"

# =====================================================================
# 9. Fetch client UUID + secret, create fulfillment-controller-credentials
# =====================================================================

- name: Fetch osac-controller client details
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/clients?clientId={{ osac_keycloak_client_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: 200
  register: __r_client_details
  no_log: true

- name: Set client UUID fact
  ansible.builtin.set_fact:
    _osac_client_uuid: "{{ __r_client_details.json[0].id }}"
  no_log: true

# Use the secret from the client representation if available.
# For newly created clients Keycloak may not populate the secret field
# until it is explicitly generated via POST.
- name: Set client secret from client representation
  ansible.builtin.set_fact:
    _osac_client_secret: "{{ __r_client_details.json[0].secret }}"
  when: __r_client_details.json[0].secret | default('') | length > 0
  no_log: true

- name: Fetch client secret if not in representation
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/clients/{{ _osac_client_uuid }}/client-secret"
    method: GET
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: 200
  register: __r_fetched_secret
  when: _osac_client_secret is not defined
  no_log: true

- name: Set client secret from fetched value
  ansible.builtin.set_fact:
    _osac_client_secret: "{{ __r_fetched_secret.json.value }}"
  when:
    - _osac_client_secret is not defined
    - __r_fetched_secret.json.value | default('') | length > 0
  no_log: true

- name: Generate client secret as last resort
  ansible.builtin.uri:
    url: "https://{{ _osac_keycloak_hostname }}/admin/realms/{{ osac_keycloak_realm }}/clients/{{ _osac_client_uuid }}/client-secret"
    method: POST
    headers:
      Authorization: "Bearer {{ _osac_kc_token }}"
    validate_certs: "{{ osac_keycloak_validate_certs }}"
    ca_path: "{{ _osac_keycloak_ca_path }}"
    status_code: 200
  register: __r_generated_secret
  when: _osac_client_secret is not defined
  no_log: true

- name: Set client secret from generated value
  ansible.builtin.set_fact:
    _osac_client_secret: "{{ __r_generated_secret.json.value }}"
  when: _osac_client_secret is not defined
  no_log: true

- name: Create fulfillment-controller-credentials secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: fulfillment-controller-credentials
        namespace: osac
      type: Opaque
      stringData:
        client-id: "{{ osac_keycloak_client_id }}"
        client-secret: "{{ _osac_client_secret }}"
  no_log: true

# =====================================================================
# 10. Deploy PostgreSQL (when not BYO database)
# =====================================================================

# --- Server certificate ---

- name: Create postgres-server-cert Certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: postgres-server-cert
        namespace: osac
      spec:
        secretName: postgres-server-cert
        issuerRef:
          kind: ClusterIssuer
          name: default-ca
        commonName: "{{ osac_db_name }}"
        dnsNames:
          - "{{ osac_db_name }}"
          - "{{ osac_db_name }}.osac"
          - "{{ osac_db_name }}.osac.svc"
          - "{{ osac_db_name }}.osac.svc.cluster.local"
        usages:
          - server auth
        privateKey:
          rotationPolicy: Always
  when: not osacBYODatabase | bool

# --- PostgreSQL server config ---

- name: Create postgres-config ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: postgres-config
        namespace: osac
      data:
        server.conf: |
          listen_addresses = '*'
          ssl = on
          ssl_cert_file = '/etc/postgres-certs/tls.crt'
          ssl_key_file = '/etc/postgres-certs/tls.key'
          ssl_ca_file = '/etc/postgres-certs/ca.crt'
          hba_file = '/etc/postgres-config/access.conf'
        access.conf: |
          # TYPE  DATABASE  USER        ADDRESS      METHOD
          local   all       all                      trust
          host    all       all         127.0.0.1/32 trust
          host    all       all         ::1/128      trust
          hostssl all       all         all          cert clientcert=verify-full
  when: not osacBYODatabase | bool

# --- PostgreSQL Service ---

- name: Deploy PostgreSQL Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ osac_db_name }}"
        namespace: osac
      spec:
        selector:
          app: "{{ osac_db_name }}"
        ports:
          - name: postgres
            port: 5432
            targetPort: 5432
  when: not osacBYODatabase | bool

# --- PostgreSQL NetworkPolicy ---

- name: Restrict PostgreSQL ingress to osac namespace pods
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-osac-to-db
        namespace: osac
      spec:
        podSelector:
          matchLabels:
            app: "{{ osac_db_name }}"
        ingress:
          - from:
              - podSelector: {}
            ports:
              - protocol: TCP
                port: 5432
        policyTypes:
          - Ingress
  when: not osacBYODatabase | bool

# --- PostgreSQL PVC ---

- name: Create PostgreSQL PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ osac_db_name }}-data"
        namespace: osac
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "{{ osac_db_size }}"
  when: not osacBYODatabase | bool

# --- PostgreSQL Deployment ---

- name: Deploy PostgreSQL Deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ osac_db_name }}"
        namespace: osac
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: "{{ osac_db_name }}"
        template:
          metadata:
            labels:
              app: "{{ osac_db_name }}"
          spec:
            automountServiceAccountToken: false
            containers:
              - name: postgresql
                image: "{{ osac_db_image }}"
                ports:
                  - containerPort: 5432
                args:
                  - run-postgresql
                  - -c
                  - config_file=/etc/postgres-config/server.conf
                env:
                  - name: POSTGRESQL_USER
                    value: "{{ osac_db_user }}"
                  - name: POSTGRESQL_PASSWORD
                    value: "{{ osac_db_user }}"
                  - name: POSTGRESQL_DATABASE
                    value: "{{ osac_db_database }}"
                securityContext:
                  runAsNonRoot: true
                  readOnlyRootFilesystem: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/pgsql
                  - name: tmp
                    mountPath: /tmp
                  - name: run-postgresql
                    mountPath: /var/run/postgresql
                  - name: server-certs
                    mountPath: /etc/postgres-certs
                    readOnly: true
                  - name: config
                    mountPath: /etc/postgres-config
                    readOnly: true
                readinessProbe:
                  exec:
                    command:
                      - /usr/libexec/check-container
                  initialDelaySeconds: 5
                  periodSeconds: 10
                livenessProbe:
                  exec:
                    command:
                      - /usr/libexec/check-container
                      - --live
                  initialDelaySeconds: 30
                  periodSeconds: 10
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: "{{ osac_db_name }}-data"
              - name: tmp
                emptyDir: {}
              - name: run-postgresql
                emptyDir: {}
              - name: server-certs
                secret:
                  secretName: postgres-server-cert
                  defaultMode: 288
              - name: config
                configMap:
                  name: postgres-config
  when: not osacBYODatabase | bool

# --- Wait for PostgreSQL ready ---

- name: Wait for PostgreSQL ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: "{{ osac_db_name }}"
    namespace: osac
  register: __r_db_ready
  retries: 30
  delay: 10
  until:
    - __r_db_ready.resources | length > 0
    - __r_db_ready.resources[0].status.availableReplicas | default(0) | int > 0
  when: not osacBYODatabase | bool

# =====================================================================
# 11. Create postgres-client-cert-service Certificate CR (when not BYO)
# =====================================================================

- name: Create postgres-client-cert-service Certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: postgres-client-cert-service
        namespace: osac
      spec:
        secretName: postgres-client-cert-service
        issuerRef:
          kind: ClusterIssuer
          name: default-ca
        commonName: "{{ osac_db_user }}"
        usages:
          - client auth
        privateKey:
          rotationPolicy: Always
  when: not osacBYODatabase | bool

# =====================================================================
# 12. Wait for certificate issuance
# =====================================================================

- name: Wait for postgres-client-cert-service certificate ready
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: Certificate
    name: postgres-client-cert-service
    namespace: osac
  register: __r_client_cert
  retries: 30
  delay: 5
  until:
    - __r_client_cert.resources | length > 0
    - __r_client_cert.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Ready')
      | selectattr('status', 'equalto', 'True')
      | list | length > 0
  when: not osacBYODatabase | bool

# =====================================================================
# 13. Create fulfillment-db secret
# =====================================================================

- name: Build fulfillment database connection URL
  ansible.builtin.set_fact:
    _osac_db_url: >-
      postgres://{{ osac_db_user }}@{{ osac_db_name }}:5432/{{ osac_db_database
      }}?sslmode=verify-full&sslrootcert=/etc/fulfillment-grpc-server/db/sslrootcert&sslcert=/etc/fulfillment-grpc-server/db/sslcert&sslkey=/etc/fulfillment-grpc-server/db/sslkey
  when: not osacBYODatabase | bool

- name: Create fulfillment-db secret (built-in PostgreSQL with mTLS)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: fulfillment-db
        namespace: osac
      type: Opaque
      stringData:
        url: "{{ _osac_db_url }}"
  when: not osacBYODatabase | bool
  no_log: true

- name: Create fulfillment-db secret (BYO database with provided URL)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: fulfillment-db
        namespace: osac
      type: Opaque
      stringData:
        url: "{{ osacDatabaseUrl }}"
  when:
    - osacBYODatabase | bool
    - osacDatabaseUrl is defined
    - osacDatabaseUrl | length > 0
  no_log: true

# =====================================================================
# 14. Create config-as-code-manifest-ig secret (AAP license)
# =====================================================================

- name: Create config-as-code-manifest-ig secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: config-as-code-manifest-ig
        namespace: osac
      type: Opaque
      data:
        license.zip: "{{ lookup('ansible.builtin.file', osacAapLicenseFile) | b64encode }}"
  no_log: true

# =====================================================================
# Cleanup: remove CA bundle temp file
# =====================================================================

- name: Remove CA bundle temp file
  ansible.builtin.file:
    path: "{{ __r_osac_keycloak_ca_file.path }}"
    state: absent
  when: __r_osac_keycloak_ca_file.path is defined

- name: Log OSAC post-operators completion
  ansible.builtin.debug:
    msg: >-
      OSAC post-operators complete. Namespace osac created, Keycloak
      realm/client configured, PostgreSQL {{ 'skipped (BYO)' if osacBYODatabase | bool else 'deployed' }},
      secrets created.
