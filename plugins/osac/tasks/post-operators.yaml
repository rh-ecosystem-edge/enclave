---
# Post-operators hook for OSAC plugin.
# Runs after the 'aap' plugin has deployed the AAP operator and instance,
# before the OSAC Helm chart is installed.
#
# Prerequisites (handled by 'aap' plugin, order 103):
#   - AAP operator installed and ready
#   - AnsibleAutomationPlatform CR created and reconciled
#   - AAP license secret created
#
# Responsibilities:
#   1. Create OSAC namespace with CA bundle label and wait for sync
#   2. Create RBAC resources for OSAC ServiceAccount
#   3. Create Keycloak realm and client for OSAC fulfillment service
#   4. Create fulfillment-controller-credentials secret (Keycloak client creds)
#   5. Deploy PostgreSQL for fulfillment service and create fulfillment-db secret
#   6. Wait for AAP controller to become ready
#   7. Extract AAP admin credentials
#   8. Create AAP Personal Access Token via awx-manage
#   9. Upload kubeconfig secret for AAP
#  10. Create config-as-code secrets for bootstrap
#  11. Set osac_aap_url and osac_aap_token facts for Helm values template
#
# Facts exported:
#   osac_aap_url   — AAP controller route URL (used in templates/values.yaml.j2)
#   osac_aap_token — AAP personal access token (used in templates/values.yaml.j2)

# --- Namespace and RBAC ---

- name: Ensure OSAC namespace exists with CA bundle label
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ osacDefaults.osacNamespace }}"
        labels:
          enclave/ca-bundle: "true"

- name: Wait for ca-bundle ConfigMap (synced by trust-manager)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: ca-bundle
    namespace: "{{ osacDefaults.osacNamespace }}"
  register: r_ca_bundle
  retries: 30
  delay: 10
  until: r_ca_bundle.resources | length > 0

- name: Create OSAC ServiceAccount in AAP namespace
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', plugin_dir ~ '/files/aap-osac-sa.yaml.j2') | from_yaml }}"

- name: Create OSAC ClusterRole
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', plugin_dir ~ '/files/aap-osac-clusterrole.yaml.j2') | from_yaml }}"

- name: Create OSAC ClusterRoleBinding
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.template', plugin_dir ~ '/files/aap-osac-rolebinding.yaml.j2') | from_yaml }}"

# --- Keycloak Realm and Client ---
# The rhbk plugin (order 101) deploys Keycloak in the keycloak namespace.
# By the time OSAC runs (order 200), Keycloak is fully ready.
# Create an 'osac' realm with an 'osac-controller' confidential client
# via the Keycloak Admin REST API.

- name: Detect cluster ingress domain for Keycloak hostname
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: Ingress
    name: cluster
  register: r_ingress_config

- name: Set Keycloak hostname from cluster ingress domain
  ansible.builtin.set_fact:
    _keycloak_route_host: "{{ osacDefaults.keycloakName }}.{{ r_ingress_config.resources[0].spec.domain }}"
    _keycloak_base_url: "https://{{ osacDefaults.keycloakName }}.{{ r_ingress_config.resources[0].spec.domain }}"

# Ensure the Keycloak hostname resolves on the Landing Zone.
# Libvirt dnsmasq only has entries for a fixed set of app hostnames,
# so dynamically created routes (like Keycloak) won't resolve by default.
- name: Add Keycloak route hostname to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ ingressVIP }} {{ _keycloak_route_host }}"
    regexp: "{{ _keycloak_route_host | regex_escape() }}"
    state: present
  become: true

- name: Get Keycloak admin credentials
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ osacDefaults.keycloakNamespace }}"
    name: "{{ osacDefaults.keycloakName }}-initial-admin"
  register: r_keycloak_admin_secret
  retries: 30
  delay: 10
  until: r_keycloak_admin_secret.resources | length > 0
  no_log: true

- name: Extract Keycloak admin credentials
  ansible.builtin.set_fact:
    _keycloak_admin_user: "{{ r_keycloak_admin_secret.resources[0].data.username | b64decode }}"
    _keycloak_admin_password: "{{ r_keycloak_admin_secret.resources[0].data.password | b64decode }}"
  no_log: true

- name: Get Keycloak admin access token
  ansible.builtin.uri:
    url: "{{ _keycloak_base_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: password
      client_id: admin-cli
      username: "{{ _keycloak_admin_user }}"
      password: "{{ _keycloak_admin_password }}"
    validate_certs: false
    status_code: 200
  register: r_keycloak_token
  retries: 10
  delay: 15
  until: r_keycloak_token.status == 200
  no_log: true

- name: Set Keycloak admin token fact
  ansible.builtin.set_fact:
    _keycloak_admin_token: "{{ r_keycloak_token.json.access_token }}"
  no_log: true

- name: Check if osac realm exists
  ansible.builtin.uri:
    url: "{{ _keycloak_base_url }}/admin/realms/{{ osacDefaults.keycloakRealmName }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _keycloak_admin_token }}"
    validate_certs: false
    status_code: [200, 404]
  register: r_osac_realm

- name: Create osac realm
  ansible.builtin.uri:
    url: "{{ _keycloak_base_url }}/admin/realms"
    method: POST
    headers:
      Authorization: "Bearer {{ _keycloak_admin_token }}"
      Content-Type: application/json
    body_format: json
    body:
      realm: "{{ osacDefaults.keycloakRealmName }}"
      enabled: true
    validate_certs: false
    status_code: 201
  when: r_osac_realm.status == 404

- name: Check if osac-controller client exists
  ansible.builtin.uri:
    url: "{{ _keycloak_base_url }}/admin/realms/{{ osacDefaults.keycloakRealmName }}/clients?clientId={{ osacDefaults.keycloakClientId }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _keycloak_admin_token }}"
    validate_certs: false
    status_code: 200
  register: r_osac_client

- name: Create osac-controller client
  ansible.builtin.uri:
    url: "{{ _keycloak_base_url }}/admin/realms/{{ osacDefaults.keycloakRealmName }}/clients"
    method: POST
    headers:
      Authorization: "Bearer {{ _keycloak_admin_token }}"
      Content-Type: application/json
    body_format: json
    body:
      clientId: "{{ osacDefaults.keycloakClientId }}"
      enabled: true
      protocol: openid-connect
      publicClient: false
      serviceAccountsEnabled: true
      standardFlowEnabled: false
    validate_certs: false
    status_code: 201
  when: r_osac_client.json | length == 0

# Re-fetch the client to get its UUID (needed for secret retrieval)
- name: Fetch osac-controller client details
  ansible.builtin.uri:
    url: "{{ _keycloak_base_url }}/admin/realms/{{ osacDefaults.keycloakRealmName }}/clients?clientId={{ osacDefaults.keycloakClientId }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _keycloak_admin_token }}"
    validate_certs: false
    status_code: 200
  register: r_osac_client_details

- name: Set client UUID fact
  ansible.builtin.set_fact:
    _keycloak_client_uuid: "{{ r_osac_client_details.json[0].id }}"

- name: Get osac-controller client secret
  ansible.builtin.uri:
    url: "{{ _keycloak_base_url }}/admin/realms/{{ osacDefaults.keycloakRealmName }}/clients/{{ _keycloak_client_uuid }}/client-secret"
    method: GET
    headers:
      Authorization: "Bearer {{ _keycloak_admin_token }}"
    validate_certs: false
    status_code: 200
  register: r_osac_client_secret
  no_log: true

- name: Create fulfillment-controller-credentials secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: fulfillment-controller-credentials
        namespace: "{{ osacDefaults.osacNamespace }}"
      type: Opaque
      stringData:
        client-id: "{{ osacDefaults.keycloakClientId }}"
        client-secret: "{{ r_osac_client_secret.json.value }}"
  no_log: true

# --- PostgreSQL for Fulfillment Service ---
# Follows the same pattern as the rhbk plugin's PostgreSQL deployment.

- name: Read existing fulfillment database credentials
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ osacDefaults.fulfillmentDbName }}-credentials"
    namespace: "{{ osacDefaults.osacNamespace }}"
  register: r_existing_fulfillment_db_secret
  no_log: true

- name: Set fulfillment database password from existing secret or generate new one
  ansible.builtin.set_fact:
    _fulfillment_db_password: >-
      {{
        (r_existing_fulfillment_db_secret.resources[0].data.password | b64decode)
        if (r_existing_fulfillment_db_secret.resources | default([]) | length > 0)
        else lookup('password', '/dev/null length=24 chars=ascii_letters,digits')
      }}
  no_log: true

- name: Create fulfillment database credentials secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ osacDefaults.fulfillmentDbName }}-credentials"
        namespace: "{{ osacDefaults.osacNamespace }}"
      type: Opaque
      stringData:
        username: "{{ osacDefaults.fulfillmentDbUsername }}"
        password: "{{ _fulfillment_db_password }}"
  no_log: true
  when: r_existing_fulfillment_db_secret.resources | default([]) | length == 0

- name: Deploy fulfillment PostgreSQL Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ osacDefaults.fulfillmentDbName }}"
        namespace: "{{ osacDefaults.osacNamespace }}"
      spec:
        selector:
          app: "{{ osacDefaults.fulfillmentDbName }}"
        ports:
          - name: postgres
            port: 5432
            targetPort: 5432

- name: Restrict fulfillment PostgreSQL ingress to OSAC pods only
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-fulfillment-to-db
        namespace: "{{ osacDefaults.osacNamespace }}"
      spec:
        podSelector:
          matchLabels:
            app: "{{ osacDefaults.fulfillmentDbName }}"
        ingress:
          - from:
              - namespaceSelector: {}
                podSelector: {}
            ports:
              - protocol: TCP
                port: 5432
        policyTypes:
          - Ingress

- name: Deploy fulfillment PostgreSQL StatefulSet
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: "{{ osacDefaults.fulfillmentDbName }}"
        namespace: "{{ osacDefaults.osacNamespace }}"
      spec:
        serviceName: "{{ osacDefaults.fulfillmentDbName }}"
        replicas: 1
        selector:
          matchLabels:
            app: "{{ osacDefaults.fulfillmentDbName }}"
        template:
          metadata:
            labels:
              app: "{{ osacDefaults.fulfillmentDbName }}"
          spec:
            automountServiceAccountToken: false
            containers:
              - name: postgresql
                image: "{{ osacDefaults.fulfillmentDbImage }}"
                ports:
                  - containerPort: 5432
                env:
                  - name: POSTGRESQL_USER
                    valueFrom:
                      secretKeyRef:
                        name: "{{ osacDefaults.fulfillmentDbName }}-credentials"
                        key: username
                  - name: POSTGRESQL_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: "{{ osacDefaults.fulfillmentDbName }}-credentials"
                        key: password
                  - name: POSTGRESQL_DATABASE
                    value: "{{ osacDefaults.fulfillmentDbDatabase }}"
                securityContext:
                  runAsNonRoot: true
                  readOnlyRootFilesystem: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/pgsql
                  - name: tmp
                    mountPath: /tmp
                  - name: run-postgresql
                    mountPath: /var/run/postgresql
                readinessProbe:
                  exec:
                    command:
                      - /usr/libexec/check-container
                  initialDelaySeconds: 5
                  periodSeconds: 10
                livenessProbe:
                  exec:
                    command:
                      - /usr/libexec/check-container
                      - --live
                  initialDelaySeconds: 30
                  periodSeconds: 10
            volumes:
              - name: tmp
                emptyDir: {}
              - name: run-postgresql
                emptyDir: {}
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: "{{ osacDefaults.fulfillmentDbSize }}"

- name: Wait for fulfillment PostgreSQL ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: StatefulSet
    name: "{{ osacDefaults.fulfillmentDbName }}"
    namespace: "{{ osacDefaults.osacNamespace }}"
  register: r_fulfillment_db_ready
  retries: 30
  delay: 10
  until:
    - r_fulfillment_db_ready.resources | length > 0
    - r_fulfillment_db_ready.resources[0].status.readyReplicas | default(0) | int > 0

- name: Create fulfillment-db connection secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: fulfillment-db
        namespace: "{{ osacDefaults.osacNamespace }}"
      type: Opaque
      stringData:
        url: "postgres://{{ osacDefaults.fulfillmentDbUsername }}:{{ _fulfillment_db_password }}@{{ osacDefaults.fulfillmentDbName }}:5432/{{ osacDefaults.fulfillmentDbDatabase }}?sslmode=disable"
  no_log: true

# --- Wait for AAP Controller ---
# The 'aap' plugin (order 103) deploys the AAP instance but OSAC needs
# the controller route and admin credentials to be available.

- name: Wait for AAP controller route
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    namespace: "{{ osacDefaults.aapNamespace }}"
    label_selectors:
      - "app.kubernetes.io/component=automationcontroller"
  register: r_aap_route
  until: r_aap_route.resources | length > 0
  retries: 60
  delay: 30

- name: Set AAP URL fact
  ansible.builtin.set_fact:
    osac_aap_url: "https://{{ r_aap_route.resources[0].spec.host }}"
    _aap_route_host: "{{ r_aap_route.resources[0].spec.host }}"

# Ensure the AAP route hostname resolves on the Landing Zone.
# Libvirt dnsmasq only has entries for a fixed set of app hostnames,
# so dynamically created routes (like AAP) won't resolve by default.
- name: Add AAP route hostname to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ ingressVIP }} {{ _aap_route_host }}"
    regexp: "{{ _aap_route_host | regex_escape() }}"
    state: present
  become: true

# --- AAP Credentials ---

- name: Wait for AAP admin secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ osacDefaults.aapNamespace }}"
    name: "{{ osacDefaults.aapName }}-admin-password"
  register: r_aap_admin_secret
  until: r_aap_admin_secret.resources | length > 0
  retries: 30
  delay: 10

- name: Extract AAP admin password
  ansible.builtin.set_fact:
    _aap_admin_password: "{{ r_aap_admin_secret.resources[0].data.password | b64decode }}"

# Copy AAP admin password to OSAC namespace (bootstrap job reads it directly)
- name: Copy AAP admin-password secret to OSAC namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ osacDefaults.aapName }}-admin-password"
        namespace: "{{ osacDefaults.osacNamespace }}"
      type: Opaque
      data:
        password: "{{ r_aap_admin_secret.resources[0].data.password }}"

- name: Wait for AAP EDA admin secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ osacDefaults.aapNamespace }}"
    name: "{{ osacDefaults.aapName }}-eda-admin-password"
  register: r_aap_eda_admin_secret
  until: r_aap_eda_admin_secret.resources | length > 0
  retries: 30
  delay: 10

# Copy EDA admin password to OSAC namespace (bootstrap job reads it directly)
- name: Copy AAP EDA admin-password secret to OSAC namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ osacDefaults.aapName }}-eda-admin-password"
        namespace: "{{ osacDefaults.osacNamespace }}"
      type: Opaque
      data:
        password: "{{ r_aap_eda_admin_secret.resources[0].data.password }}"

# --- AAP ExternalName Services ---
# The bootstrap job runs in the osac namespace and connects to AAP services
# using short hostnames (aap, aap-eda-api, aap-controller-service).
# Create ExternalName services so these resolve to the ansible-aap namespace.

- name: Create ExternalName service for AAP gateway
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ osacDefaults.aapName }}"
        namespace: "{{ osacDefaults.osacNamespace }}"
      spec:
        type: ExternalName
        externalName: "{{ osacDefaults.aapName }}.{{ osacDefaults.aapNamespace }}.svc.cluster.local"

# The osac-aap bootstrap job constructs the controller hostname as
# <helm-release>-<instance-name> (e.g. "osac-aap"). Create an alias
# so this resolves to the AAP gateway in the ansible-aap namespace.
- name: Create ExternalName service for AAP gateway (chart-prefixed name)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "osac-{{ osacDefaults.aapName }}"
        namespace: "{{ osacDefaults.osacNamespace }}"
      spec:
        type: ExternalName
        externalName: "{{ osacDefaults.aapName }}.{{ osacDefaults.aapNamespace }}.svc.cluster.local"

- name: Create ExternalName service for AAP EDA API
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ osacDefaults.aapName }}-eda-api"
        namespace: "{{ osacDefaults.osacNamespace }}"
      spec:
        type: ExternalName
        externalName: "{{ osacDefaults.aapName }}-eda-api.{{ osacDefaults.aapNamespace }}.svc.cluster.local"

- name: Create ExternalName service for AAP controller
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ osacDefaults.aapName }}-controller-service"
        namespace: "{{ osacDefaults.osacNamespace }}"
      spec:
        type: ExternalName
        externalName: "{{ osacDefaults.aapName }}-controller-service.{{ osacDefaults.aapNamespace }}.svc.cluster.local"

# --- AAP Token ---
# AAP 2.5 gateway does not support Basic auth or expose the OAuth2 token
# endpoint (/api/o/token/) through the route. Create the token directly
# via awx-manage inside the controller pod, bypassing the gateway.

- name: Create AAP personal access token via awx-manage
  ansible.builtin.command:
    cmd: >-
      oc exec -n {{ osacDefaults.aapNamespace }}
      deployment/{{ osacDefaults.aapName }}-controller-web
      -- awx-manage create_oauth2_token
      --user {{ osacDefaults.aapApiUser }}
  register: r_aap_token_exec
  retries: 10
  delay: 15
  until: r_aap_token_exec.rc == 0
  changed_when: r_aap_token_exec.rc == 0
  no_log: true

- name: Set AAP token fact
  ansible.builtin.set_fact:
    osac_aap_token: "{{ r_aap_token_exec.stdout_lines | last | trim }}"

# --- Kubeconfig Secret ---

- name: Create kubeconfig secret for AAP
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ osacDefaults.aapName }}-kubeconfig"
        namespace: "{{ osacDefaults.aapNamespace }}"
      type: Opaque
      data:
        kubeconfig: "{{ lookup('ansible.builtin.file', workingDir ~ '/ocp-cluster/auth/kubeconfig') | b64encode }}"

# --- Config-as-Code Secrets for Bootstrap ---

- name: Create config-as-code-ig secret for bootstrap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: config-as-code-ig
        namespace: "{{ osacDefaults.osacNamespace }}"
      type: Opaque
      stringData:
        AAP_EE_IMAGE: "{{ osacDefaults.images.aapBootstrap }}"
        AAP_PROJECT_GIT_URI: "{{ osacDefaults.aapProjectGitUri }}"
        AAP_PROJECT_GIT_BRANCH: "{{ osacDefaults.aapProjectGitBranch }}"

- name: Create config-as-code-manifest-ig secret for bootstrap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: config-as-code-manifest-ig
        namespace: "{{ osacDefaults.osacNamespace }}"
      type: Opaque
      data:
        license.zip: "{{ lookup('ansible.builtin.file', aap_license_file) | b64encode }}"

- name: Log OSAC post-operators completion
  ansible.builtin.debug:
    msg: "OSAC post-operators complete. AAP URL={{ osac_aap_url }}, token set."
