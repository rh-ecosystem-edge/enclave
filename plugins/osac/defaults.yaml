---
# OSAC plugin defaults
# Note: config/plugins/osac.yaml uses camelCase (osacProfilesList, osacBYODatabase, osacNetrisEnabled)
# which is loaded into Ansible scope as-is. The defaults below use the same
# camelCase convention to match. Ansible variables from defaults.yaml and
# config/plugins/osac.yaml are merged into the same scope.
osacChartVersion: "0.0.6"

osacProfilesList:
  - caas
  - vmaas

# Test users (opt-in for dev/test environments)
osacTestUsers: false

# Netris network backend
osacNetrisEnabled: false

# AAP settings (chart manages the instance, these configure it)
osac_aap_name: osac-aap
osac_aap_operator_ns: ansible-aap
osac_aap_api_user: admin      # Used as --user arg to awx-manage create_oauth2_token
osac_aap_validate_certs: false

# Keycloak integration
osac_keycloak_ns: keycloak
osac_keycloak_name: keycloak                  # Keycloak CR name (used for route hostname, admin API)
osac_keycloak_svc_name: keycloak-service      # RHBK operator creates <cr-name>-service
osac_keycloak_realm: osac
osac_keycloak_client_id: osac-controller
osac_keycloak_admin_client_id: osac-admin
osac_keycloak_service_port: 8443
osac_keycloak_validate_certs: true

# Keycloak client scopes required for OSAC token claims
osac_keycloak_client_scopes:
  - name: groups
    description: Group membership claim
    protocolMappers:
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        consentRequired: false
        config:
          full.path: "false"
          introspection.token.claim: "true"
          multivalued: "true"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: groups
  - name: username
    description: User name
    protocolMappers:
      - name: username
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          user.attribute: username
          claim.name: username
          jsonType.label: String
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
          introspection.token.claim: "true"
          multivalued: "false"
          aggregate.attrs: "false"
  - name: osac-api
    description: OSAC API
    attributes:
      include.in.token.scope: "false"
      display.on.consent.screen: "false"
      include.in.openid.provider.metadata: "false"
    protocolMappers:
      - name: osac-api-aud
        protocol: openid-connect
        protocolMapper: oidc-audience-mapper
        consentRequired: false
        config:
          id.token.claim: "false"
          access.token.claim: "true"
          introspection.token.claim: "true"
          included.custom.audience: osac-api

# Keycloak test users (initial UI/CLI access when osacTestUsers is enabled)
osac_keycloak_test_users:
  - username: admin
    firstName: Administrator
    lastName: User
    email: admin@example.com
    password: foobar
    groups:
      - admins
  - username: user
    firstName: Test
    lastName: User
    email: user@example.com
    password: foobar
    groups:
      - tenant1

# Fulfillment database (built-in dev postgres)
osacBYODatabase: false
osac_db_name: postgres
osac_db_image: "registry.redhat.io/rhel10/postgresql-18:latest"
osac_db_size: 5Gi
osac_db_user: service
osac_db_database: service

# AAP bootstrap
osac_aap_project_git_uri: "https://github.com/osac-project/osac-aap"
osac_aap_project_git_branch: main

# Container images
osac_images:
  operator: "ghcr.io/osac-project/osac-operator"
  operator_tag: "latest"
  fulfillment_service: "ghcr.io/osac-project/fulfillment-service:latest"
  envoy: "docker.io/envoyproxy/envoy:v1.33.0"
  aap_bootstrap: "ghcr.io/osac-project/osac-aap:latest"
  cli: "quay.io/openshift/origin-cli:4.20.0"

# BCM inventory (NVIDIA Base Command Manager)
osacBcmEnabled: false
osacBcmApiUrl: ""
osacBcmClientCert: ""
osacBcmClientKey: ""
osacBcmValidateCerts: true
osacBcmDisableBmcCertVerification: false
