---
# The AAP operator uses Manual install approval (non-openshift-operators
# namespace), so configure_operator.yaml approves the install plan but does
# not wait for the CSV to finish installing. We must wait here before
# looking for the operator deployment.
#
# On re-runs where the subscription already exists, configure_operator.yaml
# skips all operator steps (install plan wait/approval). We handle both
# fresh installs and re-runs by querying the subscription for currentCSV.

- name: Check for unapproved AAP install plans
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: InstallPlan
    namespace: "{{ aap_ns }}"
  register: __r_aap_installplans

- name: Approve any pending AAP install plans
  when:
    - __r_aap_installplans.resources | length > 0
    - item.spec.approved is defined
    - not item.spec.approved
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: InstallPlan
      metadata:
        name: "{{ item.metadata.name }}"
        namespace: "{{ aap_ns }}"
      spec:
        approved: true
  loop: "{{ __r_aap_installplans.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

- name: Wait for AAP subscription to report currentCSV
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: ansible-automation-platform-operator
    namespace: "{{ aap_ns }}"
  register: __r_aap_sub
  retries: 30
  delay: 10
  until:
    - __r_aap_sub.resources | length > 0
    - __r_aap_sub.resources[0].status.currentCSV is defined
    - __r_aap_sub.resources[0].status.currentCSV | length > 0

- name: Wait for AAP operator CSV to reach Succeeded phase
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ __r_aap_sub.resources[0].status.currentCSV }}"
    namespace: "{{ aap_ns }}"
  register: __r_aap_csv
  retries: 30
  delay: 10
  until:
    - __r_aap_csv.resources | length > 0
    - __r_aap_csv.resources[0].status.phase | default('') == "Succeeded"

- name: Wait for AAP operator deployment (Available=True)
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: automation-controller-operator-controller-manager
    namespace: "{{ aap_ns }}"
  register: __r_aap_operator_deploy
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - __r_aap_operator_deploy.resources | length > 0
    - __r_aap_operator_deploy.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Available')
      | selectattr('status', 'equalto', 'True')
      | list | length > 0

- name: Read AAP license file
  ansible.builtin.slurp:
    src: "{{ aapLicenseFile }}"
  register: __r_aap_license_content
  no_log: true

- name: Create AAP license Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ aap_license_secret }}"
        namespace: "{{ aap_ns }}"
      type: Opaque
      data:
        manifest.zip: "{{ __r_aap_license_content.content }}"
  register: __r_aap_license
  no_log: true
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: __r_aap_license is success

- name: Deploy AnsibleAutomationPlatform CR
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: aap.ansible.com/v1alpha1
      kind: AnsibleAutomationPlatform
      metadata:
        name: "{{ aap_name }}"
        namespace: "{{ aap_ns }}"
      spec:
        controller:
          disabled: "{{ aap_controller_disabled }}"
        eda:
          disabled: "{{ aap_eda_disabled }}"
        hub:
          disabled: "{{ aap_hub_disabled }}"
        image_pull_policy: "{{ aap_image_pull_policy }}"
        lightspeed:
          disabled: "{{ aap_lightspeed_disabled }}"
        no_log: "{{ aap_no_log }}"
        redis_mode: "{{ aap_redis_mode }}"
        route_tls_termination_mechanism: "{{ aap_route_tls_termination }}"
  register: __r_deploy_aap
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: __r_deploy_aap is success

- name: Wait for AnsibleAutomationPlatform reconciliation (Successful=True)
  kubernetes.core.k8s_info:
    api_version: aap.ansible.com/v1alpha1
    kind: AnsibleAutomationPlatform
    name: "{{ aap_name }}"
    namespace: "{{ aap_ns }}"
  register: __r_aap_resource
  retries: 60
  delay: 30
  until:
    - __r_aap_resource.resources | length > 0
    - __r_aap_resource.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Successful')
      | selectattr('status', 'equalto', 'True')
      | list | length > 0
    - __r_aap_resource.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Failure')
      | selectattr('status', 'equalto', 'True')
      | list | length == 0

- name: Wait for AutomationController (Successful=True)
  kubernetes.core.k8s_info:
    api_version: automationcontroller.ansible.com/v1beta1
    kind: AutomationController
    namespace: "{{ aap_ns }}"
  register: __r_aap_controller
  retries: 60
  delay: 30
  until:
    - __r_aap_controller.resources | length > 0
    - __r_aap_controller.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Successful')
      | selectattr('status', 'equalto', 'True')
      | list | length > 0
  when: not aap_controller_disabled

- name: Wait for EDA (Successful=True)
  kubernetes.core.k8s_info:
    api_version: eda.ansible.com/v1alpha1
    kind: EDA
    namespace: "{{ aap_ns }}"
  register: __r_aap_eda
  retries: 60
  delay: 30
  until:
    - __r_aap_eda.resources | length > 0
    - __r_aap_eda.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Successful')
      | selectattr('status', 'equalto', 'True')
      | list | length > 0
  when: not aap_eda_disabled

- name: Wait for AutomationHub (Successful=True)
  kubernetes.core.k8s_info:
    api_version: automationhub.ansible.com/v1beta1
    kind: AutomationHub
    namespace: "{{ aap_ns }}"
  register: __r_aap_hub
  retries: 60
  delay: 30
  until:
    - __r_aap_hub.resources | length > 0
    - __r_aap_hub.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Successful')
      | selectattr('status', 'equalto', 'True')
      | list | length > 0
  when: not aap_hub_disabled

- name: Debug AnsibleAutomationPlatform component status
  vars:
    __controller_status: >-
      {{ __r_aap_controller.resources[0].status.conditions | default([])
         | selectattr('type', 'equalto', 'Successful')
         | map(attribute='status') | first | default('Unknown')
         if not aap_controller_disabled else 'disabled' }}
    __eda_status: >-
      {{ __r_aap_eda.resources[0].status.conditions | default([])
         | selectattr('type', 'equalto', 'Successful')
         | map(attribute='status') | first | default('Unknown')
         if not aap_eda_disabled else 'disabled' }}
    __hub_status: >-
      {{ __r_aap_hub.resources[0].status.conditions | default([])
         | selectattr('type', 'equalto', 'Successful')
         | map(attribute='status') | first | default('Unknown')
         if not aap_hub_disabled else 'disabled' }}
  ansible.builtin.debug:
    msg:
      - "AnsibleAutomationPlatform {{ aap_name }} is ready in {{ aap_ns }} namespace"
      - "Controller: {{ __controller_status }}"
      - "EDA: {{ __eda_status }}"
      - "Hub: {{ __hub_status }}"
