---
- name: Patch Subscription openshift-external-secrets-operator to set resources
  kubernetes.core.k8s:
    state: patched
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: openshift-external-secrets-operator
        namespace: external-secrets-operator
      spec:
        config:
          resources:
            limits:
              cpu: 100m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 1Gi
