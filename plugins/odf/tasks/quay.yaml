---
# ODF-specific Quay tasks: QuayRegistry CR with RadosGW object storage.
# Included from operators/quay-operator/tasks.yaml via dynamic plugin include.

- name: Ensure QuayRegistry is present (ODF Backend)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: quay.redhat.com/v1
      kind: QuayRegistry
      metadata:
        name: registry
        namespace: quay-enterprise
      spec:
        configBundleSecret: quay-config
        components:
        - kind: horizontalpodautoscaler
          managed: true
        - kind: quay
          managed: true
          overrides:
            resources:
              limits:
                cpu: "8"
                memory: 32Gi
              requests:
                cpu: "{{ '4' if (disconnected | default(true)) else '2' }}"
                memory: "{{ '16Gi' if (disconnected | default(true)) else '2Gi' }}"
        - kind: objectstorage
          managed: false
        - kind: postgres
          managed: true
          overrides:
            resources: "{{ components.postgres.overrides.resources }}"
        - kind: clairpostgres
          managed: true
          overrides:
            resources: "{{ components.clairpostgres.overrides.resources }}"
  retries: 60
  delay: 10
  register: r_quay
  until: r_quay is succeeded
