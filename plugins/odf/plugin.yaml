---
name: odf
type: foundation
order: 10

# Deploy ODF catalog source to all managed clusters (excludes management cluster)
# This makes ODF operators available on spoke clusters in disconnected environments.
# Operators are installed manually on spoke clusters as needed (not auto-deployed).
clusterSelector:
  matchExpressions:
    - key: local-cluster
      operator: NotIn
      values:
        - "true"

# Install operators on management cluster
installOperators: true

# Only deploy catalog source to fleet (not operator subscriptions)
# Spoke clusters get ODF operators available, but not auto-installed
installOperatorsFleet: false

operators:
  - name: odf-operator
    version: 4.20.7-rhodf
    channel: stable-4.20
    init_version: 4.20.7-rhodf
    namespace: openshift-storage
    csvMirror: true
    csvNames:
      - odf-operator
      - odf-dependencies
      - odf-csi-addons-operator
      - rook-ceph-operator
      - ocs-operator
      - recipe
      - mcg-operator
      - odf-prometheus-operator
      - ocs-client-operator
      - cephcsi-operator
      - odf-external-snapshotter-operator
    extraMirrorPackages:
      - odr-cluster-operator
      - odr-hub-operator

requires:
  files:
    - path: "tasks/deploy.yaml"
      description: "ODF deployment tasks"
    - path: "tasks/quay.yaml"
      description: "ODF Quay storage configuration"
    - path: "../../config/plugins/odf.yaml"
      description: "ODF user configuration"

registries:
  - location: "registry.redhat.io/odf4"
    mirror: "odf4"
  - location: "registry.redhat.io/rhceph"
    mirror: "rhceph"
