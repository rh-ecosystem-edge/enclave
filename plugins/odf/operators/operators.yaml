  - mcg-operator
  - odf-csi-addons-operator
  - ocs-client-operator
  - odf-prometheus-operator
  - recipe
  - rook-ceph-operator
  - cephcsi-operator
  - odf-dependencies
  - odr-cluster-operator
  - odr-hub-operator
  - ocs-operator
  - odf-external-snapshotter-operator
