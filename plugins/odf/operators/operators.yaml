plugin_operators:
  - name: odf-operator
    version: 4.20.7-rhodf
    channel: stable-4.20
    init_version: 4.20.7-rhodf
    namespace: openshift-storage
    source: cs-redhat-operator-index-v4-20
    csvNames:
      - odf-operator
      - odf-dependencies
      - odf-csi-addons-operator
      - rook-ceph-operator
      - ocs-operator
      - recipe
      - mcg-operator
      - odf-prometheus-operator
      - ocs-client-operator
