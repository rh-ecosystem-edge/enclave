---
- name: Wait for StorageCluster to be available
  kubernetes.core.k8s_info:
    api_version: ocs.openshift.io/v1
    kind: StorageCluster
    name: ocs-external-storagecluster
    namespace: openshift-storage
    wait: true
    wait_sleep: 10
    wait_timeout: 300
    wait_condition:
      reason: ReconcileCompleted
      status: "True"
      type: Available
  register: r_storage_cluster_info
  until: r_storage_cluster_info is success
  retries: 30
  delay: 10

- name: Check for default StorageClass
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
  register: r_storageclasses

- name: Find default StorageClass
  ansible.builtin.set_fact:
    default_sc: >-
      {{ r_storageclasses.resources
         | selectattr('metadata.annotations', 'defined')
         | selectattr('metadata.annotations.storageclass\.kubernetes\.io/is-default-class', 'equalto', 'true')
         | list }}

- name: Verify a default StorageClass exists
  ansible.builtin.assert:
    that: default_sc | length > 0
    fail_msg: "No default StorageClass found after ODF deployment"
    success_msg: "Default StorageClass is available"
