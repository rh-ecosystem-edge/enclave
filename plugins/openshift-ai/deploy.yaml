---
- name: Create Namespace for ACM Policies
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.file', plugin_dir ~ '/files/00-namespace.yaml') | from_yaml }}"
  register: r_namespace_model_config
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_namespace_model_config is success

- name: Create ACM Policy for Model configuration
  kubernetes.core.k8s:
    state: present
    namespace: "{{ openshift_ai_policy_namespace }}"
    definition: "{{ lookup('ansible.builtin.template', plugin_dir ~ '/files/10-policy.yaml.j2') | from_yaml }}"
  register: r_acm_policy_model_config
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_acm_policy_model_config is success

- name: Create ACM PlacementRule for Model configuration
  kubernetes.core.k8s:
    state: present
    namespace: "{{ openshift_ai_policy_namespace }}"
    definition: "{{ lookup('ansible.builtin.file', plugin_dir ~ '/files/20-placementrule.yaml') | from_yaml }}"
  register: r_acm_placementrule_model_config
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_acm_placementrule_model_config is success

- name: Create ACM PlacementBinding for Model configuration
  kubernetes.core.k8s:
    state: present
    namespace: "{{ openshift_ai_policy_namespace }}"
    definition: "{{ lookup('ansible.builtin.file', plugin_dir ~ '/files/30-placementbinding.yaml') | from_yaml }}"
  register: r_acm_placementbinding_model_config
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_acm_placementbinding_model_config is success
