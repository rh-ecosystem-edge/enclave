- name: Create Namespace for ACM Policies
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('ansible.builtin.file', plugin_dir ~ '/files/00-namespace.yaml') | from_yaml }}"
  register: r_namespace_model_config
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_namespace_model_config is success

- name: Create ACM Policy for Model CatalogSources
  environment:
    KUBECONFIG: "{{ workingDir }}/ocp-cluster/auth/kubeconfig"
  kubernetes.core.k8s:
    state: present
    namespace: openshift-acm-policies
    definition: "{{ lookup('ansible.builtin.template', plugin_dir ~ '/files/09-policy-catalogsource.yaml.j2') | from_yaml }}"
  register: r_acm_policy_model_catalogsources
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until: r_acm_policy_model_catalogsources is success

