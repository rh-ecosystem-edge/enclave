---
- name: Get Subscription status for {{ item.name }}
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ item.name }}"
    namespace: "{{ item.namespace }}"
  register: r_operator_subs
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_operator_subs is success
    - r_operator_subs.resources | length > 0
    - r_operator_subs.resources[0].status.installedCSV | default('') | length > 0
  loop: "{{ plugin_operators_file.plugin_operators }}"
  loop_control:
    label: "{{ item.name }}"

- name: Build list of installed CSVs to verify
  ansible.builtin.set_fact:
    _expected_csvs: >-
      {{ r_operator_subs.results
         | map(attribute='resources')
         | map('first')
         | map(attribute='status')
         | map(attribute='installedCSV')
         | zip(plugin_operators_file.plugin_operators | map(attribute='namespace'))
         | map('list')
         | list }}

- name: Verify CSV {{ item[0] }} is Succeeded in {{ item[1] }}
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ item[0] }}"
    namespace: "{{ item[1] }}"
  register: r_csv_check
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_csv_check is success
    - r_csv_check.resources | length > 0
    - r_csv_check.resources[0].status.phase | default('') == 'Succeeded'
  loop: "{{ _expected_csvs }}"
  loop_control:
    label: "{{ item[0] }}"

- name: Check for DataScienceCluster CR
  kubernetes.core.k8s_info:
    api_version: datasciencecluster.opendatahub.io/v1
    kind: DataScienceCluster
  register: r_dsc

- name: Verify DataScienceCluster is Ready
  kubernetes.core.k8s_info:
    api_version: datasciencecluster.opendatahub.io/v1
    kind: DataScienceCluster
  register: r_dsc_ready
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_dsc_ready is success
    - r_dsc_ready.resources | length > 0
    - r_dsc_ready.resources[0].status.phase | default('') == 'Ready'
  when: r_dsc.resources | length > 0

- name: Verify ACM Policy exists
  kubernetes.core.k8s_info:
    api_version: policy.open-cluster-management.io/v1
    kind: Policy
    name: model-configuration
    namespace: "{{ openshift_ai_policy_namespace }}"
  register: r_policy_check
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_policy_check is success
    - r_policy_check.resources | length > 0

- name: Verify ACM PlacementRule exists
  kubernetes.core.k8s_info:
    api_version: apps.open-cluster-management.io/v1
    kind: PlacementRule
    name: model-configuration
    namespace: "{{ openshift_ai_policy_namespace }}"
  register: r_placementrule_check
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_placementrule_check is success
    - r_placementrule_check.resources | length > 0

- name: Verify ACM PlacementBinding exists
  kubernetes.core.k8s_info:
    api_version: policy.open-cluster-management.io/v1
    kind: PlacementBinding
    name: model-configuration
    namespace: "{{ openshift_ai_policy_namespace }}"
  register: r_placementbinding_check
  retries: "{{ k8s_retries }}"
  delay: "{{ k8s_delay }}"
  until:
    - r_placementbinding_check is success
    - r_placementbinding_check.resources | length > 0

- name: OpenShift AI post-validation passed
  ansible.builtin.debug:
    msg: "OpenShift AI deployment verified - operators healthy, ACM policy resources present"
