---
# Pre-deployment validation: verify VAST endpoint connectivity and credential format.

- name: Validate VAST endpoint is a valid URL
  ansible.builtin.assert:
    that:
      - vastCSIEndpoint is regex('^https?://')
    fail_msg: >-
      vastCSIEndpoint must be a URL starting with http:// or https://.
      Got: {{ vastCSIEndpoint }}

- name: Validate VAST tier configuration
  ansible.builtin.assert:
    that:
      - vastCSIDefaults.tiers | length > 0
      - vastCSIDefaults.tiers | length <= 20
    fail_msg: "vastCSIDefaults.tiers must have 1-20 entries"

- name: Validate tier protocols
  ansible.builtin.assert:
    that:
      - item.protocol in ['nfs', 'block']
    fail_msg: >-
      Tier '{{ item.name }}' has invalid protocol '{{ item.protocol }}'.
      Must be 'nfs' or 'block'.
  loop: "{{ vastCSIDefaults.tiers }}"
  loop_control:
    label: "{{ item.name }}"

- name: Validate tier names are unique
  ansible.builtin.assert:
    that:
      - vastCSIDefaults.tiers | map(attribute='name') | list | unique | length == vastCSIDefaults.tiers | length
    fail_msg: "Tier names must be unique"

- name: Validate tier names are DNS-safe
  ansible.builtin.assert:
    that:
      - item.name | length <= 63
      - item.name is regex('^[a-z0-9]([a-z0-9-]*[a-z0-9])?$')
    fail_msg: >-
      Tier name '{{ item.name }}' must be a valid DNS label
      (1-63 chars, lowercase alphanumeric, hyphens allowed in the middle).
  loop: "{{ vastCSIDefaults.tiers }}"
  loop_control:
    label: "{{ item.name }}"

- name: Validate VAST admin credentials are non-empty
  ansible.builtin.assert:
    that:
      - vastCSIAdminUsername | length > 0
      - vastCSIAdminPassword | length > 0
    fail_msg: >-
      vastCSIAdminUsername and vastCSIAdminPassword must both be non-empty strings.
      Empty credentials will cause 401 errors during VMS API authentication.

- name: Check VAST endpoint connectivity
  ansible.builtin.uri:
    url: "{{ vastCSIEndpoint }}/api/clusters/"
    method: GET
    validate_certs: "{{ vastCSIDefaults.validateCerts }}"
    timeout: "{{ vastCSIDefaults.apiTimeout | int }}"
    status_code:
      - 200
      - 401
      - 403
  register: r_vast_connectivity
  failed_when: false

- name: Warn if VAST endpoint is unreachable
  ansible.builtin.debug:
    msg: >-
      WARNING: VAST endpoint {{ vastCSIEndpoint }} is not reachable
      (status={{ r_vast_connectivity.status | default('connection_error') }}).
      This may be expected in disconnected environments where VMS is on a separate network.
      CSI driver will still be installed, but StorageClasses may not be functional
      until VMS connectivity is established.
  when: r_vast_connectivity.status is not defined or r_vast_connectivity.status not in [200, 401, 403]
