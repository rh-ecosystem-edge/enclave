---
name: vast-csi
type: foundation
order: 10

catalog: certified
operators:
  - name: vast-csi-operator
    version: 2.6.5
    init_version: 2.6.5
    channel: stable
    namespace: vast-csi

requires:
  files:
    - path: "tasks/deploy.yaml"
      description: "VAST CSI deployment tasks"
    - path: "tasks/quay.yaml"
      description: "VAST Quay storage configuration"
    - path: "tasks/create_tenant_manager.yaml"
      description: "VAST tenant manager creation tasks"
    - path: "../../config/plugins/vast-csi.yaml"
      description: "VAST CSI user configuration"

clusterSelector:
  matchLabels:
    storage.vastdata.com/enabled: "true"

registries:
  - location: "registry.connect.redhat.com/vastdataorg"
    mirror: "vastdataorg"
