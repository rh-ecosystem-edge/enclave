---
"$schema": "http://json-schema.org/draft-07/schema"
type: object
additionalProperties: false
properties:
  vastCSIDefaults:
    type: object
    description: Default VAST CSI driver configuration values.
    additionalProperties: false
    properties:
      infraTenant:
        "$ref": "#/definitions/nonEmptyString"
        description: VAST tenant name used for infra storage views.
      storagePath:
        "$ref": "#/definitions/nonEmptyString"
        description: Root path on VAST for all CSI storage views.
      validateCerts:
        type: boolean
        description: Whether to validate TLS certificates on the VAST management API.
      apiTimeout:
        type: integer
        minimum: 1
        description: Timeout in seconds for VAST management API calls.
      apiVersion:
        "$ref": "#/definitions/nonEmptyString"
        description: VAST API version to target (e.g. latest).
      csiProvisioners:
        type: object
        description: CSI provisioner driver names keyed by protocol.
        additionalProperties: false
        properties:
          nfs:
            "$ref": "#/definitions/nonEmptyString"
            description: CSI provisioner name for NFS protocol.
          block:
            "$ref": "#/definitions/nonEmptyString"
            description: CSI provisioner name for block protocol.
      csiDriverName:
        "$ref": "#/definitions/nonEmptyString"
        description: Name of the VastData CSI driver resource.
      quayPvcSize:
        "$ref": "#/definitions/nonEmptyString"
        description: Size of the PVC created for Quay storage (e.g. 1000Gi).
      tiers:
        type: array
        description: Storage tiers; each creates a VAST view and a StorageClass.
        minItems: 1
        maxItems: 20
        items:
          type: object
          additionalProperties: false
          properties:
            name:
              type: string
              description: Tier name (used in StorageClass name as {infraTenant}-{name}).
              pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
              maxLength: 63
            protocol:
              type: string
              description: Storage protocol for this tier.
              enum: [nfs, block]
            default:
              type: boolean
              description: Whether this tier is the default StorageClass.
          required:
            - name
            - protocol
required:
  - vastCSIDefaults
