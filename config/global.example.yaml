##############################################################################
# GLOBAL CONFIGURATION TEMPLATE
# Instructions: Copy this file to 'global.yaml' and fill in your values
##############################################################################

# ============================================================================
# Base Configuration
# ============================================================================
workingDir: YOUR_ROOT_DIRECTORY       # Example: "/home/enclave"

# ============================================================================
# Network Configuration
# ============================================================================
# Cluster Network Settings (install-config.yaml parameters)
baseDomain: YOUR_BASE_DOMAIN          # Example: enclave-test.nodns.in
clusterName: YOUR_CLUSTER_NAME        # Example: mgmt
machineNetwork: YOUR_MACHINE_NETWORK  # Example: 192.168.2.0/24
apiVIP: YOUR_API_VIP                  # Example: 192.168.2.201
ingressVIP: YOUR_INGRESS_VIP          # Example: 192.168.2.202

# Network Infrastructure
defaultDNS: YOUR_DNS_SERVER           # Example: 9.30.31.32
defaultGateway: YOUR_GATEWAY          # Example: 192.168.2.10
defaultPrefix: 24

# First control plane node IP (in the machineNetwork)
rendezvousIP: YOUR_RENDEZVOUS_IP      # Example: 192.168.2.24

# LZ IP where HTTP server serves the installation ISO to IPMI nodes
lzBmcIP: YOUR_LZ_WEB_SERVER_IP        # Example: 100.64.1.10

# DNS hostname for the LZ BMC interface (optional).
# When set, Ironic HTTPS vmedia URLs use this hostname instead of lzBmcIP.
# Required when using publicly trusted certificates (e.g. Let's Encrypt), which
# only support DNS SANs. The hostname must resolve to lzBmcIP from the BMC network.
# lzBmcHostname: mirror.example.com

# ============================================================================
# Quay Registry Configuration
# ============================================================================
quayUser: YOUR_QUAY_ADMIN_USERNAME
quayPassword: YOUR_QUAY_ADMIN_PASSWORD

# ============================================================================
# Quay Backend Storage Configuration
# ============================================================================
# Option 1: External S3/RadosGW storage (RECOMMENDED for production)
quayBackend: RadosGWStorage
quayBackendRGWConfiguration:
  access_key: YOUR_S3_ACCESS_KEY
  secret_key: YOUR_S3_SECRET_KEY
  bucket_name: YOUR_S3_BUCKET_NAME
  hostname: YOUR_RADOSGW_ENDPOINT_HOSTNAME
  # Uncomment only to override
  # minimum_chunk_size_mb: YOUR_MIN_CHUNK_SIZE_MB  # Default: 100
  # maximum_chunk_size_mb: YOUR_MAX_CHUNK_SIZE_MB  # Default: 500

# Option 2: Local storage (NOT recommended for production)
# quayBackend: LocalStorage

# ============================================================================
# Storage Backend
# ============================================================================
# Storage plugin for quay database and assisted installer
# Selects which storage plugin to deploy
# Options: lvms, odf, or vast-csi
# storage_plugin: odf
storage_plugin: lvms

# Plugins to deploy during the pipeline (default: only the storage plugin above)
# Uncomment and extend to enable additional plugins
# enabled_plugins:
#   - lvms
#   - example

# ============================================================================
# Storage Configuration (LVMS) (optional)
# ============================================================================
# Device selector — restrict which disks LVMS manages (omit to use all disks)
#lvmsConfig:
#  deviceSelector:
#    optionalPaths:
#      - /dev/disk/by-path/YOUR_DISK_PATH_1
#      - /dev/disk/by-path/YOUR_DISK_PATH_2
#      - /dev/disk/by-path/YOUR_DISK_PATH_3

# ============================================================================
# Storage Configuration (ODF)
# ============================================================================
# When odf is set, configure the odfExternalConfig variable
# with the data obtained from ceph-external-cluster-details-exporter.py script
# odfExternalConfig:
#  '[{"name": "external-cluster-user-command",
#     "kind": "ConfigMap", "data": ..}]'

# ============================================================================
# Storage Configuration (VAST CSI)
# ============================================================================
# When storage_plugin is vast-csi, configure the VAST management endpoint
# and admin credentials. The plugin creates an "infra" tenant following the
# osac-aap naming convention so both systems can reason about resources.
# Also set quayBackend: LocalStorage (VAST NFS uses PVC mount for Quay).
#
# vastEndpoint: "https://vms.example.com"
# vastAdminUsername: "admin"
# vastAdminPassword: "YOUR_VAST_ADMIN_PASSWORD"
#
# VIP pool network configuration (required).
# The plugin creates a VIP pool on the VAST cluster for CSI traffic.
# vastVipPool:
#   subnet_cidr: 24
#   ip_ranges:
#     - start: "10.0.100.10"
#       end: "10.0.100.50"
#
# Configure storage tiers (default: single NFS tier for Quay).
# Each tier creates a VAST view and a K8s StorageClass named {infraTenant}-{tierName}.
# vastDefaults:
#   infraTenant: infra
#   storagePath: /osac
#   viewPolicyId: 1
#   quayPvcSize: 2000Gi
#   tiers:
#     - name: quay
#       protocol: nfs
#     - name: fast
#       protocol: block
#     - name: archive
#       protocol: nfs

# ============================================================================
# OpenShift Deployment Configuration (optional)
# All settings below have defaults. Uncomment only to override.
# ============================================================================
# Disconnected mode (default: true, set to false for connected deployments)
# disconnected: false

# Fresh install mode (default: true, set to false to mirror multiple OpenShift versions)
# fresh: false

# Configure High Density Pod Limits for ABI (default: 500)
# masterMaxPods: 250

# Encrypt installation partition with TPM v2 (default: false, set to true to enable)
# diskEncryption: true

# Log level for oc-mirror (default: info, options: trace, debug, info, error)
# ocMirrorLogLevel: debug

# Additional NTP sources for cluster nodes (no additional servers by default)
# defaultNtpServers:
#  - YOUR_NTP_SERVER_1
#  - YOUR_NTP_SERVER_2

# ============================================================================
# Pull Secret and SSH Public Key Configuration
# ============================================================================
# Obtain from: https://console.redhat.com/openshift/install/pull-secret
# Replace with your Pull Secret and do not wrap the pull secret in quotes
pullSecret: {"auths":{}}

# SSH public key path for cluster nodes
sshPubPath: "YOUR_SSH_PUB_KEY_PATH"

# ============================================================================
# Cluster Hosts Configuration (Agent Hosts)
# ============================================================================
agent_hosts:
  - name: YOUR_HOST_NAME              # Example: mgmt-ctl01
    macAddress: YOUR_MAC_ADDRESS      # Example: 0c:c4:7a:62:fe:ec
    ipAddress: YOUR_IP_ADDRESS        # Should match rendezvousIP for first node
    redfish: YOUR_REDFISH_IP          # IPMI/Redfish management IP
    rootDisk: YOUR_ROOT_DISK_PATH     # Example: /dev/disk/by-path/pci-0000:00:11.4-ata-1.0
    redfishUser: YOUR_REDFISH_USER
    redfishPassword: YOUR_REDFISH_PASSWORD
  # Add a total of 3 agent hosts, no more, no less

# For complex network setups you can use mapInterfaces and networkConfig
# instead of the macAddress and ipAddress parameters
# See docs/CONFIGURATION_REFERENCE.md for reference

