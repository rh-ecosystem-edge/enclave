##############################################################################
# SSL CERTIFICATES CONFIGURATION TEMPLATE
# Instructions: Copy this file to 'certificates.yaml' and provide your certs
##############################################################################

# ============================================================================
# SSL Certificates Configuration
# ============================================================================
# Required: Provide valid SSL certificates from your CA or Let's Encrypt/ZeroSSL
#
# You need three certificates:
# 1. API certificate for: api.<clusterName>.<baseDomain>
# 2. Ingress wildcard certificate for: *.apps.<clusterName>.<baseDomain>
# 3. Root CA certificate
# ============================================================================

# API Certificate
sslAPICertificateKey: |
  -----BEGIN PRIVATE KEY-----
  YOUR_API_PRIVATE_KEY
  -----END PRIVATE KEY-----

sslAPICertificateFullChain: |
  -----BEGIN CERTIFICATE-----
  YOUR_API_CERTIFICATE
  -----END CERTIFICATE-----
  -----BEGIN CERTIFICATE-----
  YOUR_INTERMEDIATE_CA_CERT (if applicable)
  -----END CERTIFICATE-----

# Ingress Certificate (*.apps)
sslIngressCertificateKey: |
  -----BEGIN PRIVATE KEY-----
  YOUR_INGRESS_PRIVATE_KEY
  -----END PRIVATE KEY-----

sslIngressCertificateFullChain: |
  -----BEGIN CERTIFICATE-----
  YOUR_INGRESS_CERTIFICATE
  -----END CERTIFICATE-----
  -----BEGIN CERTIFICATE-----
  YOUR_INTERMEDIATE_CA_CERT (if applicable)
  -----END CERTIFICATE-----

# Root CA Certificate
# The self-signed root CA that signs the last certificate in the fullchain fields.
# This supplies only the terminal root CA; all intermediate certificates must already
# be present in the fullchain fields. sslCACertificate does not rebuild missing
# intermediates.
#
# Required when:
#   - The fullchain ends with a non-self-signed (cross-signed) certificate, e.g.
#     Let's Encrypt ISRG Root X2, and the root CA is not in the RHEL 10 system
#     trust store (/etc/pki/tls/certs/ca-bundle.crt).
#   - Only a leaf certificate is present in the fullchain (no intermediate).
#   - A private/custom CA whose root is not in the system trust store.
#
# Not required when the fullchain already ends with a self-signed root CA, or
# when the signing CA is present in the RHEL 10 system trust store.
#
# Validate the full configuration with:
#   enclave tools check-certificate-chains --config config/certificates.yaml
sslCACertificate: |
  -----BEGIN CERTIFICATE-----
  YOUR_ROOT_CA_CERTIFICATE
  -----END CERTIFICATE-----

# Ironic HTTP Server TLS Certificate (optional)
# Required when serving boot ISOs over HTTPS to the BMC.
# The SAN on this certificate must cover lzBmcHostname (DNS SAN, for Let's Encrypt certs)
# or lzBmcIP (IP SAN, for private CA certs). Set lzBmcHostname in global.yaml when using
# a publicly trusted certificate such as Let's Encrypt.
ironicHTTPSCertificate: ""

ironicHTTPSKey: ""
